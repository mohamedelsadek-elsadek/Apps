<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخزنة - إدارة الشركات والشركاء</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
:root{--bg:#0a0e1a;--card:#121829;--card2:#1a2138;--primary:#3b82f6;--primary2:#2563eb;
--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--border:#2a3450;--cyan:#06b6d4}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.topbar{background:linear-gradient(135deg,#0f1626,#1a2138);padding:14px 16px;position:sticky;top:0;z-index:50;
border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar h1{font-size:18px;display:flex;align-items:center;gap:8px}
.topbar .vault-amount{font-size:13px;color:var(--muted)}
.topbar .vault-amount b{color:var(--green);font-size:16px}
.btns{display:flex;gap:8px;flex-wrap:wrap}
button{cursor:pointer;border:none;border-radius:10px;font-size:14px;padding:9px 14px;transition:.15s;font-family:inherit}
button:active{transform:scale(.96)}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary2)}
.btn-g{background:var(--green);color:#fff}.btn-r{background:var(--red);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-o:hover{background:var(--card2)}
.btn-sm{padding:6px 10px;font-size:13px}
.tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:var(--bg);position:sticky;top:62px;z-index:40;border-bottom:1px solid var(--border)}
.tab{padding:9px 16px;border-radius:10px;background:var(--card);color:var(--muted);white-space:nowrap;font-size:14px;border:1px solid transparent}
.tab.active{background:var(--primary);color:#fff}
.wrap{padding:16px;max-width:1100px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat .lbl{font-size:13px;color:var(--muted);margin-bottom:6px}
.stat .val{font-size:22px;font-weight:700}
.stat .val.g{color:var(--green)}.stat .val.r{color:var(--red)}.stat .val.b{color:var(--primary)}.stat .val.c{color:var(--cyan)}
.section-title{font-size:16px;margin:20px 0 12px;display:flex;align-items:center;gap:8px;color:var(--text)}
.list{display:flex;flex-direction:column;gap:10px}
.row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.row:hover{border-color:var(--primary)}
.row .info{flex:1;min-width:0}
.row .info .name{font-weight:600;font-size:15px;margin-bottom:4px}
.row .info .sub{font-size:12px;color:var(--muted)}
.row .amt{font-weight:700;font-size:16px;white-space:nowrap}
.amt.g{color:var(--green)}.amt.r{color:var(--red)}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;background:var(--card2);color:var(--muted);margin-inline-start:6px}
.chip.g{background:rgba(34,197,94,.15);color:var(--green)}
.chip.r{background:rgba(239,68,68,.15);color:var(--red)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;font-size:13px}
th,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--border)}
th{background:var(--card2);color:var(--muted);font-weight:600;font-size:12px;position:sticky;top:0}
tr:hover td{background:var(--card2)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal.show{display:flex}
.modal-box{background:var(--card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px;max-height:92vh;overflow-y:auto;border-top:3px solid var(--primary)}
@media(min-width:600px){.modal{align-items:center}.modal-box{border-radius:20px}}
.modal-box h3{margin-bottom:18px;font-size:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text);font-size:15px;font-family:inherit}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary)}
.modal-actions{display:flex;gap:10px;margin-top:8px}
.modal-actions button{flex:1;padding:12px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ic{font-size:40px;margin-bottom:10px}
.fab{position:fixed;bottom:20px;left:20px;width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;box-shadow:0 6px 20px rgba(59,130,246,.5);z-index:60;display:flex;align-items:center;justify-content:center}
.badge{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--card2);color:var(--muted)}
.bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--primary)}
.partner-pill{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;gap:10px;font-size:13px}
.toast{position:fixed;bottom:90px;right:50%;transform:translateX(50%);background:var(--green);color:#fff;padding:12px 22px;border-radius:30px;z-index:200;opacity:0;transition:.3s;font-size:14px}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
small.muted{color:var(--muted);font-size:12px}
.flow{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted);flex-wrap:wrap}
</style>
</head>

</div>

// ===== الحسابات الأساسية =====
function shareSum(c){return c.partners.reduce((s,p)=>s+(Number(p.share)||0),0);}
function partnerShare(c,p){const tot=shareSum(c);return tot>0?(Number(p.share)||0)/tot:0;} // نسبة فعلية 0..1
function totals(c){
  const exp=c.expenses.reduce((s,x)=>s+x.amount,0);
  const rev=c.revenues.reduce((s,x)=>s+x.amount,0);
  const paid=c.payments.reduce((s,x)=>s+x.amount,0);
  // المطلوب من الشركاء صافي = مصاريف - إيراد. الخزنة للشركة = مدفوعات - مصاريف + إيراد
  return {exp,rev,paid,companyBalance:paid-exp+rev,netDue:exp-rev};
}
// موقف الشريك: دفع - نصيبه من المصاريف + نصيبه من الإيراد ، حسب onBehalf
function partnerStanding(c,partner){
  const fr=partnerShare(c,partner);
  const exp=c.expenses.reduce((s,x)=>s+x.amount,0);
  const rev=c.revenues.reduce((s,x)=>s+x.amount,0);
  const dueShareExp=exp*fr;       // عليه من المصاريف
  const revShare=rev*fr;          // ليه من الإيراد
  // المدفوع المنسوب له (onBehalfName == اسمه)
  const paidFor=c.payments.filter(p=>(p.onBehalfName||p.payerName)===partner.name).reduce((s,x)=>s+x.amount,0);
  // اللي دفعه فعليًا بيده (payerName==اسمه) عن أي حد
  const paidByHim=c.payments.filter(p=>p.payerName===partner.name).reduce((s,x)=>s+x.amount,0);
  const standing=paidFor - dueShareExp + revShare; // موجب=ليه، سالب=عليه
  return {fr,dueShareExp,revShare,paidFor,paidByHim,standing};
}
function vaultBalance(){let inn=0,out=0;state.companies.forEach(c=>{const t=totals(c);inn+=t.paid+t.rev;out+=t.exp;});
  return inn+state.vaultAdjust.reduce((s,x)=>s+x.amount,0)-out;}
function allPartners(){
  const m={};
  state.companies.forEach(c=>c.partners.forEach(p=>{
    const st=partnerStanding(c,p);
    if(!m[p.name])m[p.name]={name:p.name,standing:0,paidFor:0,companies:[]};
    m[p.name].standing+=st.standing;m[p.name].paidFor+=st.paidFor;
    m[p.name].companies.push({company:c.name,id:c.id,pid:p.id,...st});
  }));
  return Object.values(m).sort((a,b)=>a.standing-b.standing);
}

  h+=`</div><div class="section-title">🏢 الشركات</div><div class="list">`;

   <div class="stat"><div class="lbl">داخل: مدفوعات + إيراد</div><div class="val g">${fmt(inn+rev)}</div></div>
   <div class="stat"><div class="lbl">خارج: مصروفات</div><div class="val r">${fmt(out)}</div></div></div>
   <div class="flow">أي دفعة شريك أو إيراد بيع → <b style="color:var(--green)">يدخل الخزنة</b> • أي مصروف لأي شركة → <b style="color:var(--red)">يخرج من الخزنة</b></div>`;
  let mv=[];
  state.companies.forEach(c=>{
    c.payments.forEach(x=>mv.push({date:x.date,t:'in',l:`دفعة: ${x.payerName}${x.onBehalfName&&x.onBehalfName!==x.payerName?' (عن '+x.onBehalfName+')':''} — ${c.name}`,a:x.amount}));
    c.revenues.forEach(x=>mv.push({date:x.date,t:'in',l:`إيراد: ${x.source||'بيع'} — ${c.name}`,a:x.amount}));
    c.expenses.forEach(x=>mv.push({date:x.date,t:'out',l:`${x.purpose||'مصروف'} — ${c.name}`,a:x.amount}));
  });
  state.vaultAdjust.forEach(x=>mv.push({date:x.date,t:x.amount>=0?'in':'out',l:'تسوية: '+(x.note||''),a:Math.abs(x.amount)}));
  mv.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  h+=`<div class="section-title">آخر الحركات</div><div class="list">`;
  if(!mv.length)h+=`<div class="empty"><div class="ic">📭</div>لا حركات</div>`;
  mv.slice(0,50).forEach(m=>h+=`<div class="row"><div class="info"><div class="name">${m.l}</div><div class="sub">${m.date||'—'}</div></div>
    <div class="amt ${m.t==='in'?'g':'r'}">${m.t==='in'?'+':'−'}${fmt(m.a)}</div></div>`);
  h+=`</div>`;return h;
}
function companies(){
  let h=`<div class="section-title">🏢 الشركات (${state.companies.length})</div><div class="list">`;
  state.companies.forEach(c=>{const t=totals(c);
    h+=`<div class="row" onclick="openCompany('${c.id}')"><div class="info">
      <div class="name">${c.name} <span class="chip">${c.partners.length} شركاء</span></div>
      <div class="sub">مصاريف ${fmt(t.exp)} • إيراد ${fmt(t.rev)} • مدفوع ${fmt(t.paid)}</div></div>
      <div class="amt ${t.companyBalance>=0?'g':'r'}">${fmt(t.companyBalance)}</div></div>`;});
  h+=`</div>`;return h;
}
function companyDetail(){
  const c=state.companies.find(x=>x.id===selCompany);if(!c)return companies();
  const t=totals(c);const ssum=shareSum(c);
  let h=`<button class="btn-o btn-sm" onclick="selCompany=null;render()">← رجوع</button>
   <div class="section-title">🏢 ${c.name}</div>
   <div class="cards">
    <div class="stat"><div class="lbl">مصروفات</div><div class="val r">${fmt(t.exp)}</div></div>
    <div class="stat"><div class="lbl">إيراد بيع</div><div class="val c">${fmt(t.rev)}</div></div>
    <div class="stat"><div class="lbl">مدفوعات الشركاء</div><div class="val b">${fmt(t.paid)}</div></div>
    <div class="stat"><div class="lbl">صافي مطلوب (مصاريف−إيراد)</div><div class="val">${fmt(t.netDue)}</div></div>
   </div>`;
  // أزرار
  h+=`<div class="btns" style="margin:8px 0 4px">
    <button class="btn-r btn-sm" onclick="mExpense('${c.id}')">− مصروف</button>
    <button class="btn-g btn-sm" onclick="mRevenue('${c.id}')">+ إيراد بيع</button>
    <button class="btn-p btn-sm" onclick="mPayment('${c.id}')">💵 دفعة شريك</button>
    <button class="btn-o btn-sm" onclick="mShares('${c.id}')">⚙ نسب الشركاء</button></div>`;
  // مواقف الشركاء
  h+=`<div class="section-title">👥 مواقف الشركاء</div>
   <small class="muted">${ssum!==100?'⚠ مجموع النسب '+ssum+'% (المفروض 100%) — اضغط نسب الشركاء':'مجموع النسب 100% ✓'}</small>
   <div class="tbl-wrap" style="margin-top:8px"><table><thead><tr>
   <th>الشريك</th><th>النسبة</th><th>عليه مصاريف</th><th>له إيراد</th><th>دفع</th><th>الموقف</th></tr></thead><tbody>`;
  c.partners.forEach(p=>{const st=partnerStanding(c,p);const neg=st.standing<0;
    h+=`<tr><td>${p.name}</td><td>${(st.fr*100).toFixed(1)}%</td>
     <td class="amt r">${fmt(st.dueShareExp)}</td><td class="amt g">${fmt(st.revShare)}</td>
     <td class="amt b">${fmt(st.paidFor)}</td>
     <td class="amt ${neg?'r':'g'}">${neg?'عليه ':'له '}${fmt(Math.abs(st.standing))}</td></tr>`;});
  h+=`</tbody></table></div>`;
  // الدفعات
  h+=`<div class="section-title">💵 الدفعات (${c.payments.length})</div><div class="tbl-wrap"><table>
   <thead><tr><th>التاريخ</th><th>الدافع</th><th>عن</th><th>المبلغ</th><th></th></tr></thead><tbody>`;
  c.payments.slice().reverse().forEach(p=>h+=`<tr><td>${p.date||'—'}</td><td>${p.payerName}</td>
   <td>${p.onBehalfName&&p.onBehalfName!==p.payerName?p.onBehalfName:'نفسه'}</td>
   <td class="amt g">${fmt(p.amount)}</td>
   <td><button class="btn-o btn-sm" onclick="del('${c.id}','payments','${p.id}')">🗑</button></td></tr>`);
  if(!c.payments.length)h+=`<tr><td colspan="5" class="empty">لا دفعات</td></tr>`;
  h+=`</tbody></table></div>`;
  // الإيراد
  h+=`<div class="section-title">📈 الإيراد (${c.revenues.length})</div><div class="tbl-wrap"><table>
   <thead><tr><th>التاريخ</th><th>المصدر</th><th>المبلغ</th><th></th></tr></thead><tbody>`;
  c.revenues.slice().reverse().forEach(r=>h+=`<tr><td>${r.date||'—'}</td><td>${r.source||''}</td>
   <td class="amt g">${fmt(r.amount)}</td>
   <td><button class="btn-o btn-sm" onclick="del('${c.id}','revenues','${r.id}')">🗑</button></td></tr>`);
  if(!c.revenues.length)h+=`<tr><td colspan="4" class="empty">لا إيراد</td></tr>`;
  h+=`</tbody></table></div>`;
  // المصاريف
  h+=`<div class="section-title">💸 المصروفات (${c.expenses.length})</div><div class="tbl-wrap"><table>
   <thead><tr><th>التاريخ</th><th>الغرض</th><th>المبلغ</th><th></th></tr></thead><tbody>`;
  c.expenses.slice().reverse().forEach(e=>h+=`<tr><td>${e.date||'—'}</td><td>${e.purpose||''}</td>
   <td class="amt r">${fmt(e.amount)}</td>
   <td><button class="btn-o btn-sm" onclick="del('${c.id}','expenses','${e.id}')">🗑</button></td></tr>`);
  if(!c.expenses.length)h+=`<tr><td colspan="4" class="empty">لا مصروفات</td></tr>`;
  h+=`</tbody></table></div>`;
  return h;
}
function partners(){
  const ps=allPartners();
  let h=`<div class="section-title">👥 الشركاء (${ps.length})</div>
   <small class="muted">الموقف = دفع − نصيبه من المصاريف + نصيبه من الإيراد</small><div class="list" style="margin-top:10px">`;
  ps.forEach(p=>{const neg=p.standing<0;
    h+=`<div class="row" onclick="openPartner('${encodeURIComponent(p.name)}')"><div class="info">
      <div class="name">${p.name}</div><div class="sub">${neg?'عليه (مدين)':'له (دائن)'} • في ${p.companies.length} شركة</div></div>
      <div class="amt ${neg?'r':'g'}">${neg?'−':'+'}${fmt(Math.abs(p.standing))}</div></div>`;});
  h+=`</div>`;return h;
}
function partnerDetail(){
  const ps=allPartners();const p=ps.find(x=>x.name===selPartner);if(!p)return partners();
  const neg=p.standing<0;
  let h=`<button class="btn-o btn-sm" onclick="selPartner=null;render()">← رجوع</button>
   <div class="section-title">👤 ${p.name}</div>
   <div class="cards">
    <div class="stat"><div class="lbl">الموقف الإجمالي</div><div class="val ${neg?'r':'g'}">${neg?'عليه ':'له '}${fmt(Math.abs(p.standing))}</div></div>
    <div class="stat"><div class="lbl">إجمالي ما دُفع باسمه</div><div class="val b">${fmt(p.paidFor)}</div></div>
   </div>
   <div class="section-title">موقفه في كل شركة</div><div class="tbl-wrap"><table>
   <thead><tr><th>الشركة</th><th>النسبة</th><th>عليه</th><th>له إيراد</th><th>دفع</th><th>الموقف</th></tr></thead><tbody>`;
  p.companies.forEach(co=>{const n=co.standing<0;
    h+=`<tr onclick="openCompany('${co.id}')" style="cursor:pointer"><td>${co.company}</td><td>${(co.fr*100).toFixed(1)}%</td>
     <td class="amt r">${fmt(co.dueShareExp)}</td><td class="amt g">${fmt(co.revShare)}</td>
     <td class="amt b">${fmt(co.paidFor)}</td><td class="amt ${n?'r':'g'}">${n?'عليه ':'له '}${fmt(Math.abs(co.standing))}</td></tr>`;});
  h+=`</tbody></table></div>`;return h;
}
// ===== nav =====
function openCompany(id){selCompany=id;currentTab='companies';
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.tab==='companies'));render();}
function openPartner(n){selPartner=decodeURIComponent(n);currentTab='partners';
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.tab==='partners'));render();}
// ===== modals =====
const closeModal=()=>document.getElementById('modal').classList.remove('show');
const showModal=h=>{document.getElementById('modalBox').innerHTML=h;document.getElementById('modal').classList.add('show');};
function mExpense(cid){const c=state.companies.find(x=>x.id===cid);
  showModal(`<h3>− مصروف — ${c.name}</h3><small class="muted">هيتوزّع على الشركاء بنسبهم ويُخصم من الخزنة</small>
   <div class="field" style="margin-top:12px"><label>الغرض</label><input id="f1"></div>
   <div class="field"><label>المبلغ</label><input type="number" id="f2" inputmode="numeric"></div>
   <div class="field"><label>التاريخ</label><input type="date" id="f3" value="${today()}"></div>
   <div class="modal-actions"><button class="btn-o" onclick="closeModal()">إلغاء</button>
   <button class="btn-r" onclick="sExpense('${cid}')">صرف</button></div>`);}
function sExpense(cid){const c=state.companies.find(x=>x.id===cid);const a=Number(f2.value);
  if(!a)return toast('أدخل المبلغ',1);c.expenses.push({id:uid(),amount:a,date:f3.value,purpose:f1.value});
  save();closeModal();render();toast('تم الصرف ✓');}
function mRevenue(cid){const c=state.companies.find(x=>x.id===cid);
  showModal(`<h3>+ إيراد بيع — ${c.name}</h3><small class="muted">هيتوزّع على الشركاء بنسبهم (يقلّل اللي عليهم) ويدخل الخزنة</small>
   <div class="field" style="margin-top:12px"><label>المصدر (صنف/بضاعة)</label><input id="f1"></div>
   <div class="field"><label>المبلغ</label><input type="number" id="f2" inputmode="numeric"></div>
   <div class="field"><label>التاريخ</label><input type="date" id="f3" value="${today()}"></div>
   <div class="modal-actions"><button class="btn-o" onclick="closeModal()">إلغاء</button>
   <button class="btn-g" onclick="sRevenue('${cid}')">حفظ</button></div>`);}
function sRevenue(cid){const c=state.companies.find(x=>x.id===cid);const a=Number(f2.value);
  if(!a)return toast('أدخل المبلغ',1);c.revenues.push({id:uid(),amount:a,date:f3.value,source:f1.value||'بيع'});
  save();closeModal();render();toast('تم تسجيل الإيراد ✓');}
function mPayment(cid){const c=state.companies.find(x=>x.id===cid);
  const opt=c.partners.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
  showModal(`<h3>💵 دفعة شريك — ${c.name}</h3>
   <div class="field"><label>الدافع الفعلي (اللي طلّع الفلوس)</label><select id="f_payer">${opt}</select></div>
   <div class="field"><label>نيابة عن (تُحسب لحساب مين)</label><select id="f_behalf">${opt}</select></div>
   <small class="muted">لو الدافع بيدفع عن نفسه سيب الاتنين زي بعض</small>
   <div class="field" style="margin-top:12px"><label>المبلغ</label><input type="number" id="f2" inputmode="numeric"></div>
   <div class="field"><label>التاريخ</label><input type="date" id="f3" value="${today()}"></div>
   <div class="field"><label>ملاحظة</label><input id="f4"></div>
   <div class="modal-actions"><button class="btn-o" onclick="closeModal()">إلغاء</button>
   <button class="btn-p" onclick="sPayment('${cid}')">حفظ</button></div>`);}
function sPayment(cid){const c=state.companies.find(x=>x.id===cid);const a=Number(f2.value);
  if(!a)return toast('أدخل المبلغ',1);
  c.payments.push({id:uid(),amount:a,date:f3.value,payerName:f_payer.value,onBehalfName:f_behalf.value,note:f4.value});
  save();closeModal();render();toast('تم تسجيل الدفعة ✓ ودخلت الخزنة');}
function mShares(cid){const c=state.companies.find(x=>x.id===cid);
  let rows=c.partners.map(p=>`<div class="field"><label>${p.name}</label>
    <input type="number" step="0.1" data-pid="${p.id}" class="shareInp" value="${p.share}"></div>`).join('');
  showModal(`<h3>⚙ نسب الشركاء — ${c.name}</h3><small class="muted">المجموع المفروض 100%</small>
   <div style="margin-top:12px">${rows}</div>
   <div class="field"><label>+ إضافة شريك جديد</label><input id="newp" placeholder="اسم الشريك"></div>
   <div class="modal-actions"><button class="btn-o" onclick="closeModal()">إلغاء</button>
   <button class="btn-p" onclick="sShares('${cid}')">حفظ</button></div>`);}
function sShares(cid){const c=state.companies.find(x=>x.id===cid);
  document.querySelectorAll('.shareInp').forEach(i=>{const p=c.partners.find(x=>x.id===i.dataset.pid);if(p)p.share=Number(i.value)||0;});
  const np=document.getElementById('newp').value.trim();
  if(np)c.partners.push({id:uid(),name:np,share:0});
  save();closeModal();render();toast('تم حفظ النسب ✓');}
function del(cid,arr,id){if(!confirm('تأكيد الحذف؟'))return;const c=state.companies.find(x=>x.id===cid);
  c[arr]=c[arr].filter(x=>x.id!==id);save();render();}
function fabAction(){if(currentTab==='companies'&&selCompany)return mPayment(selCompany);
  showModal(`<h3>🏢 شركة جديدة</h3><div class="field"><label>اسم الشركة</label><input id="f1"></div>
   <div class="modal-actions"><button class="btn-o" onclick="closeModal()">إلغاء</button>
   <button class="btn-p" onclick="sCompany()">إضافة</button></div>`);}
function sCompany(){const n=f1.value.trim();if(!n)return toast('أدخل الاسم',1);
  state.companies.push({id:uid(),name:n,partners:[],expenses:[],revenues:[],payments:[]});
  save();closeModal();render();toast('تمت الإضافة ✓');}
function resetSeed(){if(!confirm('هيمسح أي تعديلات يدوية ويعيد تحميل كل الشركات من الأصل. متأكد؟'))return;
  try{Object.keys(localStorage).filter(k=>k.startsWith('kzbk_')).forEach(k=>localStorage.removeItem(k));}catch(e){}
  localStorage.removeItem(KEY);state=defaultState();save();selCompany=null;selPartner=null;switchTab('companies');toast('تم تحميل '+state.companies.length+' شركة ✓');}
function exportBackup(){const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='khazna_'+today()+'.json';a.click();toast('تم التنزيل ✓');}
function importBackup(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.companies){state=d;save();render();toast('تم الاسترجاع ✓');}else toast('ملف غير صالح',1);}catch(x){toast('خطأ',1);}};
  r.readAsText(f);ev.target.value='';}
function toast(m,err){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2200);}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
load();render();
</script>
</body>
</html>
