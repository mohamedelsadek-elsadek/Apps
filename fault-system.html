<style>
:root{
  --bg:#111417; --panel:#1a1f24; --panel2:#21272e; --line:#2e363f;
  --text:#e8eaed; --muted:#9aa5b1;
  --amber:#f5a623; --amber-dim:#3a2f14;
  --red:#e5484d; --blue:#4c9aff; --green:#3dd68c; --purple:#b78bf7;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;font-size:15px;padding-bottom:90px}
header{position:sticky;top:0;z-index:50;background:rgba(17,20,23,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
header h1{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
header h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber)}
.userchip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap}
.userchip b{color:var(--text)}
main{max-width:760px;margin:0 auto;padding:14px}
.tabs{position:fixed;bottom:0;right:0;left:0;z-index:50;display:flex;background:rgba(17,20,23,.95);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;text-align:center;padding:10px 4px 8px;color:var(--muted);font-size:11px;cursor:pointer;border-top:2px solid transparent}
.tab .ic{font-size:20px;display:block;margin-bottom:2px}
.tab.active{color:var(--amber);border-top-color:var(--amber)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--muted);font-weight:700}
label{display:block;font-size:12.5px;color:var(--muted);margin:10px 0 5px}
select,input,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px 12px;font-size:15px;font-family:inherit;-webkit-appearance:none;appearance:none}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--amber)}
textarea{min-height:70px;resize:vertical}
.btn{display:inline-block;width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;text-align:center;margin-top:12px}
.btn-amber{background:var(--amber);color:#1a1408}
.btn-blue{background:var(--blue);color:#06121f}
.btn-green{background:var(--green);color:#062015}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-sm{width:auto;padding:8px 14px;font-size:13px;margin-top:8px;margin-inline-end:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sev{display:flex;gap:8px;margin-top:5px}
.sev span{flex:1;text-align:center;padding:9px 4px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);font-size:13px;cursor:pointer;color:var(--muted)}
.sev span.on-critical{background:#3a1214;border-color:var(--red);color:var(--red);font-weight:800}
.sev span.on-high{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);font-weight:800}
.sev span.on-med{background:#122a3f;border-color:var(--blue);color:var(--blue);font-weight:800}
.sev span.on-low{background:#12301f;border-color:var(--green);color:var(--green);font-weight:800}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.fchip{white-space:nowrap;padding:7px 13px;border-radius:18px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;cursor:pointer}
.fchip.active{background:var(--amber);border-color:var(--amber);color:#1a1408;font-weight:800}
.fchip .n{opacity:.75;font-size:12px}
.rep{border-radius:var(--radius);border:1px solid var(--line);background:var(--panel);margin-bottom:12px;overflow:hidden}
.rep .top{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.rep .title{font-weight:800;font-size:15px}
.rep .sub{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.6}
.badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;white-space:nowrap}
.b-new{background:#3a1214;color:var(--red)}
.b-prog{background:#122a3f;color:var(--blue)}
.b-fixed{background:var(--amber-dim);color:var(--amber)}
.b-conf{background:#12301f;color:var(--green)}
.rep .stripe{height:3px}
.s-critical{background:var(--red)}.s-high{background:var(--amber)}.s-med{background:var(--blue)}.s-low{background:var(--green)}
.rep .body{padding:0 14px 12px;border-top:1px dashed var(--line)}
.timeline{margin-top:10px}
.tstep{display:flex;gap:10px;font-size:12.5px;color:var(--muted);padding:4px 0}
.tstep .mark{width:8px;height:8px;border-radius:50%;background:var(--line);margin-top:5px;flex-shrink:0}
.tstep.done .mark{background:var(--green)}
.tstep b{color:var(--text)}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;line-height:2}
.empty .big{font-size:44px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;text-align:center}
.stat .v{font-size:26px;font-weight:900}
.stat .l{font-size:12px;color:var(--muted);margin-top:3px}
.bar-row{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px}
.bar-row .nm{width:110px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .tr{flex:1;background:var(--panel2);border-radius:6px;height:18px;overflow:hidden}
.bar-row .fl{height:100%;background:var(--amber);border-radius:6px;min-width:2px}
.bar-row .ct{width:28px;text-align:left;font-weight:800}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.list-item:last-child{border-bottom:none}
.list-item .del{color:var(--red);cursor:pointer;font-size:18px;padding:0 6px}
.list-item .meta{color:var(--muted);font-size:12px}
.hint{font-size:12px;color:var(--muted);line-height:1.8;margin-top:8px}
.hint a{color:var(--blue)}
.ok-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-inline-start:6px}
.toast{position:fixed;bottom:100px;right:50%;transform:translateX(50%);background:#0c0e10;border:1px solid var(--amber);color:var(--text);padding:11px 20px;border-radius:24px;font-size:13.5px;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.5);display:none;max-width:90%;text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:760px;max-height:85vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.modal h3{margin-bottom:6px;font-size:16px}
.rep-num{font-family:ui-monospace,Menlo,monospace;color:var(--muted);font-size:11px}
.section-title{font-size:13px;font-weight:800;color:var(--amber);margin:18px 0 8px;letter-spacing:.5px}
@media(min-width:600px){.tabs{position:sticky;bottom:auto;top:57px;border-top:none;border-bottom:1px solid var(--line)}body{padding-bottom:20px}.toast{bottom:40px}}

/* ===== SLA / إضافات ===== */
.slarow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.sla{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.sla-ok{background:rgba(46,160,67,.15);color:var(--green);border:1px solid rgba(46,160,67,.35)}
.sla-warn{background:rgba(210,153,34,.15);color:var(--amber);border:1px solid rgba(210,153,34,.35)}
.sla-late{background:rgba(218,54,51,.18);color:var(--red);border:1px solid rgba(218,54,51,.4)}
.sla-rep{background:rgba(163,113,247,.15);color:var(--purple);border:1px solid rgba(163,113,247,.35)}
.sla-cost{background:rgba(210,153,34,.12);color:var(--amber);border:1px solid rgba(210,153,34,.3)}
.sla-esc{background:rgba(218,54,51,.25);color:#fff;border:1px solid var(--red)}
.rep-late{box-shadow:0 0 0 1.5px rgba(218,54,51,.55)}
.b-wait{background:rgba(210,153,34,.18);color:var(--amber)}
.waitbox{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:9px}
.partsbox,.rcbox{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12px;margin-top:8px}
.rcbox{border-color:rgba(163,113,247,.4);background:rgba(163,113,247,.08)}
.rc-warn{background:rgba(218,54,51,.12);border:1px solid rgba(218,54,51,.4);border-radius:8px;padding:10px;font-size:12.5px;margin:8px 0;line-height:1.7}
/* صور */
.thumbs{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0}
.thumb{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .x{position:absolute;top:1px;left:1px;background:rgba(0,0,0,.7);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;text-align:center;cursor:pointer}
.pstrip{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;font-size:11.5px;color:var(--muted)}
.pstrip img{width:52px;height:52px;object-fit:cover;border-radius:7px;border:1px solid var(--line);cursor:pointer}
/* قطع الغيار */
.prow{display:flex;gap:7px;align-items:center;margin-bottom:6px}
.prow input{margin:0}
.prow .x{color:var(--red);cursor:pointer;font-weight:800;padding:0 5px}
/* الوقائية */
.pmrow{display:flex;justify-content:space-between;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-right:3px solid var(--green);border-radius:8px;padding:9px 11px;margin-bottom:7px}
.pmi{flex:1}
.pmi .meta{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.6}
.pmb{display:flex;align-items:center;gap:7px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.stats .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center}
.stats .n{font-size:22px;font-weight:800}
.stats .l{font-size:11px;color:var(--muted)}
/* إعدادات SLA */
.slaedit{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:8px}
.slaedit b{font-size:13px}
/* أعمدة الالتزام */
.barrow{display:flex;align-items:center;gap:9px;margin-bottom:8px;font-size:12px}
.barrow .bl{min-width:78px}
.barrow .bt{flex:1;height:9px;background:var(--panel2);border-radius:6px;overflow:hidden}
.barrow .bf{height:100%;border-radius:6px}
.barrow .bv{min-width:74px;text-align:left;font-weight:700}
.bignum{font-size:30px;font-weight:800;color:var(--amber);text-align:center;padding:8px 0}
.bignum small{font-size:14px;color:var(--muted)}
/* شارة التبويب */
.tab{position:relative}
.tbadge{position:absolute;top:3px;left:50%;margin-left:8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:15px;height:15px;line-height:15px;border-radius:8px;padding:0 3px;display:none}

/* ===== المستخدمين ===== */
.rgrp{font-size:11px;font-weight:800;color:var(--muted);margin:11px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--line)}
.rgrp small{font-weight:400;opacity:.7}
.urow{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:6px}
.ui{flex:1;min-width:0}
.ui b{font-size:13.5px}
.ui .meta{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.6}
.ub{display:flex;align-items:center;gap:5px;flex:0 0 auto}
.cbtn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;text-decoration:none;font-size:14px;border:1px solid var(--line)}
.cbtn-sm{width:29px;height:29px;font-size:13px}
.c-tel{background:rgba(88,166,255,.14);border-color:rgba(88,166,255,.4)}
.c-wa{background:rgba(46,160,67,.14);border-color:rgba(46,160,67,.4)}
.cbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.crow{display:flex;align-items:center;gap:5px}
.crow small{font-size:10.5px;color:var(--muted)}
.fchk{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.fc{display:flex;align-items:center;gap:7px;font-size:13px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px 10px;cursor:pointer;margin:0}
.fc input{width:auto;margin:0}
.permbox{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px;margin:10px 0}
.scope{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);border-radius:8px;padding:8px 11px;font-size:12px;margin-bottom:10px}

/* ===== إصلاح خانات الاختيار =====
   السطر العام فيه appearance:none — بيلغي رسم الـ checkbox الأصلي.
   فبنرسمها بنفسنا عشان تبان ✓ واضحة. */
input[type=checkbox]{
  -webkit-appearance:none;appearance:none;
  width:24px !important;height:24px;min-width:24px;flex:0 0 auto;
  padding:0 !important;margin:0;
  border:2px solid #4a5568;border-radius:6px;
  background:var(--bg);
  position:relative;cursor:pointer;
  transition:.12s;
}
input[type=checkbox]:checked{background:var(--green);border-color:var(--green)}
input[type=checkbox]:checked::after{
  content:"";position:absolute;
  right:7px;top:2.5px;width:6px;height:12px;
  border:solid #fff;border-width:0 0 2.6px 2.6px;
  transform:rotate(-45deg);
}
input[type=checkbox]:active{transform:scale(.9)}
/* الصف كله يبقى قابل للضغط */
.fc{
  display:flex;align-items:center;gap:10px;font-size:14px;
  background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  padding:11px 12px;cursor:pointer;margin:0 0 6px;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:.12s;
}
.fc:active{background:var(--panel);border-color:var(--green)}
.fc:has(input:checked){background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.5)}
.fc input{width:24px !important;margin:0}
/* خانات الإعدادات */
.permbox label,.card>label:has(input[type=checkbox]){
  display:flex;align-items:center;gap:9px;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}

/* ===== الرقم السري ===== */
.pindots{display:flex;justify-content:center;gap:11px;margin:16px 0 8px}
.pd{width:13px;height:13px;border-radius:50%;border:2px solid var(--line);background:transparent;transition:.15s}
.pd.on{background:var(--green);border-color:var(--green);transform:scale(1.15)}
.pinmsg{text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:12px;min-height:18px}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.keys button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:15px 0;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.keys button:active{border-color:var(--green);background:var(--panel);transform:scale(.95)}

.pinbox{
  width:100%;text-align:center;letter-spacing:6px;font-size:20px;font-weight:800;
  padding:14px 12px;margin:14px 0 6px;
}
.pinbox::placeholder{letter-spacing:normal;font-size:14px;font-weight:400}
.keys .k-go{background:rgba(46,160,67,.18);border-color:rgba(46,160,67,.5);color:var(--green)}
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span>أعطال المزارع <span style="font-size:9px;color:var(--green);font-weight:800;vertical-align:super">v7</span></h1>
  <div class="userchip" onclick="openUserPicker()">👤 <b id="curUserName">اختر المستخدم</b></div>
</header>

<main id="main"></main>

<div class="tabs">
  <div class="tab active" data-tab="reports" onclick="go('reports')"><span class="ic">📋</span>البلاغات</div>
  <div class="tab" data-tab="new" onclick="go('new')"><span class="ic">🚨</span>بلاغ جديد</div>
  <div class="tab" data-tab="pm" onclick="go('pm')"><span class="ic">🛡️</span>وقائية<span class="tbadge" id="pmBadge"></span></div>
  <div class="tab" data-tab="stats" onclick="go('stats')"><span class="ic">📊</span>التقارير</div>
  <div class="tab" data-tab="settings" onclick="go('settings')"><span class="ic">⚙️</span>الإعدادات</div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>

<script>
/* ================= الحالة والتخزين ================= */
var LS_KEY='faultsys_v1';
var S=null;

function defaultCatalog(){
  return {
    "كهرباء":["انقطاع تيار كهربائي","عطل لوحة كهرباء","ماس كهربائي / سلك مقطوع","عطل تايمر","انخفاض / ارتفاع الجهد","عطل مفتاح أوتوماتيك"],
    "مولد":["المولد لا يعمل","عطل سلف / بطارية","تسريب وقود أو زيت","سخونة زائدة","عطل لوحة التحويل ATS","نقص وقود"],
    "تهوية":["عطل شفاط","عطل موتور شفاط","سير مقطوع / مرتخي","عطل دمبر / فتحات هواء","عطل ستائر","عطل حساس حرارة","عطل كنترول التهوية"],
    "تبريد":["عطل خلايا تبريد","عطل طلمبة مياه الخلايا","انسداد / تكلس الخلايا","تسريب مياه من الخلايا","عطل فوجر / رشاشات"],

   ليه ID ثابت: عشان المزامنة ماتعملش نسخة تانية على كل جهاز.
   وبتتنادى بعد أي سحب من السحابة — عشان السحابة القديمة ماتدهسش عليه. */
var SUPER_ID='SUPER-ADMIN-1';
function ensureSuper(){
  if(!S.users)S.users=[];
  var u=null;
  for(var i=0;i<S.users.length;i++){ if(S.users[i].id===SUPER_ID){u=S.users[i];break} }
  if(!u){
    /* لو فيه حساب بنفس الاسم اتعمل يدوي، اعتمده بدل ما نكرّر */
    for(var i=0;i<S.users.length;i++){
      var n=String(S.users[i].name||'').toLowerCase().replace(/[^a-z]/g,'');
      if(n==='mohamedelsadek'){ u=S.users[i]; u.id=SUPER_ID; break; }
    }
  }
  if(!u){
    u={id:SUPER_ID,name:'Mohamed Elsadek',role:'super',pin:'admin',phone:'',farmIds:[],perms:null};
    S.users.unshift(u);
  }
  /* الحساب ده سوبر أدمن دايمًا — مايتغيّرش */
  u.role='super';
  if(!u.pin)u.pin='admin';
  if(u.phone==null)u.phone='';
  if(!u.farmIds)u.farmIds=[];
  u.perms=null;
  return u;
}

function load(){
  try{var r=localStorage.getItem(LS_KEY); S=r?JSON.parse(r):defaultState();}catch(e){S=defaultState();}
  if(!S.catalog)S.catalog=defaultCatalog();
  if(!S.fb)S.fb={}; if(!S.fb.url)S.fb.url=DEFAULT_FB_URL;
  /* ترقية النسخ القديمة — بدون ما نلمس بياناتك */
  var d=defaultState();
  if(!S.sla)S.sla=d.sla;
  if(!S.esc)S.esc=d.esc;
  if(!S.pm)S.pm=[];
  if(!S.cost)S.cost=d.cost;
  for(var i=0;i<S.users.length;i++){
    var uu=S.users[i];
    if(uu.phone==null)uu.phone="";
    if(!uu.farmIds)uu.farmIds=[];
    if(!uu.perms)uu.perms=null;
    if(!uu.pin)uu.pin="1234";          /* الكل يبدأ بـ 1234 */
  }
  /* التصنيفات الجديدة (مصنع/معدات) تتضاف للقوايم القديمة من غير ما نلمس اللي موجود */
  var _dc=defaultCatalog();
  for(var c in _dc){ if(!S.catalog[c]) S.catalog[c]=_dc[c].slice(); }
  /* المواقع: النوع الافتراضي مزرعة */
  for(var i=0;i<S.farms.length;i++){ if(!S.farms[i].type)S.farms[i].type='farm'; }
  ensureSuper();
  for(var i=0;i<S.reports.length;i++){
    var x=S.reports[i];
    if(!x.parts)x.parts=[];
    if(!x.photos)x.photos={before:[],after:[]};
    if(x.waitTotal==null)x.waitTotal=0;
    if(!x.escLog)x.escLog=[];
    if(x.rootCause==null)x.rootCause="";
  }
}

     'onkeydown="if(event.key===\'Enter\')pinGo()">';

function pinKey(n){
  var e=document.getElementById('pinIn'); if(!e)return;
  if(n===-1){ e.value=e.value.slice(0,-1); _pinBuf=e.value; return; }
  if(e.value.length>=20)return;
  e.value+=n; _pinBuf=e.value;
  /* لو رقمه ٤ أرقام بالظبط، ادخل تلقائي */
  var u=userById(_pinFor);
  if(u && String(u.pin||"1234").length===4 && _pinBuf.length===4) setTimeout(pinGo,140);
}
function pinGo(){
  var u=userById(_pinFor); if(!u)return;
  var e=document.getElementById('pinIn');
  if(e)_pinBuf=e.value;
  if(String(u.pin||"1234")!==_pinBuf){
    var m=document.getElementById('pinMsg');
    if(m){m.textContent="❌ الرقم السري غلط — جرّب تاني";m.style.color="var(--red)"}

/* ================= محرّك الـ SLA ================= */
function slaFor(r){ var s=(S.sla&&S.sla[r.severity])||{resp:240,fix:1440}; return s; }
/* وقت الانتظار (منتظر قطعة) مابيتحسبش على الفني */
function waitMs(r){
  var w=r.waitTotal||0;
  if(r.status==='wait'&&r.waitTs)w+=now()-r.waitTs;
  return w;
}
function respMins(r){                       /* دقايق لحد الاستلام */
  var end=r.startTs||now();
  return Math.round((end-r.ts)/60000);
}
function fixMins(r){                        /* دقايق لحد الإصلاح — ناقص وقت انتظار القطع */
  var end=r.fixTs||now();
  return Math.round(((end-r.ts)-waitMs(r))/60000);
}
function respLate(r){ return respMins(r) > slaFor(r).resp; }
function fixLate(r){ return fixMins(r) > slaFor(r).fix; }
/* حالة البلاغ مقابل الـ SLA: ok | warn | late */
function slaState(r){
  if(r.status==='conf'||r.status==='fixed'){
    return (respLate(r)||fixLate(r))?'late':'ok';
  }
  var f=slaFor(r);
  if(!r.startTs && respLate(r)) return 'late';
  if(fixLate(r)) return 'late';
  var m=fixMins(r);
  if(m > f.fix*0.75) return 'warn';
  if(!r.startTs && respMins(r) > f.resp*0.75) return 'warn';
  return 'ok';
}
function slaBadge(r){
  var st=slaState(r), f=slaFor(r);
  if(st==='ok') return '<span class="sla sla-ok">داخل الوقت</span>';
  if(st==='warn') return '<span class="sla sla-warn">قرّب يتأخر</span>';
  var why = (!r.startTs && respLate(r)) ? ('استلام متأخر ('+mmm(respMins(r))+' / '+mmm(f.resp)+')')
          : ('إصلاح متأخر ('+mmm(fixMins(r))+' / '+mmm(f.fix)+')');
  return '<span class="sla sla-late">⚠️ '+why+'</span>';
}
function mmm(m){
  m=Math.max(0,Math.round(m));
  if(m<60) return m+' د';
  var h=Math.floor(m/60), r=m%60;
  if(h<24) return h+' س'+(r?' '+r+' د':'');
  var d=Math.floor(h/24); return d+' يوم'+(h%24?' '+(h%24)+' س':'');
}

/* بيشتغل عند فتح البرنامج وكل دقيقة وهو مفتوح */
function checkEsc(){
  if(!S.esc||!S.esc.on||!tgReady())return;
  var changed=false;
  for(var i=0;i<S.reports.length;i++){
    var r=S.reports[i];
    if(!OPEN_ST[r.status])continue;
    if(S.esc.sevs.indexOf(r.severity)<0)continue;
    if(r.status==='wait')continue;                /* منتظر قطعة — مش ذنب الفني */
    if(!r.escLog)r.escLog=[];
    var mins=Math.round((now()-r.ts-waitMs(r))/60000);
    for(var j=0;j<S.esc.steps.length;j++){
      var st=S.esc.steps[j];
      if(mins < st.min)continue;
      var done=r.escLog.some(function(e){return e.level===(j+1)});
      if(done)continue;
      (function(rep,step,lvl){
        tgSend(msgEsc(rep,step,lvl),function(ok){ });
      })(r,st,j+1);
      r.escLog.push({level:j+1,at:now(),role:st.role});
      changed=true;
    }
  }
  if(changed){ save(); if(TAB==='reports')render(); }
}

function repeatCount(r){
  var n=0;
  for(var i=0;i<S.reports.length;i++){
    var x=S.reports[i];
    if(x.farmId===r.farmId && String(x.house)===String(r.house) && x.fault===r.fault) n++;
  }
  return n;
}
function needsRoot(r){ return repeatCount(r)>=3; }

/* ================= تكلفة التعطّل ================= */
function downtimeCost(r){
  if(!S.cost||!S.cost.on)return null;
  if(['تهوية','تبريد','كهرباء','مولد'].indexOf(r.category)<0)return null;  /* الأعطال اللي بتأثر على الطيور */
  if(r.severity!=='critical'&&r.severity!=='high')return null;
  var hrs=((r.fixTs||now())-r.ts-waitMs(r))/36e5;
  var f=(S.cost.perBirdHour||0)*(S.cost.birds||0);
  var c=hrs*f*(r.severity==='critical'?1:0.35);
  return Math.round(c);
}


/* ================= الصور (مضغوطة) =================
   بنصغّرها لـ 900px و JPEG 55% — عشان تعدّي في localStorage و Firebase */
function compressImg(file, cb){
  var rd=new FileReader();
  rd.onload=function(){
    var img=new Image();
    img.onload=function(){
      var MX=900, w=img.width, h=img.height;
      if(w>MX||h>MX){ if(w>h){h=Math.round(h*MX/w);w=MX;} else {w=Math.round(w*MX/h);h=MX;} }
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      try{ cb(c.toDataURL('image/jpeg',0.55)); }catch(e){ cb(null); }
    };
    img.onerror=function(){cb(null)};
    img.src=rd.result;
  };
  rd.onerror=function(){cb(null)};
  rd.readAsDataURL(file);
}

/* المستخدم بيشوف بلاغات مزارعه بس — إلا لو معاه صلاحية "كل المزارع" */

  var u=curUser();
  if(!u)return S.reports;
  if(can('allFarms'))return S.reports;
  var ids=u.farmIds||[];
  if(!ids.length)return S.reports;
  return S.reports.filter(function(r){return ids.indexOf(r.farmId)>=0});
}
function renderReports(){
  var u=curUser();
  var src=myReports();
  var counts={open:0,new:0,prog:0,wait:0,fixed:0,conf:0};
  for(var i=0;i<src.length;i++){var st=src[i].status; if(counts[st]!=null)counts[st]++; if(st!=='conf')counts.open++;}
  var h='';
  if(u&&!can('allFarms')&&(u.farmIds||[]).length)
    h+='<div class="scope">👁️ بتشوف بلاغات: <b>'+esc(farmNames(u))+'</b> بس</div>';
  h+='<div class="filters">';
  var fl=[['open','مفتوحة',counts.open],['new','جديدة',counts.new],['prog','جاري الإصلاح',counts.prog],['wait','منتظر قطعة',counts.wait],['fixed','منتظرة تأكيد',counts.fixed],['conf','مقفولة',counts.conf],['all','الكل',src.length]];
  for(var j=0;j<fl.length;j++){h+='<span class="fchip'+(FILTER===fl[j][0]?' active':'')+'" onclick="FILTER=\''+fl[j][0]+'\';render()">'+fl[j][1]+' <span class="n">'+fl[j][2]+'</span></span>';}
  h+='</div>';
  var list=[];
  for(var k=0;k<src.length;k++){var r=src[k];
    if(FILTER==='all'||(FILTER==='open'&&r.status!=='conf')||r.status===FILTER)list.push(r);}
  /* المتأخر الأول */
  list.sort(function(a,b){
    var la=(OPEN_ST[a.status]&&slaState(a)==='late')?1:0, lb=(OPEN_ST[b.status]&&slaState(b)==='late')?1:0;
    if(la!==lb)return lb-la;
    return b.ts-a.ts;
  });
  if(!list.length){ h+='<div class="empty"><div class="big">🛠️</div>مفيش بلاغات هنا<br>لو فيه عطل، سجّله من تبويب «بلاغ جديد»</div>'; return h; }
  for(var m=0;m<list.length;m++)h+=repCard(list[m]);

  h+=tstep(!!r.fixTs,'الإصلاح'+(r.fixTs?' — '+esc(r.fixedBy)+' · '+fmtDT(r.fixTs)+(r.fixDesc?' · <b>'+esc(r.fixDesc)+'</b>':''):''));
  h+=tstep(!!r.confTs,'تأكيد المبلّغ'+(r.confTs?' · '+fmtDT(r.confTs):''));

  /* اتصال سريع — بيوفّر وقت في الأعطال الحرجة */
  var _rep=userById(r.reporterId);

  }
  if(_cb)h+='<div class="cbar">'+_cb+'</div>';
  if(r.status==='new' && can('fix')) h+='<button class="btn btn-blue btn-sm" onclick="startFix(\''+r.id+'\')">🔧 استلام البلاغ</button>';

var _pn=0;

function collectParts(){

function doFix(id){

    r.rootCause=v;

  }
  if(r.waitTs){ r.waitTotal=(r.waitTotal||0)+(now()-r.waitTs); r.waitTs=0; }

  r.status='fixed'; r.fixTs=now(); r.fixedBy=u.name;

function confirmFix(id){

function delReport(id){

       '<div class="pmb">'+(can('pmDone')?'<button class="btn btn-green btn-sm" onclick="pmDone(\''+t.id+'\')">✔ اتعملت</button>':'')+

}
function pmSeed(){
  var p=pmPresets(), t=now();
  for(var i=0;i<p.length;i++){
    S.pm.push({id:uid(),name:p[i].name,cat:p[i].cat,days:p[i].days,farmId:"",farmName:"",lastDone:0,startFrom:t});
  }

}
function openPMModal(){
  var h='<h3 style="margin-bottom:10px">➕ مهمة صيانة وقائية</h3>';
  h+='<label>اسم المهمة</label><input id="pmName" placeholder="مثال: تنظيف خلايا التبريد">';

function pmAdd(){
  var n=(document.getElementById('pmName').value||'').trim();
  if(!n){toast("اكتب اسم المهمة");return}
  var fid=document.getElementById('pmFarm').value, fn="";
  for(var i=0;i<S.farms.length;i++)if(S.farms[i].id===fid)fn=S.farms[i].name;
  S.pm.push({id:uid(),name:n,cat:document.getElementById('pmCat').value,
    days:parseInt(document.getElementById('pmDays').value,10)||30,
    farmId:fid,farmName:fn,lastDone:0,startFrom:now()});
  save(); closeModal(); render(); toast("✅ اتضافت");
}
function pmDone(id){
  for(var i=0;i<S.pm.length;i++){ if(S.pm[i].id===id){ S.pm[i].lastDone=now(); break; } }
  save(); render(); toast("✔ اتسجلت — الموعد الجاي اتحسب");
}
function pmDel(id){
  if(!confirm("تحذف المهمة دي؟"))return;
  S.pm=S.pm.filter(function(t){return t.id!==id});
  save(); render(); toast("اتحذفت");
}
/* تنبيه تليجرام بالمستحق — مرة في اليوم */
function pmNotify(){
  if(!tgReady())return;
  var k='pm_notified'; var t=new Date().toDateString();
  var last=null; try{last=localStorage.getItem(k)}catch(e){}
  if(last===t)return;
  var due=S.pm.filter(function(x){return pmState(x)!=='ok'});
  if(!due.length)return;
  var msg="🛡️ صيانة وقائية مستحقة النهاردة ("+due.length+")\n\n";
  due.slice(0,12).forEach(function(x){
    var d=pmDaysLeft(x);
    msg+=(d<0?"⛔ ":"⏰ ")+x.name+(x.farmName?" — "+x.farmName:"")+(d<0?(" (متأخرة "+Math.abs(d)+" يوم)"):(d===0?" (النهاردة)":" (باقي "+d+" يوم)"))+"\n";
  });
  tgSend(msg,function(){ try{localStorage.setItem(k,t)}catch(e){} });
}

/* ================= التقارير والإحصائيات ================= */
function renderStats(){
  var open=0,critOpen=0,fixedCount=0,totalHrs=0,lateCount=0,closedCount=0,cost=0;
  var byCat={},byFarm={},repeat={},byMonth={},parts={},roots={};
  for(var i=0;i<S.reports.length;i++){var r=S.reports[i];
    if(OPEN_ST[r.status]||r.status==='fixed')open++;
    if(OPEN_ST[r.status]&&r.severity==='critical')critOpen++;
    if(r.fixTs){fixedCount++;totalHrs+=hoursBetween(r.ts,r.fixTs);}
    if(r.status==='conf'||r.status==='fixed'){ closedCount++; if(respLate(r)||fixLate(r))lateCount++; }
    byCat[r.category]=(byCat[r.category]||0)+1;
    byFarm[r.farmName]=(byFarm[r.farmName]||0)+1;
    var key=r.farmName+" ع"+r.house+" — "+r.fault;
    repeat[key]=(repeat[key]||0)+1;
    var mo=new Date(r.ts).getMonth();
    if(!byMonth[mo])byMonth[mo]={};
    byMonth[mo][r.category]=(byMonth[mo][r.category]||0)+1;
    if(r.parts)r.parts.forEach(function(p){parts[p.name]=(parts[p.name]||0)+(p.qty||1)});
    if(r.rootCause)roots[r.rootCause]=(roots[r.rootCause]||0)+1;
    var c=downtimeCost(r); if(c)cost+=c;
  }
  var avg=fixedCount?Math.round(totalHrs/fixedCount*10)/10:0;
  var comply=closedCount?Math.round((closedCount-lateCount)/closedCount*100):100;
  var ccol=comply>=90?'var(--green)':(comply>=70?'var(--amber)':'var(--red)');

  var h='<div class="stat-grid">'+
  '<div class="stat"><div class="v" style="color:var(--red)">'+open+'</div><div class="l">بلاغات مفتوحة</div></div>'+
  '<div class="stat"><div class="v" style="color:var(--amber)">'+critOpen+'</div><div class="l">حرجة مفتوحة</div></div>'+
  '<div class="stat"><div class="v" style="color:'+ccol+'">'+comply+'%</div><div class="l">الالتزام بالـ SLA</div></div>'+
  '<div class="stat"><div class="v" style="color:var(--blue)">'+avg+'</div><div class="l">متوسط ساعات الإصلاح</div></div></div>';

  /* الالتزام بالـ SLA لكل درجة */
  h+='<div class="card"><h3>⏱️ الالتزام بزمن الاستجابة (SLA)</h3>';
  var sevOrder=['critical','high','med','low'], any=false;
  for(var si=0;si<sevOrder.length;si++){
    var sv=sevOrder[si], tot=0, ok=0;
    for(var k2=0;k2<S.reports.length;k2++){
      var rr=S.reports[k2];
      if(rr.severity!==sv)continue;
      if(rr.status!=='conf'&&rr.status!=='fixed')continue;
      tot++; if(!respLate(rr)&&!fixLate(rr))ok++;
    }
    if(!tot)continue; any=true;
    var pc=Math.round(ok/tot*100);
    var col=pc>=90?'var(--green)':(pc>=70?'var(--amber)':'var(--red)');
    h+='<div class="barrow"><span class="bl">'+SEVS[sv]+'</span><div class="bt"><div class="bf" style="width:'+pc+'%;background:'+col+'"></div></div><span class="bv">'+pc+'% <small>('+ok+'/'+tot+')</small></span></div>';
  }
  if(!any)h+='<div class="hint">لسه مفيش بلاغات مقفولة نقيس عليها.</div>';
  else h+='<div class="hint">المستهدف: <b>٩٠٪ فأكتر</b>. أقل من ٧٠٪ يعني إما الفريق قليل أو الأزمنة المستهدفة مش واقعية — راجعها من الإعدادات.</div>';
  h+='</div>';

  /* تكلفة التعطّل */
  if(S.cost&&S.cost.on&&cost>0){
    h+='<div class="card"><h3>💸 تكلفة التعطّل التقديرية</h3>';
    h+='<div class="bignum">'+cost.toLocaleString('en-US')+' <small>ج.م</small></div>';
    h+='<div class="hint">تقدير خسارة الأعطال الحرجة/العالية في التهوية والتبريد والكهرباء والمولد.<br>'+
       'محسوبة على <b>'+(S.cost.birds||0).toLocaleString('en-US')+' طير</b> × <b>'+(S.cost.perBirdHour||0)+' ج.م/طير/ساعة</b> (نفوق + تحويل علف + وزن مفقود).<br>'+
       'عدّل الأرقام دي من الإعدادات حسب واقعك.</div></div>';
  }

  h+='<div class="card"><h3>الأعطال حسب النوع</h3>'+bars(byCat)+'</div>';
  h+='<div class="card"><h3>البلاغات حسب المزرعة</h3>'+bars(byFarm)+'</div>';

  /* الموسمية */
  var MN=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  var curMo=new Date().getMonth();
  var nxt=(curMo+1)%12;
  h+='<div class="card"><h3>🌦️ نمط موسمي — استعد للجاي</h3>';
  var seasonal=[];
  [curMo,nxt].forEach(function(m){
    if(!byMonth[m])return;
    var arr=[]; for(var c in byMonth[m])arr.push([c,byMonth[m][c]]);
    arr.sort(function(a,b){return b[1]-a[1]});
    if(arr.length)seasonal.push([m,arr.slice(0,3)]);
  });
  if(!seasonal.length)h+='<div class="hint">محتاج تاريخ أكتر (سنة على الأقل) عشان نطلّع نمط موسمي مفيد.</div>';
  else{
    seasonal.forEach(function(x){
      h+='<div class="list-item"><span><b>'+MN[x[0]]+'</b>'+(x[0]===curMo?' (الشهر ده)':' (الشهر الجاي)')+'<div class="meta">'+
         x[1].map(function(y){return y[0]+' ('+y[1]+')'}).join(' · ')+'</div></span></div>';
    });
    h+='<div class="hint">دي أكتر الفئات اللي حصل فيها أعطال في نفس الشهر تاريخيًا — جهّز قطع الغيار بتاعتها ونفّذ الصيانة الوقائية قبل ما تقع.</div>';
  }
  h+='</div>';

  /* أكتر قطع الغيار */
  var pl=[]; for(var pn in parts)pl.push([pn,parts[pn]]);
  pl.sort(function(a,b){return b[1]-a[1]});
  if(pl.length){
    h+='<div class="card"><h3>🔩 أكتر قطع الغيار استهلاكًا</h3>';
    for(var pi=0;pi<Math.min(pl.length,8);pi++)h+='<div class="list-item"><span>'+esc(pl[pi][0])+'</span><b>'+pl[pi][1]+'</b></div>';
    h+='<div class="hint">دي اللي المفروض تفضل موجودة في المخزن — كل قطعة مش متوفرة = ساعات تعطّل زيادة.</div></div>';
  }

  /* الأسباب الجذرية */
  var rl=[]; for(var rn in roots)rl.push([rn,roots[rn]]);
  rl.sort(function(a,b){return b[1]-a[1]});
  if(rl.length){
    h+='<div class="card"><h3>🎯 الأسباب الجذرية</h3>';
    for(var ri=0;ri<rl.length;ri++)h+='<div class="list-item"><span>'+esc(rl[ri][0])+'</span><b>'+rl[ri][1]+'</b></div>';
    h+='</div>';
  }

  /* المتكرر */
  var reps=[]; for(var k in repeat)if(repeat[k]>=2)reps.push([k,repeat[k]]);
  reps.sort(function(a,b){return b[1]-a[1];});
  h+='<div class="card"><h3>🔁 أعطال متكررة (نفس العنبر ونفس العطل)</h3>';
  if(!reps.length)h+='<div class="hint">مفيش تكرار لحد دلوقتي — كويس 👌</div>';
  else{
    for(var j=0;j<Math.min(reps.length,10);j++){
      var col=reps[j][1]>=3?'var(--red)':'var(--amber)';
      h+='<div class="list-item"><span>'+esc(reps[j][0])+'</span><b style="color:'+col+'">'+reps[j][1]+' مرات</b></div>';
    }
    h+='<div class="hint">⚠️ اللي وصل <b>٣ مرات</b> النظام بيطلب السبب الجذري إجباري عند الإصلاح — لأن تغيير القطعة ٣ مرات معناه المشكلة مش في القطعة.</div>';
  }
  h+='</div>';
  return h;
}
function bars(obj){
  var arr=[]; for(var k in obj)arr.push([k,obj[k]]);
  if(!arr.length)return '<div class="hint">مفيش بيانات لسه</div>';
  arr.sort(function(a,b){return b[1]-a[1];});
  var max=arr[0][1],h='';
  for(var i=0;i<arr.length;i++){h+='<div class="bar-row"><span class="nm">'+esc(arr[i][0])+'</span><span class="tr"><span class="fl" style="width:'+Math.round(arr[i][1]/max*100)+'%"></span></span><span class="ct">'+arr[i][1]+'</span></div>';}
  return h;
}

  h+='<label>Bot Token</label><input id="tgToken" dir="ltr" placeholder="123456:ABC-xxxx" value="'+esc(S.tg.token)+'">';
  h+='<label>Chat ID (بتاع الجروب)</label><input id="tgChat" dir="ltr" placeholder="-100xxxxxxxxxx" value="'+esc(S.tg.chatId)+'">';
  h+='<div class="row2"><button class="btn btn-ghost" onclick="saveTg()">حفظ</button><button class="btn btn-blue" onclick="testTg()">🧪 اختبار الإرسال</button></div>';
  h+='<div class="hint"><b>خطوات التفعيل (5 دقايق):</b><br>'+
  '1️⃣ افتح تليجرام وكلّم <b>@BotFather</b> واكتب /newbot وسمّي البوت — هيديك الـ Token.<br>'+
  '2️⃣ اعمل جروب اسمه «صيانة المزارع» وضيف فيه البوت + كل المعنيين (الفني، مدير الصيانة، مدير الإنتاج، حضرتك).<br>'+
  '3️⃣ ابعت أي رسالة في الجروب، بعدين افتح في المتصفح:<br><span dir="ltr" style="font-family:monospace;font-size:11px">api.telegram.org/bot&lt;TOKEN&gt;/getUpdates</span><br>وهتلاقي "chat":{"id":-100... — ده الـ Chat ID.<br>4️⃣ الصقهم فوق ودوس اختبار.</div></div>';
  /* المستخدمين */
  h+='<div class="card"><h3>👥 المستخدمين ('+S.users.length+')</h3><div id="usersList">';
  var _byRole={};
  for(var i=0;i<S.users.length;i++){var _u=S.users[i]; (_byRole[_u.role]=_byRole[_u.role]||[]).push(_u);}
  for(var r in ROLES){
    if(!_byRole[r])continue;
    h+='<div class="rgrp">'+ROLES[r]+' <small>('+_byRole[r].length+')</small></div>';
    for(var k=0;k<_byRole[r].length;k++){
      var u=_byRole[r][k];
      var fn=farmNames(u);
      h+='<div class="urow"><div class="ui"><b>'+(u.role==='super'?'👑 ':'')+esc(u.name)+(u.id===SUPER_ID?' <small style="color:var(--purple)">(الحساب الأساسي)</small>':'')+'</b>';
      h+='<div class="meta">'+(u.phone?'<span dir="ltr">'+esc(u.phone)+'</span>':'<span style="color:var(--amber)">⚠️ مفيش رقم</span>');
      if(u.role==='farm')h+=fn?(' · 📍 '+esc(fn)):' · <span style="color:var(--amber)">⚠️ مفيش موقع</span>';
      if(isCustom(u))h+=' · <span style="color:var(--purple)">🔑 مخصّصة</span>';
      if(String(u.pin||'1234')===defPin(u))h+=' · <span style="color:var(--amber)">🔓 لسه الافتراضي ('+defPin(u)+')</span>';
      h+='</div></div>';
      h+='<div class="ub">'+contactBtns(u,true);
      if(can('users'))h+='<button class="btn btn-ghost btn-sm" title="الرقم السري" onclick="openChangePin(\''+u.id+'\')">🔐</button>';
      h+='<button class="btn btn-ghost btn-sm" onclick="openUserEdit(\''+u.id+'\')">✏️</button>';
      if(can('users')&&u.id!==SUPER_ID)h+='<span class="del" onclick="delUser(\''+u.id+'\')">✕</span>';
      h+='</div></div>';
    }
  }
  h+='</div><button class="btn btn-ghost" style="margin-top:9px" onclick="openUserEdit(null)">➕ إضافة مستخدم</button>';
  var _noPhone=S.users.filter(function(x){return !x.phone}).length;
  var _noFarm=S.users.filter(function(x){return x.role==='farm'&&(!x.farmIds||!x.farmIds.length)}).length;
  var _defPin=S.users.filter(function(x){return String(x.pin||'1234')===defPin(x)}).length;
  var _w=[];
  if(_noPhone)_w.push(_noPhone+' من غير رقم تليفون');
  if(_noFarm)_w.push(_noFarm+' مدير موقع من غير تحديد موقع');
  if(_defPin)_w.push(_defPin+' لسه رقمهم السري افتراضي');
  if(_w.length)h+='<div class="hint" style="color:var(--amber)">⚠️ '+_w.join(' · ')+'</div>';
  if(can('grant'))h+='<div class="hint">👑 <b>إنت سوبر أدمن</b> — من حقك تضيف وتحذف أي حد، تغيّر رقمه السري من غير ما تعرف القديم، وتوزّع الصلاحيات.<br>تقدر تدي صلاحية «🔑 توزيع الصلاحيات» لأي شخص تاني من الصلاحيات المخصّصة.</div>';
  else h+='<div class="hint">🔒 توزيع الصلاحيات وتغيير الوظائف محصور على <b>👑 السوبر أدمن</b>.</div>';
  h+='</div>';
  /* المزارع */
  h+='<div class="card"><h3>📍 المواقع ('+S.farms.length+')</h3>';
  var _bt={};
  for(var j=0;j<S.farms.length;j++){var f=S.farms[j]; (_bt[siteType(f)]=_bt[siteType(f)]||[]).push(f);}
  for(var t in SITE_TYPES){
    if(!_bt[t])continue;
    h+='<div class="rgrp">'+SITE_TYPES[t].icon+' '+SITE_TYPES[t].name+' <small>('+_bt[t].length+')</small></div>';
    for(var q=0;q<_bt[t].length;q++){var f=_bt[t][q];
      h+='<div class="urow"><div class="ui"><b>'+esc(f.name)+'</b><div class="meta">'+f.houses+' '+SITE_TYPES[t].unit+'</div></div>'+
         '<div class="ub">'+(can('sites')?'<button class="btn btn-ghost btn-sm" onclick="openSiteEdit(\''+f.id+'\')">✏️</button><span class="del" onclick="delFarm(\''+f.id+'\')">✕</span>':'')+'</div></div>';}
  }
  if(can('sites'))h+='<button class="btn btn-ghost" style="margin-top:9px" onclick="openSiteEdit(null)">➕ إضافة موقع</button>';
  h+='<div class="hint">الأعطال بتختلف حسب نوع الموقع — مصنع العلف عنده طاحونة وخلاط، والمزرعة عندها تهوية وسقايات.</div></div>';
  /* قائمة الأعطال */
  h+='<div class="card"><h3>🧰 قائمة الأعطال</h3><div class="hint">تقدر تضيف عطل جديد تحت أي تصنيف — هيظهر فورًا في القوايم المنسدلة.</div>';
  h+='<label>التصنيف</label><select id="catSel">';
  for(var c in S.catalog)h+='<option>'+esc(c)+'</option>';
  h+='</select><label>اسم العطل الجديد</label><input id="newFault" placeholder="مثال: عطل انفرتر"><button class="btn btn-ghost" onclick="addFault()">➕ إضافة للعطل للقائمة</button></div>';
  /* نسخة احتياطية */
  h+='<div class="card"><h3>💾 نسخة احتياطية</h3><div class="row2"><button class="btn btn-ghost" onclick="exportJSON()">⬇️ تصدير البيانات</button><button class="btn btn-ghost" onclick="document.getElementById(\'impFile\').click()">⬆️ استيراد</button></div><input type="file" id="impFile" accept=".json" style="display:none" onchange="importJSON(this)"></div>';
  return h;
}
function saveSla(){
  var so=["critical","high","med","low"];
  for(var i=0;i<so.length;i++){
    var r=parseInt(document.getElementById('sr_'+so[i]).value,10)||60;
    var f=parseInt(document.getElementById('sf_'+so[i]).value,10)||240;
    S.sla[so[i]]={resp:r,fix:f};
  }
  save(); toast("✅ الأزمنة اتحفظت"); render();
}
function saveEsc(){
  S.esc.on=document.getElementById('escOn').checked;
  var cb=document.querySelectorAll('.escSev'), sv=[];
  for(var i=0;i<cb.length;i++)if(cb[i].checked)sv.push(cb[i].value);
  S.esc.sevs=sv;
  for(var j=0;j<S.esc.steps.length;j++){
    S.esc.steps[j].min=parseInt(document.getElementById('em_'+j).value,10)||15;
    S.esc.steps[j].role=document.getElementById('er_'+j).value;
  }
  save(); toast("✅ التصعيد اتحفظ"); render();
}
function saveCost(){
  S.cost.on=document.getElementById('costOn').checked;
  S.cost.birds=parseInt(document.getElementById('costBirds').value,10)||0;
  S.cost.perBirdHour=parseFloat(document.getElementById('costPer').value)||0;
  save(); toast("✅ اتحفظ"); render();
}
function saveTg(){ S.tg.token=document.getElementById('tgToken').value.trim(); S.tg.chatId=document.getElementById('tgChat').value.trim(); save(); toast("اتحفظ ✅"); render(); }
function testTg(){ saveTg(); if(!tgReady()){toast("اكتب التوكن والـ Chat ID الأول");return;}
  tgSend("🔔 رسالة اختبار من نظام أعطال المزارع — الربط شغال تمام ✅",function(ok,err){toast(ok?"✅ وصلت الرسالة للجروب — الربط شغال":"❌ فشل: "+err);}); }
function delUser(id){
  if(!can('users')){toast("مالكش صلاحية");return;}
  if(S.users.length<=1){toast("لازم يفضل مستخدم واحد على الأقل");return;}
  var _t=userById(id);
  if(id===SUPER_ID){toast("🔒 حساب السوبر أدمن الأساسي مايتحذفش");return;}
  /* حماية السوبر أدمن */
  if(_t&&_t.role==='super'){
    if(!can('grant')){toast("🔒 السوبر أدمن مايتحذفش إلا من سوبر أدمن تاني");return;}
    var _supers=S.users.filter(function(x){return x.role==='super'}).length;
    if(_supers<2){toast("⚠️ لازم يفضل سوبر أدمن واحد على الأقل");return;}
  }
  if(_t&&can('users',_t)){
    var _admins=S.users.filter(function(x){return can('users',x)}).length;
    if(_admins<2){toast("لازم يفضل حد واحد على الأقل معاه صلاحية إدارة المستخدمين");return;}
  }
  if(!confirm("حذف "+((_t&&_t.name)||"المستخدم")+"؟"))return;
  for(var i=0;i<S.users.length;i++)if(S.users[i].id===id)S.users.splice(i,1); if(S.curUserId===id)S.curUserId=null; save(); refreshUserChip(); render(); }
var _es=null;
function openSiteEdit(id){
  if(!can('sites')){toast("مالكش صلاحية");return}
  _es=id;
  var f=id?siteById(id):{name:"",houses:4,type:"farm"};
  var h='<h3 style="margin-bottom:10px">'+(id?'✏️ تعديل موقع':'➕ موقع جديد')+'</h3>';
  h+='<label>نوع الموقع</label><select id="esType" onchange="esTypeChanged()">';
  for(var t in SITE_TYPES)h+='<option value="'+t+'" '+(siteType(f)===t?'selected':'')+'>'+SITE_TYPES[t].icon+' '+SITE_TYPES[t].name+'</option>';
  h+='</select>';
  h+='<label>الاسم</label><input id="esName" value="'+esc(f.name)+'" placeholder="مثال: مصنع الكوثر">';
  h+='<label id="esUnitLbl">عدد الوحدات</label><input type="number" id="esHouses" value="'+(f.houses||1)+'" min="1">';
  h+='<div class="hint" id="esHint"></div>';
  h+='<div class="row2"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-green" onclick="saveSite()">حفظ</button></div>';
  openModal(h); esTypeChanged();
}
function esTypeChanged(){
  var t=document.getElementById('esType').value;
  var st=SITE_TYPES[t]||SITE_TYPES.farm;
  var l=document.getElementById('esUnitLbl'); if(l)l.textContent='عدد الـ'+st.unit+'ات';
  var hi=document.getElementById('esHint');
  if(hi)hi.innerHTML='الأعطال المتاحة للنوع ده: <b>'+(TYPE_CATS[t]||[]).join(' · ')+'</b>';
  var nm=document.getElementById('esName');
  if(nm&&!nm.value){
    nm.placeholder = t==='feedmill'?'مثال: مصنع الكوثر':(t==='feedlot'?'مثال: معلف العمدة':(t==='equip'?'مثال: معدات الورشة':'مثال: مزرعة 5'));
  }
}
function saveSite(){
  var n=(document.getElementById('esName').value||'').trim();
  if(!n){toast("اكتب اسم الموقع");return}
  var t=document.getElementById('esType').value;
  var hn=parseInt(document.getElementById('esHouses').value,10)||1;
  if(_es){ var f=siteById(_es); if(f){f.name=n;f.type=t;f.houses=hn;} }
  else S.farms.push({id:uid(),name:n,houses:hn,type:t});
  save(); closeModal(); render(); toast("✅ اتحفظ");
}
function delFarm(id){ if(!confirm("حذف المزرعة؟ (البلاغات القديمة هتفضل موجودة)"))return;
  for(var i=0;i<S.farms.length;i++)if(S.farms[i].id===id)S.farms.splice(i,1); save(); render(); }
function addFault(){ var c=document.getElementById('catSel').value, f=document.getElementById('newFault').value.trim(); if(!f)return;
  if(!S.catalog[c])S.catalog[c]=[]; S.catalog[c].push(f); S.catalogUpdatedAt=now(); save(); toast("اتضاف ✅"); render(); }
function exportJSON(){
  var data=JSON.stringify(S,null,1);
  var blob=new Blob([data],{type:"application/json"});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download="fault-system-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
}
function importJSON(inp){
  var f=inp.files[0]; if(!f)return;
  var rd=new FileReader();
  rd.onload=function(){ try{ var d=JSON.parse(rd.result); if(!d.reports)throw 0; S=d; save(); refreshUserChip(); render(); toast("✅ تم الاستيراد"); }catch(e){toast("❌ الملف مش صالح");} };
  rd.readAsText(f);
}

/* ================= Firebase — مزامنة بين الأجهزة =================
   نفس قاعدة بيانات باقي أنظمتك، بمسار خاص: fault_system.json
   ملاحظة: المستخدم الحالي (curUserId) بيفضل محلي لكل جهاز ومابيتزامنش. */
var DEFAULT_FB_URL='https://my-app-sync-11ad9-default-rtdb.europe-west1.firebasedatabase.app';
var fbBusy=false;

function fbUrl(){ return (S.fb && S.fb.url) ? S.fb.url : ''; }
function setSync(state){
  var d=document.querySelector('header h1 .dot');
  if(!d)return;
  var c = !fbUrl() ? 'var(--muted)' : (state==='ok'?'var(--green)':(state==='err'?'var(--red)':'var(--amber)'));
  d.style.background=c; d.style.boxShadow='0 0 10px '+c;
  d.title = !fbUrl() ? 'محلي' : (state==='ok'?'متزامن':(state==='err'?'خطأ مزامنة':'جاري…'));
}
/* اللي بيتزامن: كل حاجة ما عدا المستخدم الحالي */
function fbPush(){
  var u=fbUrl(); if(!u||fbBusy)return;
  var body={}; for(var k in S){ if(k!=='curUserId') body[k]=S[k]; }
  fetch(u+'/fault_system.json',{method:'PUT',body:JSON.stringify(body)})
    .then(function(r){setSync(r.ok?'ok':'err')})
    .catch(function(){setSync('err')});
}
function applyCloud(d){
  if(!d||!d.users)return false;
  fbBusy=true;
  var mine=S.curUserId;              /* اتمسك بالمستخدم بتاع الجهاز ده */
  for(var k in d){ if(k!=='curUserId') S[k]=d[k]; }
  S.curUserId=mine;
  if(!S.catalog)S.catalog=defaultCatalog();
  if(!S.fb)S.fb={url:DEFAULT_FB_URL};
  /* مهم: السحابة ممكن تكون بيانات قديمة من غير سوبر أدمن — نتأكد بعد كل سحب */
  var _hadSuper=(d.users||[]).some(function(x){return x.id===SUPER_ID});
  ensureSuper();
  for(var i=0;i<S.users.length;i++){
    var uu=S.users[i];
    if(uu.phone==null)uu.phone="";
    if(!uu.farmIds)uu.farmIds=[];
    if(!uu.perms)uu.perms=null;
    if(!uu.pin)uu.pin="1234";
  }
  for(var i=0;i<S.farms.length;i++){ if(!S.farms[i].type)S.farms[i].type='farm'; }
  try{localStorage.setItem(LS_KEY,JSON.stringify(S))}catch(e){}
  fbBusy=false;
  /* لو السحابة مكانش فيها السوبر، ادفعه فورًا */
  if(!_hadSuper)setTimeout(fbPush,300);
  return true;
}
function fbPull(){
  var u=fbUrl(); if(!u){toast('مفيش رابط Firebase');return}
  setSync('busy');
  fetch(u+'/fault_system.json').then(function(r){return r.json()}).then(function(d){
    if(applyCloud(d)){ refreshUserChip(); render(); setSync('ok'); toast('✅ تم السحب من السحابة'); }
    else { setSync('ok'); toast('مفيش بيانات سحابية'); }
  }).catch(function(){setSync('err');toast('❌ فشل الاتصال')});
}
function saveFb(){
  S.fb=S.fb||{}; S.fb.url=document.getElementById('fbUrl').value.trim();
  try{localStorage.setItem(LS_KEY,JSON.stringify(S))}catch(e){}
  if(fbUrl()){ setSync('busy'); fbPush(); toast('✅ المزامنة اتفعّلت'); }
  else { setSync(''); toast('⏹️ المزامنة اتوقفت'); }
  render();
}
/* أول اتصال: لو السحابة فيها بيانات اسحبها، لو فاضية ادفع اللي عندك */
function fbBoot(){
  var u=fbUrl(); if(!u){setSync('');return}
  setSync('busy');
  fetch(u+'/fault_system.json').then(function(r){return r.json()}).then(function(d){
    if(d&&d.users&&d.users.length){ applyCloud(d); refreshUserChip(); render(); setSync('ok'); }
    else fbPush();
  }).catch(function(){setSync('err')});
}

/* ================= الرسم ================= */
function render(){
  var m=document.getElementById('main');
  if(TAB==='reports')m.innerHTML=renderReports();
  else if(TAB==='new'){m.innerHTML=renderNew(); if(curUser()){fillHouses();fillFaults();pickedSev='med';showSlaHint();}}
  else if(TAB==='pm')m.innerHTML=renderPM();
  else if(TAB==='stats')m.innerHTML=renderStats();
  else m.innerHTML=renderSettings();
  pmBadge(); applyTabs();
}
function applyTabs(){
  var t=document.querySelectorAll('.tab');
  for(var i=0;i<t.length;i++){
    var p=t[i].getAttribute('data-tab'), ok=true;
    if(p==='stats')ok=can('stats');
    if(p==='pm')ok=can('pm')||can('pmDone');
    if(p==='new')ok=can('report');
    t[i].style.display=ok?'':'none';
  }
}
function pmBadge(){
  var b=document.getElementById('pmBadge'); if(!b)return;
  var n=(S.pm||[]).filter(function(t){return pmState(t)!=='ok'}).length;
  b.textContent=n?n:''; b.style.display=n?'inline-block':'none';
}
load(); refreshUserChip(); render(); setSync(fbUrl()?'busy':''); fbBoot();
if(!S.curUserId)setTimeout(openUserPicker,400);
/* التصعيد + تنبيه الوقائية */
setTimeout(function(){ checkEsc(); pmNotify(); },3000);
setInterval(checkEsc,60000);
setInterval(function(){ if(TAB==='reports')render(); },120000);   /* تحديث ألوان الـ SLA */
</script>
