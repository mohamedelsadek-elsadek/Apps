/* ================= PDF أوتوماتيك للتليجرام =================
   المشكلة: حوار الطباعة محتاج إيد إنسان — مايتبعتش لوحده.
   الحل: نرسم التقرير على canvas (العربي بيترسم مظبوط في المتصفح)،
   ناخده JPEG، نلفّه في هيكل PDF حقيقي، ونرفعه على تليجرام sendDocument. */

/* ---- رسّام التقرير ---- */
function drawReportCanvas(r,cb){
  var W=1000, PAD=46, y=0;
  var c=document.createElement('canvas');
  c.width=W; c.height=3200;                     /* طويل مؤقتًا — هنقصّه */
  var x=c.getContext('2d');
  x.fillStyle='#ffffff'; x.fillRect(0,0,W,c.height);
  x.direction='rtl'; x.textAlign='right';
  var RX=W-PAD;                                  /* حافة اليمين */
  function font(sz,b){ x.font=(b?'800 ':'400 ')+sz+'px -apple-system, "Segoe UI", Tahoma, sans-serif'; }
  function line(yy){ x.strokeStyle='#cccccc'; x.lineWidth=1; x.beginPath(); x.moveTo(PAD,yy); x.lineTo(W-PAD,yy); x.stroke(); }
  function row(label,val,yy){
    font(21,true); x.fillStyle='#333'; x.fillText(label,RX,yy);
    font(21,false); x.fillStyle='#111'; x.fillText(String(val),RX-215,yy);
  }
  function section(t){
    y+=44; x.fillStyle='#f0f0f0'; x.fillRect(PAD,y-27,W-PAD*2,38);
    font(22,true); x.fillStyle='#222'; x.fillText(t,RX-10,y);
    y+=26;
  }
  function wrapText(t,maxW,sz){
    font(sz,false);
    var words=String(t).split(' '), lines=[], cur='';
    for(var i=0;i<words.length;i++){
      var test=cur?(cur+' '+words[i]):words[i];
      if(x.measureText(test).width>maxW&&cur){lines.push(cur);cur=words[i];}
      else cur=test;
    }
    if(cur)lines.push(cur);
    return lines;
  }
  /* الرأس */
  y=64;
  font(30,true); x.fillStyle='#111';
  x.fillText('🛠️ تقرير إقفال بلاغ #'+r.num, RX, y);
  font(17,false); x.fillStyle='#888'; x.textAlign='left';
  x.fillText(fmtDT(now()), PAD, y);
  x.textAlign='right';
  y+=18; x.strokeStyle='#111'; x.lineWidth=3;
  x.beginPath(); x.moveTo(PAD,y); x.lineTo(W-PAD,y); x.stroke();

  /* البيانات */
  section('البيانات');
  y+=26; row('الموقع:', r.farmName+' — وحدة '+r.house, y);
  y+=34; row('العطل:', r.category+' › '+r.fault, y);
  y+=34; row('الخطورة:', sevPlain(r.severity).replace(/[🔴🟠🔵🟢]/g,'').trim(), y);
  y+=34; row('الحالة:', STATUS[r.status], y);
  if(r.desc){
    y+=34; font(21,true); x.fillStyle='#333'; x.fillText('الوصف:',RX,y);
    var dl=wrapText(r.desc, W-PAD*2-230, 20);
    for(var i=0;i<dl.length;i++){ font(20,false); x.fillStyle='#111'; x.fillText(dl[i],RX-215,y); if(i<dl.length-1)y+=28; }
  }

  /* الجدول الزمني */
  section('الجدول الزمني');
  var steps=[['الإبلاغ',r.reporterName,fmtDT(r.ts),'—']];
  if(r.startTs)steps.push(['الاستلام',r.startedBy,fmtDT(r.startTs),mmm(respMins(r))]);
  if(r.fixTs)steps.push(['الإصلاح',r.fixedBy,fmtDT(r.fixTs),mmm(fixMins(r))]);
  if(r.confTs)steps.push(['التأكيد',r.reporterName,fmtDT(r.confTs),'—']);
  for(var i=0;i<steps.length;i++){
    y+=32;
    font(20,true); x.fillStyle='#333'; x.fillText(steps[i][0],RX,y);
    font(19,false); x.fillStyle='#111';
    x.fillText(steps[i][1],RX-150,y);
    x.fillText(steps[i][3],RX-420,y);
    font(17,false); x.fillStyle='#777'; x.textAlign='left';
    x.fillText(steps[i][2],PAD,y); x.textAlign='right';
    line(y+9);
  }
  /* SLA */
  y+=40;
  var late=(respLate(r)||fixLate(r));
  x.fillStyle=late?'#fdecec':'#eaf7ea';
  x.fillRect(PAD,y-24,W-PAD*2,40);
  font(20,true); x.fillStyle=late?'#c0392b':'#1e7e34';
  x.fillText(late?'⚠️ خرج عن زمن الاستجابة المستهدف'+(r.waitTotal?' (منها '+mmm(r.waitTotal/60000)+' انتظار قطع)':''):'✅ اتحل داخل الوقت المستهدف', RX-8, y);
  y+=8;

  if(r.fixDesc){
    section('اللي اتعمل');
    var fl=wrapText(r.fixDesc, W-PAD*2-20, 20);
    for(var i=0;i<fl.length;i++){ y+=30; font(20,false); x.fillStyle='#111'; x.fillText(fl[i],RX-8,y); }
  }
  if(r.parts&&r.parts.length){
    section('قطع الغيار');
    for(var i=0;i<r.parts.length;i++){
      y+=30; font(20,false); x.fillStyle='#111';
      x.fillText('• '+r.parts[i].name+'  ×'+r.parts[i].qty, RX-8, y);
    }
  }
  if(r.rootCause){
    section('السبب الجذري');
    y+=30; font(20,true); x.fillStyle='#c0392b'; x.fillText(r.rootCause,RX-8,y);
    if(r.rootNote){ var rl=wrapText(r.rootNote,W-PAD*2-20,19); for(var i=0;i<rl.length;i++){ y+=27; font(19,false); x.fillStyle='#333'; x.fillText(rl[i],RX-8,y);} }
  }
  var dc=downtimeCost(r);
  if(dc){ y+=36; font(20,true); x.fillStyle='#b06000'; x.fillText('💸 تكلفة التعطّل التقديرية: '+dc.toLocaleString('en-US')+' ج.م', RX-8, y); }

  /* الصور */
  var phs=[];
  if(r.photos){ (r.photos.before||[]).forEach(function(p){phs.push([p,'قبل'])}); (r.photos.after||[]).forEach(function(p){phs.push([p,'بعد'])}); }
  function drawPhotos(done){
    if(!phs.length){done();return}
    section('الصور');
    var loaded=0, imgs=[];
    phs.forEach(function(ph,idx){
      var im=new Image();
      im.onload=function(){ imgs[idx]=im; if(++loaded===phs.length)paint(); };
      im.onerror=function(){ imgs[idx]=null; if(++loaded===phs.length)paint(); };
      im.src=ph[0];
    });
    function paint(){
      var sz=200, gap=16, perRow=Math.floor((W-PAD*2)/(sz+gap));
      for(var i=0;i<phs.length;i++){
        var col=i%perRow, rowN=Math.floor(i/perRow);
        var px=W-PAD-sz-col*(sz+gap), py=y+16+rowN*(sz+38);
        if(imgs[i]){ x.drawImage(imgs[i],px,py,sz,sz); x.strokeStyle='#ccc'; x.strokeRect(px,py,sz,sz); }
        font(16,false); x.fillStyle='#666'; x.fillText(phs[i][1], px+sz-4, py+sz+22);
      }
      y+= 16 + Math.ceil(phs.length/perRow)*(sz+38);
      done();
    }
  }
  drawPhotos(function(){
    /* التوقيعات */
    y+=64;
    var wcol=(W-PAD*2)/3;
    ['مدير الموقع','مدير الصيانة','الفني'].forEach(function(t,i){
      var cx=PAD+i*wcol+wcol/2;
      x.strokeStyle='#999'; x.beginPath(); x.moveTo(cx-90,y); x.lineTo(cx+90,y); x.stroke();
      font(17,false); x.fillStyle='#333'; x.textAlign='center'; x.fillText(t,cx,y+26);
    });
    x.textAlign='right';
    y+=58;
    font(15,false); x.fillStyle='#999'; x.textAlign='center';
    x.fillText('اتولّد تلقائيًا من نظام أعطال المزارع — '+fmtDT(now()), W/2, y);
    x.textAlign='right';
    y+=30;
    /* قصّ للطول الفعلي */
    var out=document.createElement('canvas');
    out.width=W; out.height=y;
    var ox=out.getContext('2d');
    ox.fillStyle='#fff'; ox.fillRect(0,0,W,y);
    ox.drawImage(c,0,0,W,y,0,0,W,y);
    cb(out);
  });
}

/* ---- JPEG → PDF حقيقي (نفس الهيكل اللي اتبنى واتاختبر) ---- */
function canvasToPdfBlob(canvas,cb){
  canvas.toBlob(function(blob){
    if(!blob){cb(null);return}
    var fr=new FileReader();
    fr.onload=function(){
      var jpg=new Uint8Array(fr.result);
      var w=canvas.width,h=canvas.height;
      var W=595, H=Math.round(W*h/w*100)/100;
      function enc(s){ var a=new Uint8Array(s.length); for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i)&0xff; return a; }
      var content='q\n'+W+' 0 0 '+H+' 0 0 cm\n/Im1 Do\nQ\n';
      var chunks=[], offs={}, pos=0;
      function push(u8){ chunks.push(u8); pos+=u8.length; }
      push(enc('%PDF-1.4\n'));
      offs[1]=pos; push(enc('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n'));
      offs[2]=pos; push(enc('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n'));
      offs[3]=pos; push(enc('3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+W+' '+H+'] /Contents 4 0 R /Resources << /XObject << /Im1 5 0 R >> >> >>\nendobj\n'));
      offs[4]=pos; push(enc('4 0 obj\n<< /Length '+content.length+' >>\nstream\n'+content+'endstream\nendobj\n'));
      offs[5]=pos; push(enc('5 0 obj\n<< /Type /XObject /Subtype /Image /Width '+w+' /Height '+h+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+jpg.length+' >>\nstream\n'));
      push(jpg);
      push(enc('\nendstream\nendobj\n'));
      var xrefPos=pos;
      var xr='xref\n0 6\n0000000000 65535 f \n';
      for(var n=1;n<=5;n++){ var o=String(offs[n]); while(o.length<10)o='0'+o; xr+=o+' 00000 n \n'; }
      xr+='trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n'+xrefPos+'\n%%EOF';
      push(enc(xr));
      cb(new Blob(chunks,{type:'application/pdf'}));
    };
    fr.onerror=function(){cb(null)};
    fr.readAsArrayBuffer(blob);
  },'image/jpeg',0.82);
}

/* ================= تقارير PDF =================
   صفحة طباعة نظيفة (فاتحة، RTL) وحوار الطباعة.
   على الآيفون: مشاركة ← حفظ PDF ← واتساب. iframe مخفي عشان Safari. */
function printHtml(title,body){
  var css='@page{size:A4;margin:14mm}'+
  'body{font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;direction:rtl;color:#1a1a1a;line-height:1.7;font-size:13px;margin:0}'+
  '.hd{display:flex;justify-content:space-between;align-items:center;border-bottom:2.5px solid #1a1a1a;padding-bottom:8px;margin-bottom:14px}'+
  '.hd h1{font-size:19px;margin:0}.hd .m{font-size:11px;color:#666;text-align:left}'+
  'h2{font-size:14.5px;background:#f2f2f2;padding:6px 10px;border-radius:6px;margin:16px 0 8px}'+
  'table{width:100%;border-collapse:collapse;margin:6px 0}'+
  'th,td{border:1px solid #ccc;padding:6px 8px;font-size:12px;text-align:right}'+
  'th{background:#f7f7f7;font-weight:800}'+
  '.kv{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}'+
  '.kb{border:1px solid #ddd;border-radius:8px;padding:8px;text-align:center}'+
  '.kb b{display:block;font-size:19px}'+
  '.kb span{font-size:10px;color:#666}'+
  '.warn{background:#fff3f3;border:1px solid #f0b5b5;border-radius:7px;padding:8px 11px;margin:6px 0}'+
  '.ok{background:#f0faf0;border:1px solid #b5e0b5;border-radius:7px;padding:8px 11px;margin:6px 0}'+
  '.sig{margin-top:26px;display:flex;justify-content:space-between;font-size:12px}'+
  '.sig div{border-top:1px solid #999;padding-top:5px;width:30%;text-align:center}'+
  '.ft{margin-top:18px;font-size:10px;color:#999;text-align:center}'+
  'img.ph{width:110px;height:110px;object-fit:cover;border-radius:7px;border:1px solid #ccc;margin:2px}';
  var doc='<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>'+title+'</title><style>'+css+'</style></head><body>'+body+
  '<div class="ft">اتولّد من نظام أعطال المزارع — '+fmtDT(now())+'</div></body></html>';
  var fr=document.createElement('iframe');
  fr.style.cssText='position:fixed;left:-9999px;width:1px;height:1px';
  document.body.appendChild(fr);
  fr.contentDocument.open(); fr.contentDocument.write(doc); fr.contentDocument.close();
  setTimeout(function(){
    try{ fr.contentWindow.focus(); fr.contentWindow.print(); }catch(e){ toast('❌ الطباعة فشلت'); }
    setTimeout(function(){ try{document.body.removeChild(fr)}catch(e){} },4000);
  },350);
}

  var wc=topList(o.byCat,6);

  /* الوقائية */
  var done=[],miss=[];

  cb(out);

/* فتح من لينك الإيميل: ?pdf=رقم البلاغ */
function checkPdfParam(){
  try{
    var m=(location.search||'').match(/[?&]pdf=(\d+)/);
    if(!m)return;
    var num=parseInt(m[1],10);
    var tries=0;
    (function find(){
      tries++;
      var r=null;
      for(var i=0;i<S.reports.length;i++)if(S.reports[i].num===num){r=S.reports[i];break}
      if(r){
        /* iOS بيرفض فتح المشاركة من غير ضغطة إصبع — فبنعرض زرار */
        var h='<h3 style="text-align:center">📄 تقرير بلاغ #'+num+'</h3>';
        h+='<div class="hint" style="text-align:center">'+esc(r.farmName)+' — وحدة '+esc(r.house)+'<br>'+esc(r.fault)+'</div>';
        h+='<button class="btn btn-blue" style="margin-top:12px" onclick="closeModal();sharePdf(\''+r.id+'\')">📤 فتح / حفظ / مشاركة الـ PDF</button>';
        h+='<button class="btn btn-ghost" style="margin-top:8px" onclick="closeModal();printReport(\''+r.id+'\')">🖨️ طباعة</button>';
        h+='<button class="btn btn-ghost" style="margin-top:8px" onclick="closeModal()">إغلاق</button>';
        openModal(h);
      }
      else if(tries<8)setTimeout(find,1800);   /* المزامنة ممكن تطوّل على النت الضعيف */
      else toast('❌ بلاغ #'+num+' مش لاقيه — اتأكد إن المزامنة خلصت وحدّث الصفحة');
    })();
  }catch(e){}

  t+='• بلاغات: '+o.n+'  • مفتوح: '+o.open+(o.crit?('  • حرج: '+o.crit):'')+'\n';
  t+='• متوسط الحل: '+o.avgH+' ساعة\n';

  var wf=topList(o.byFarm,3);
  if(wf.length){ t+='\n🏆 أكتر المواقع مشاكل\n'; wf.forEach(function(x,i){t+=(i+1)+'. '+x[0]+' — '+x[1]+'\n'}); }
  var wc=topList(o.byCat,3);
  if(wc.length){ t+='\n🧰 أكتر الأعطال\n'; wc.forEach(function(x,i){t+=(i+1)+'. '+x[0]+' — '+x[1]+'\n'}); }
  if(o.repSame.length){
    t+='\n🔁 تكرار في نفس الوحدة\n';

  /* اتعمل / مااتعملش */

  (S.pm||[]).forEach(function(x){
    if(x.lastDone&&x.lastDone>=R.from&&x.lastDone<=R.to)done.push(x);
    if(pmState(x)==='over')miss.push(x);
  });
  t+='\n🛡️ الوقائية الأسبوع ده\n';
  if(done.length){t+='✅ اتعمل ('+done.length+'):\n'; done.slice(0,10).forEach(function(x){t+='  • '+x.name+'\n'});}
  else t+='✅ اتعمل: ولا مهمة!\n';
  if(miss.length){t+='❌ متأخر ومااتعملش ('+miss.length+'):\n'; miss.slice(0,10).forEach(function(x){t+='  • '+x.name+(x.farmName?' — '+x.farmName:'')+' (متأخرة '+Math.abs(pmDaysLeft(x))+' يوم)\n'});}
  else t+='❌ متأخر: مفيش 👌\n';
  DASH.p=sv.p; DASH.farmId=sv.farmId;
  return t;
}

/* ================= الإيميل =================
   طريقتين:
   ١) EmailJS (أوتوماتيك حقيقي): بيتبعت في الخلفية من غير أي تدخل — زي التليجرام.
      مجاني ٢٠٠ رسالة/شهر. محتاج تسجيل مرة واحدة (الخطوات في الإعدادات).
   ٢) mailto (احتياطي): بيفتح تطبيق البريد بالنص جاهز وإنت تدوس إرسال. */
function emailReady(){ return !!(S.ej&&S.ej.service&&S.ej.template&&S.ej.pub); }
function sendMailAuto(to,subj,bodyText,cb){
  if(!emailReady()){cb&&cb(false,'مش متظبط');return}
  fetch('https://api.emailjs.com/api/v1.0/email/send',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      service_id:S.ej.service,
      template_id:S.ej.template,
      user_id:S.ej.pub,
      template_params:{to_email:to,subject:subj,message:bodyText}
    })
  }).then(function(r){
    if(r.ok){cb&&cb(true);return}
    return r.text().then(function(t){cb&&cb(false,t)});
  }).catch(function(){cb&&cb(false,'شبكة')});
}
/* بيحاول الأوتوماتيك الأول، ولو مش متظبط بيفتح البريد */
function sendMail(to,subj,bodyText,silent){
  if(emailReady()){
    sendMailAuto(to,subj,bodyText,function(ok,err){
      if(ok){ if(!silent)toast('✉️ الإيميل اتبعت تلقائي'); }
      else { if(!silent)toast('❌ الإيميل فشل — هفتحلك البريد'); openMailApp(to,subj,bodyText); }
    });
  } else openMailApp(to,subj,bodyText);
}
function openMailApp(to,subj,bodyText){
  var url='mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(bodyText);
  try{ window.open(url,'_blank'); }catch(e){}
}

function saveSla(){
  var so=["critical","high","med","low"];
  for(var i=0;i<so.length;i++){
    var r=parseInt(document.getElementById('sr_'+so[i]).value,10)||60;
    var f=parseInt(document.getElementById('sf_'+so[i]).value,10)||240;
    S.sla[so[i]]={resp:r,fix:f};
  }
  save(); toast("✅ الأزمنة اتحفظت"); render();
}
function saveRemind(){
  S.remind.on=document.getElementById('rmOn').checked;
  S.remind.every=parseInt(document.getElementById('rmEvery').value,10)||120;
  S.remind.max=parseInt(document.getElementById('rmMax').value,10)||3;
  var cb=document.querySelectorAll('.rmSt');
  for(var i=0;i<cb.length;i++){
    var k=cb[i].getAttribute('data-k');
    S.remind.stages[k]={on:cb[i].checked, after:parseInt(document.getElementById('rm_'+k).value,10)||60};
  }
  save(); toast("✅ التذكيرات اتحفظت"); render();
}
function saveEsc(){
  S.esc.on=document.getElementById('escOn').checked;
  var cb=document.querySelectorAll('.escSev'), sv=[];
  for(var i=0;i<cb.length;i++)if(cb[i].checked)sv.push(cb[i].value);
  S.esc.sevs=sv;
  for(var j=0;j<S.esc.steps.length;j++){
    S.esc.steps[j].min=parseInt(document.getElementById('em_'+j).value,10)||15;
    S.esc.steps[j].role=document.getElementById('er_'+j).value;
  }
  save(); toast("✅ التصعيد اتحفظ"); render();
}

function saveTg(){ S.tg.token=document.getElementById('tgToken').value.trim(); S.tg.chatId=document.getElementById('tgChat').value.trim(); save(); toast("اتحفظ ✅"); render(); }

  tgSend("🔔 رسالة اختبار من نظام أعطال المزارع — الربط شغال تمام ✅",function(ok,err){toast(ok?"✅ وصلت الرسالة للجروب — الربط شغال":"❌ فشل: "+err);}); }
function delUser(id){
  if(!can('users')){toast("مالكش صلاحية");return;}
  if(S.users.length<=1){toast("لازم يفضل مستخدم واحد على الأقل");return;}
  var _t=userById(id);
  if(id===SUPER_ID){toast("🔒 حساب السوبر أدمن الأساسي مايتحذفش");return;}
  /* حماية السوبر أدمن */
  if(_t&&_t.role==='super'){
    if(!can('grant')){toast("🔒 السوبر أدمن مايتحذفش إلا من سوبر أدمن تاني");return;}
    var _supers=S.users.filter(function(x){return x.role==='super'}).length;
    if(_supers<2){toast("⚠️ لازم يفضل سوبر أدمن واحد على الأقل");return;}
  }
  if(_t&&can('users',_t)){
    var _admins=S.users.filter(function(x){return can('users',x)}).length;
    if(_admins<2){toast("لازم يفضل حد واحد على الأقل معاه صلاحية إدارة المستخدمين");return;}
  }
  if(!confirm("حذف "+((_t&&_t.name)||"المستخدم")+"؟"))return;
  for(var i=0;i<S.users.length;i++)if(S.users[i].id===id)S.users.splice(i,1); if(S.curUserId===id)S.curUserId=null; save(); refreshUserChip(); render(); }
var _es=null;
function openSiteEdit(id){
  if(!can('sites')){toast("مالكش صلاحية");return}
  _es=id;
  var f=id?siteById(id):{name:"",houses:4,type:"farm"};
  var h='<h3 style="margin-bottom:10px">'+(id?'✏️ تعديل موقع':'➕ موقع جديد')+'</h3>';
  h+='<label>نوع الموقع</label><select id="esType" onchange="esTypeChanged()">';
  for(var t in SITE_TYPES)h+='<option value="'+t+'" '+(siteType(f)===t?'selected':'')+'>'+SITE_TYPES[t].icon+' '+SITE_TYPES[t].name+'</option>';
  h+='</select>';
  h+='<label>الاسم</label><input id="esName" value="'+esc(f.name)+'" placeholder="مثال: مصنع الكوثر">';
  h+='<label id="esUnitLbl">عدد الوحدات</label><input type="number" id="esHouses" value="'+(f.houses||1)+'" min="1">';
  h+='<div class="hint" id="esHint"></div>';
  h+='<div class="row2"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-green" onclick="saveSite()">حفظ</button></div>';
  openModal(h); esTypeChanged();
}
function esTypeChanged(){
  var t=document.getElementById('esType').value;
  var st=SITE_TYPES[t]||SITE_TYPES.farm;
  var l=document.getElementById('esUnitLbl'); if(l)l.textContent='عدد الـ'+st.unit+'ات';
  var hi=document.getElementById('esHint');
  if(hi)hi.innerHTML='الأعطال المتاحة للنوع ده: <b>'+(TYPE_CATS[t]||[]).join(' · ')+'</b>';
  var nm=document.getElementById('esName');
  if(nm&&!nm.value){
    nm.placeholder = t==='feedmill'?'مثال: مصنع الكوثر':(t==='feedlot'?'مثال: معلف العمدة':(t==='equip'?'مثال: معدات الورشة':'مثال: مزرعة 5'));
  }
}
function saveSite(){
  var n=(document.getElementById('esName').value||'').trim();
  if(!n){toast("اكتب اسم الموقع");return}
  var t=document.getElementById('esType').value;
  var hn=parseInt(document.getElementById('esHouses').value,10)||1;
  if(_es){ var f=siteById(_es); if(f){f.name=n;f.type=t;f.houses=hn;} }
  else S.farms.push({id:uid(),name:n,houses:hn,type:t});
  save(); closeModal(); render(); toast("✅ اتحفظ");
}
function delFarm(id){ if(!confirm("حذف المزرعة؟ (البلاغات القديمة هتفضل موجودة)"))return;
  for(var i=0;i<S.farms.length;i++)if(S.farms[i].id===id)S.farms.splice(i,1); save(); render(); }
function addFault(){ var c=document.getElementById('catSel').value, f=document.getElementById('newFault').value.trim(); if(!f)return;
  if(!S.catalog[c])S.catalog[c]=[]; S.catalog[c].push(f); S.catalogUpdatedAt=now(); save(); toast("اتضاف ✅"); render(); }
function exportJSON(){
  var data=JSON.stringify(S,null,1);
  var blob=new Blob([data],{type:"application/json"});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download="fault-system-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
}
function importJSON(inp){
  var f=inp.files[0]; if(!f)return;
  var rd=new FileReader();
  rd.onload=function(){ try{ var d=JSON.parse(rd.result); if(!d.reports)throw 0; S=d; save(); refreshUserChip(); render(); toast("✅ تم الاستيراد"); }catch(e){toast("❌ الملف مش صالح");} };
  rd.readAsText(f);
}

/* ================= Firebase — مزامنة بين الأجهزة =================
   نفس قاعدة بيانات باقي أنظمتك، بمسار خاص: fault_system.json
   ملاحظة: المستخدم الحالي (curUserId) بيفضل محلي لكل جهاز ومابيتزامنش. */
var DEFAULT_FB_URL='https://my-app-sync-11ad9-default-rtdb.europe-west1.firebasedatabase.app';
var fbBusy=false;

function fbUrl(){ return (S.fb && S.fb.url) ? S.fb.url : ''; }
function setSync(state){
  var d=document.querySelector('header h1 .dot');
  if(!d)return;
  var c = !fbUrl() ? 'var(--muted)' : (state==='ok'?'var(--green)':(state==='err'?'var(--red)':'var(--amber)'));
  d.style.background=c; d.style.boxShadow='0 0 10px '+c;
  d.title = !fbUrl() ? 'محلي' : (state==='ok'?'متزامن':(state==='err'?'خطأ مزامنة':'جاري…'));
}
/* اللي بيتزامن: كل حاجة ما عدا المستخدم الحالي */
function fbPush(){
  var u=fbUrl(); if(!u||fbBusy)return;
  var body={}; for(var k in S){ if(k!=='curUserId') body[k]=S[k]; }
  fetch(u+'/fault_system.json',{method:'PUT',body:JSON.stringify(body)})
    .then(function(r){setSync(r.ok?'ok':'err')})
    .catch(function(){setSync('err')});
}
function applyCloud(d){
  if(!d||!d.users)return false;
  fbBusy=true;
  var mine=S.curUserId;              /* اتمسك بالمستخدم بتاع الجهاز ده */
  for(var k in d){ if(k!=='curUserId') S[k]=d[k]; }
  S.curUserId=mine;
  if(!S.catalog)S.catalog=defaultCatalog();
  if(!S.fb)S.fb={url:DEFAULT_FB_URL};
  /* مهم: السحابة ممكن تكون بيانات قديمة من غير سوبر أدمن — نتأكد بعد كل سحب */
  var _hadSuper=(d.users||[]).some(function(x){return x.id===SUPER_ID});
  ensureSuper();
  for(var i=0;i<S.users.length;i++){
    var uu=S.users[i];
    if(uu.phone==null)uu.phone="";
    if(!uu.farmIds)uu.farmIds=[];
    if(!uu.perms)uu.perms=null;
    if(!uu.pin)uu.pin="1234";
  }
  for(var i=0;i<S.farms.length;i++){ if(!S.farms[i].type)S.farms[i].type='farm'; }
  try{localStorage.setItem(LS_KEY,JSON.stringify(S))}catch(e){}
  fbBusy=false;
  /* لو السحابة مكانش فيها السوبر، ادفعه فورًا */
  if(!_hadSuper)setTimeout(fbPush,300);
  return true;
}
function fbPull(){
  var u=fbUrl(); if(!u){toast('مفيش رابط Firebase');return}
  setSync('busy');
  fetch(u+'/fault_system.json').then(function(r){return r.json()}).then(function(d){
    if(applyCloud(d)){ refreshUserChip(); render(); setSync('ok'); toast('✅ تم السحب من السحابة'); }
    else { setSync('ok'); toast('مفيش بيانات سحابية'); }
  }).catch(function(){setSync('err');toast('❌ فشل الاتصال')});
}
function saveFb(){
  S.fb=S.fb||{}; S.fb.url=document.getElementById('fbUrl').value.trim();
  try{localStorage.setItem(LS_KEY,JSON.stringify(S))}catch(e){}
  if(fbUrl()){ setSync('busy'); fbPush(); toast('✅ المزامنة اتفعّلت'); }
  else { setSync(''); toast('⏹️ المزامنة اتوقفت'); }
  render();
}
/* أول اتصال: لو السحابة فيها بيانات اسحبها، لو فاضية ادفع اللي عندك */
function fbBoot(){
  var u=fbUrl(); if(!u){setSync('');return}
  setSync('busy');
  fetch(u+'/fault_system.json').then(function(r){return r.json()}).then(function(d){
    if(d&&d.users&&d.users.length){ applyCloud(d); refreshUserChip(); render(); setSync('ok'); }
    else fbPush();
  }).catch(function(){setSync('err')});
}

/* ================= الرسم ================= */
function render(){
  var m=document.getElementById('main');
  if(TAB==='reports')m.innerHTML=renderReports();
  else if(TAB==='new'){m.innerHTML=renderNew(); if(curUser()){fillHouses();fillFaults();pickedSev='med';showSlaHint();}}
  else if(TAB==='pm')m.innerHTML=renderPM();
  else if(TAB==='dash')m.innerHTML=renderDash();
  else if(TAB==='stats')m.innerHTML=renderStats();
  else m.innerHTML=renderSettings();
  pmBadge(); applyTabs();
}
function applyTabs(){
  var t=document.querySelectorAll('.tab');
  for(var i=0;i<t.length;i++){
    var p=t[i].getAttribute('data-tab'), ok=true;
    if(p==='stats')ok=can('stats');
    if(p==='dash')ok=can('stats');
    if(p==='pm')ok=can('pm')||can('pmDone');
    if(p==='new')ok=can('report');
    t[i].style.display=ok?'':'none';
  }
}
function pmBadge(){
  var b=document.getElementById('pmBadge'); if(!b)return;
  var n=(S.pm||[]).filter(function(t){return pmState(t)!=='ok'}).length;
  b.textContent=n?n:''; b.style.display=n?'inline-block':'none';
}
load(); refreshUserChip(); render(); setSync(fbUrl()?'busy':''); fbBoot();

setTimeout(flushOutbox,4000);

setInterval(function(){ if(TAB==='reports')render(); },120000);   /* تحديث ألوان الـ SLA */
