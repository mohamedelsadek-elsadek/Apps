<style>
:root{
  --bg:#111417; --panel:#1a1f24; --panel2:#21272e; --line:#2e363f;
  --text:#e8eaed; --muted:#9aa5b1;
  --amber:#f5a623; --amber-dim:#3a2f14;
  --red:#e5484d; --blue:#4c9aff; --green:#3dd68c; --purple:#b78bf7;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;font-size:15px;padding-bottom:90px}
header{position:sticky;top:0;z-index:50;background:rgba(17,20,23,.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:calc(12px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 12px calc(14px + env(safe-area-inset-left));display:flex;align-items:center;justify-content:space-between;gap:8px}
header h1{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
header h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber)}
.userchip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap}
.userchip b{color:var(--text)}
main{max-width:760px;margin:0 auto;padding:14px}
.tabs{position:fixed;bottom:0;right:0;left:0;z-index:50;display:flex;background:rgba(17,20,23,.95);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;text-align:center;padding:10px 4px 8px;color:var(--muted);font-size:11px;cursor:pointer;border-top:2px solid transparent}
.tab .ic{font-size:20px;display:block;margin-bottom:2px}
.tab.active{color:var(--amber);border-top-color:var(--amber)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--muted);font-weight:700}
label{display:block;font-size:12.5px;color:var(--muted);margin:10px 0 5px}
select,input,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px 12px;font-size:15px;font-family:inherit;-webkit-appearance:none;appearance:none}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--amber)}
textarea{min-height:70px;resize:vertical}
.btn{display:inline-block;width:100%;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;text-align:center;margin-top:12px}
.btn-amber{background:var(--amber);color:#1a1408}
.btn-blue{background:var(--blue);color:#06121f}
.btn-green{background:var(--green);color:#062015}
.btn-ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-sm{width:auto;padding:8px 14px;font-size:13px;margin-top:8px;margin-inline-end:6px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sev{display:flex;gap:8px;margin-top:5px}
.sev span{flex:1;text-align:center;padding:9px 4px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);font-size:13px;cursor:pointer;color:var(--muted)}
.sev span.on-critical{background:#3a1214;border-color:var(--red);color:var(--red);font-weight:800}
.sev span.on-high{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);font-weight:800}
.sev span.on-med{background:#122a3f;border-color:var(--blue);color:var(--blue);font-weight:800}
.sev span.on-low{background:#12301f;border-color:var(--green);color:var(--green);font-weight:800}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.fchip{white-space:nowrap;padding:7px 13px;border-radius:18px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;cursor:pointer}
.fchip.active{background:var(--amber);border-color:var(--amber);color:#1a1408;font-weight:800}
.fchip .n{opacity:.75;font-size:12px}
.rep{border-radius:var(--radius);border:1px solid var(--line);background:var(--panel);margin-bottom:12px;overflow:hidden}
.rep .top{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.rep .title{font-weight:800;font-size:15px}
.rep .sub{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.6}
.badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;white-space:nowrap}
.b-new{background:#3a1214;color:var(--red)}
.b-prog{background:#122a3f;color:var(--blue)}
.b-fixed{background:var(--amber-dim);color:var(--amber)}
.b-conf{background:#12301f;color:var(--green)}
.rep .stripe{height:3px}
.s-critical{background:var(--red)}.s-high{background:var(--amber)}.s-med{background:var(--blue)}.s-low{background:var(--green)}
.rep .body{padding:0 14px 12px;border-top:1px dashed var(--line)}
.timeline{margin-top:10px}
.tstep{display:flex;gap:10px;font-size:12.5px;color:var(--muted);padding:4px 0}
.tstep .mark{width:8px;height:8px;border-radius:50%;background:var(--line);margin-top:5px;flex-shrink:0}
.tstep.done .mark{background:var(--green)}
.tstep b{color:var(--text)}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;line-height:2}
.empty .big{font-size:44px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;text-align:center}
.stat .v{font-size:26px;font-weight:900}
.stat .l{font-size:12px;color:var(--muted);margin-top:3px}
.bar-row{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px}
.bar-row .nm{width:110px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .tr{flex:1;background:var(--panel2);border-radius:6px;height:18px;overflow:hidden}
.bar-row .fl{height:100%;background:var(--amber);border-radius:6px;min-width:2px}
.bar-row .ct{width:28px;text-align:left;font-weight:800}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.list-item:last-child{border-bottom:none}
.list-item .del{color:var(--red);cursor:pointer;font-size:18px;padding:0 6px}
.list-item .meta{color:var(--muted);font-size:12px}
.hint{font-size:12px;color:var(--muted);line-height:1.8;margin-top:8px}
.hint a{color:var(--blue)}
.ok-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-inline-start:6px}
.toast{position:fixed;bottom:100px;right:50%;transform:translateX(50%);background:#0c0e10;border:1px solid var(--amber);color:var(--text);padding:11px 20px;border-radius:24px;font-size:13.5px;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.5);display:none;max-width:90%;text-align:center}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:760px;max-height:85vh;overflow-y:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
.modal h3{margin-bottom:6px;font-size:16px}
.rep-num{font-family:ui-monospace,Menlo,monospace;color:var(--muted);font-size:11px}
.section-title{font-size:13px;font-weight:800;color:var(--amber);margin:18px 0 8px;letter-spacing:.5px}
@media(min-width:600px){.tabs{position:sticky;bottom:auto;top:57px;border-top:none;border-bottom:1px solid var(--line)}body{padding-bottom:20px}.toast{bottom:40px}}

/* ===== SLA / إضافات ===== */
.slarow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.sla{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.sla-ok{background:rgba(46,160,67,.15);color:var(--green);border:1px solid rgba(46,160,67,.35)}
.sla-warn{background:rgba(210,153,34,.15);color:var(--amber);border:1px solid rgba(210,153,34,.35)}
.sla-late{background:rgba(218,54,51,.18);color:var(--red);border:1px solid rgba(218,54,51,.4)}
.sla-rep{background:rgba(163,113,247,.15);color:var(--purple);border:1px solid rgba(163,113,247,.35)}
.sla-cost{background:rgba(210,153,34,.12);color:var(--amber);border:1px solid rgba(210,153,34,.3)}
.sla-esc{background:rgba(218,54,51,.25);color:#fff;border:1px solid var(--red)}
.rep-late{box-shadow:0 0 0 1.5px rgba(218,54,51,.55)}
.b-wait{background:rgba(210,153,34,.18);color:var(--amber)}
.waitbox{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);border-radius:8px;padding:8px 10px;font-size:12px;margin-bottom:9px}
.partsbox,.rcbox{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12px;margin-top:8px}
.rcbox{border-color:rgba(163,113,247,.4);background:rgba(163,113,247,.08)}
.rc-warn{background:rgba(218,54,51,.12);border:1px solid rgba(218,54,51,.4);border-radius:8px;padding:10px;font-size:12.5px;margin:8px 0;line-height:1.7}
/* صور */
.thumbs{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0}
.thumb{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .x{position:absolute;top:1px;left:1px;background:rgba(0,0,0,.7);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;text-align:center;cursor:pointer}
.pstrip{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;font-size:11.5px;color:var(--muted)}
.pstrip img{width:52px;height:52px;object-fit:cover;border-radius:7px;border:1px solid var(--line);cursor:pointer}
/* قطع الغيار */
.prow{display:flex;gap:7px;align-items:center;margin-bottom:6px}
.prow input{margin:0}
.prow .x{color:var(--red);cursor:pointer;font-weight:800;padding:0 5px}
/* الوقائية */
.pmrow{display:flex;justify-content:space-between;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-right:3px solid var(--green);border-radius:8px;padding:9px 11px;margin-bottom:7px}
.pmi{flex:1}
.pmi .meta{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.6}
.pmb{display:flex;align-items:center;gap:7px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
.stats .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center}
.stats .n{font-size:22px;font-weight:800}
.stats .l{font-size:11px;color:var(--muted)}
/* إعدادات SLA */
.slaedit{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:8px}
.slaedit b{font-size:13px}
/* أعمدة الالتزام */
.barrow{display:flex;align-items:center;gap:9px;margin-bottom:8px;font-size:12px}
.barrow .bl{min-width:78px}
.barrow .bt{flex:1;height:9px;background:var(--panel2);border-radius:6px;overflow:hidden}
.barrow .bf{height:100%;border-radius:6px}
.barrow .bv{min-width:74px;text-align:left;font-weight:700}
.bignum{font-size:30px;font-weight:800;color:var(--amber);text-align:center;padding:8px 0}
.bignum small{font-size:14px;color:var(--muted)}
/* شارة التبويب */
.tab{position:relative}
.tbadge{position:absolute;top:3px;left:50%;margin-left:8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:15px;height:15px;line-height:15px;border-radius:8px;padding:0 3px;display:none}

/* ===== المستخدمين ===== */
.rgrp{font-size:11px;font-weight:800;color:var(--muted);margin:11px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--line)}
.rgrp small{font-weight:400;opacity:.7}
.urow{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:6px}
.ui{flex:1;min-width:0}
.ui b{font-size:13.5px}
.ui .meta{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.6}
.ub{display:flex;align-items:center;gap:5px;flex:0 0 auto}
.cbtn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;text-decoration:none;font-size:14px;border:1px solid var(--line)}
.cbtn-sm{width:29px;height:29px;font-size:13px}
.c-tel{background:rgba(88,166,255,.14);border-color:rgba(88,166,255,.4)}
.c-wa{background:rgba(46,160,67,.14);border-color:rgba(46,160,67,.4)}
.cbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.crow{display:flex;align-items:center;gap:5px}
.crow small{font-size:10.5px;color:var(--muted)}
.fchk{display:flex;flex-direction:column;gap:5px;margin-top:4px}
.fc{display:flex;align-items:center;gap:7px;font-size:13px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px 10px;cursor:pointer;margin:0}
.fc input{width:auto;margin:0}
.permbox{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px;margin:10px 0}
.scope{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);border-radius:8px;padding:8px 11px;font-size:12px;margin-bottom:10px}

/* ===== إصلاح خانات الاختيار =====
   السطر العام فيه appearance:none — بيلغي رسم الـ checkbox الأصلي.
   فبنرسمها بنفسنا عشان تبان ✓ واضحة. */
input[type=checkbox]{
  -webkit-appearance:none;appearance:none;
  width:24px !important;height:24px;min-width:24px;flex:0 0 auto;
  padding:0 !important;margin:0;
  border:2px solid #4a5568;border-radius:6px;
  background:var(--bg);
  position:relative;cursor:pointer;
  transition:.12s;
}
input[type=checkbox]:checked{background:var(--green);border-color:var(--green)}
input[type=checkbox]:checked::after{
  content:"";position:absolute;
  right:7px;top:2.5px;width:6px;height:12px;
  border:solid #fff;border-width:0 0 2.6px 2.6px;
  transform:rotate(-45deg);
}
input[type=checkbox]:active{transform:scale(.9)}
/* الصف كله يبقى قابل للضغط */
.fc{
  display:flex;align-items:center;gap:10px;font-size:14px;
  background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  padding:11px 12px;cursor:pointer;margin:0 0 6px;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:.12s;
}
.fc:active{background:var(--panel);border-color:var(--green)}
.fc:has(input:checked){background:rgba(46,160,67,.12);border-color:rgba(46,160,67,.5)}
.fc input{width:24px !important;margin:0}
/* خانات الإعدادات */
.permbox label,.card>label:has(input[type=checkbox]){
  display:flex;align-items:center;gap:9px;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}

/* ===== الرقم السري ===== */
.pindots{display:flex;justify-content:center;gap:11px;margin:16px 0 8px}
.pd{width:13px;height:13px;border-radius:50%;border:2px solid var(--line);background:transparent;transition:.15s}
.pd.on{background:var(--green);border-color:var(--green);transform:scale(1.15)}
.pinmsg{text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:12px;min-height:18px}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.keys button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:15px 0;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.keys button:active{border-color:var(--green);background:var(--panel);transform:scale(.95)}

.pinbox{
  width:100%;text-align:center;letter-spacing:6px;font-size:20px;font-weight:800;
  padding:14px 12px;margin:14px 0 6px;
}
.pinbox::placeholder{letter-spacing:normal;font-size:14px;font-weight:400}
.keys .k-go{background:rgba(46,160,67,.18);border-color:rgba(46,160,67,.5);color:var(--green)}

/* ===== الداش بورد ===== */
.dfilt{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:13px}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.pchip{flex:0 0 auto;background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:6px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.pchip.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:800}
.drange{font-size:11.5px;color:var(--muted);margin-top:8px;text-align:center}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 6px;text-align:center}
.kv{font-size:21px;font-weight:800;line-height:1.2}
.kv small{font-size:11px;opacity:.75}
.kl{font-size:10px;color:var(--muted);margin-top:3px}
.trend{width:100%;height:70px;display:block}
.dwrap{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.donut{width:150px;height:150px;flex:0 0 auto}
.lgnd{flex:1;min-width:150px;display:flex;flex-direction:column;gap:5px}
.lg{font-size:12px;display:flex;align-items:center;gap:6px}
.lg small{color:var(--muted)}
.sw{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.prow2{display:flex;justify-content:space-between;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-right:3px solid var(--amber);border-radius:8px;padding:9px 11px;margin-bottom:6px}
.prow2 .meta{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.65}
.ratio{height:11px;background:var(--red);border-radius:6px;overflow:hidden;margin:9px 0 7px}
.rf{height:100%;border-radius:6px}
.rlbl{display:flex;justify-content:space-between;font-size:11.5px;font-weight:700}
/* خريطة حرارية */
.heat{overflow-x:auto;scrollbar-width:none;padding:3px 0}
.heat::-webkit-scrollbar{display:none}
.hrow{display:flex;align-items:center;gap:2px;margin-bottom:2px}

<script>
/* ================= الحالة والتخزين ================= */
var LS_KEY='faultsys_v1';
var S=null;

function defaultCatalog(){

    "طاحونة":["مطارق مأكولة","غربال مقطوع","رولمان بلي تالف","اهتزاز عالي","سخونية زايدة","انسداد","سير مقطوع","الموتور واقف","أخرى"],
    "خلاط":["ريش مأكولة","العمود مايل","تسريب من الباب","سلسلة/سير مقطوع","جير بوكس صوته عالي","وقت الخلط غلط","أخرى"],

    "نقل وسيور":["سير مقطوع","إلفيتر واقف","سلسلة مقطوعة","بكرة مايلة","انسداد ماسورة","كوع تالف","أخرى"],
    "موازين":["الميزان مش مظبوط","لودسيل تالف","الشاشة مطفية","محتاج معايرة","الوزن بيقفز","أخرى"],
    "سيلوهات":["تحجّر خامة","صمام التفريغ واقف","تسريب مياه","انسداد المخرج","حساس المستوى تالف","أخرى"],
    /* ===== المعدات الخارجية ===== */
    "جرارات ومعدات ثقيلة":["مش بتدور","تسريب زيت","بريكات ضعيفة","كاوتش تالف","هيدروليك ضعيف","بطارية فاضية","فلتر مسدود","سخونية","أخرى"],
    "سيارات نقل":["مش بتدور","بريكات","كاوتش","بطارية","تسريب زيت","كهرباء","تكييف","أخرى"],
    "مضخات":["مش بتشفط","تسريب","صوت عالي","الموتور بيسخن","الحشوة تالفة","الضغط ضعيف","أخرى"],
    "لحام وورشة":["ماكينة اللحام واقفة","كابل تالف","الأسطوانة فاضية","الصاروخ واقف","الكمبروسر واقف","أخرى"],
    /* ===== النظافة والتطهير ===== */
    "نظافة وتطهير":["ماكينة الرش عطلانة","مضخة التطهير ضعيفة","خزان المطهر فاضي","الكارشر واقف","نوزل الرش مسدود","معدات النظافة ناقصة","الصرف مسدود","تراكم زبالة/نافق","أخرى"]
  };
}
function defaultState(){
  return {
    users:[
      {id:uid(),name:"د. محمد الصادق",role:"owner"},
      {id:uid(),name:"مدير الإنتاج",role:"prod"},
      {id:uid(),name:"مدير الصيانة",role:"maint"},
      {id:uid(),name:"فني الصيانة",role:"tech"},
      {id:uid(),name:"مدير مزرعة العمدة",role:"farm"}
    ],
    farms:[{id:uid(),name:"مزرعة العمدة",houses:5}],
    catalog:defaultCatalog(),
    reports:[],
    curUserId:null,
    tg:{token:"",chatId:"",onNew:true,onStart:true,onFixed:true,onConfirm:true},
    fb:{url:""},
    catalogUpdatedAt:0,
    /* زمن الاستجابة والإصلاح المستهدف — بالدقايق */
    sla:{critical:{resp:15,fix:60}, high:{resp:60,fix:240}, med:{resp:240,fix:1440}, low:{resp:1440,fix:10080}},
    /* التصعيد التلقائي — بيروح لفوق للمدير */
    esc:{on:true, sevs:["critical","high"], steps:[{min:15,role:"maint"},{min:30,role:"prod"},{min:45,role:"owner"}]},
    /* التذكيرات — بتنبّه المسؤول في المرحلة نفسها، على كل الدرجات */
    ej:{service:'',template:'',pub:''},
    remind:{on:true, every:120, max:3, stages:{
      new:  {on:true, after:20},
      prog: {on:true, after:120},
      wait: {on:true, after:1440},
      fixed:{on:true, after:240}
    }},
    /* الصيانة الوقائية */
    pm:[],
    /* تكلفة التعطّل */
    cost:{on:true, birds:5000, perBirdHour:0.35},
    partsLog:[]
  };
}

/* ================= حساب السوبر أدمن الثابت =================
   ليه ID ثابت: عشان المزامنة ماتعملش نسخة تانية على كل جهاز.
   وبتتنادى بعد أي سحب من السحابة — عشان السحابة القديمة ماتدهسش عليه. */
var SUPER_ID='SUPER-ADMIN-1';
function ensureSuper(){
  if(!S.users)S.users=[];
  var u=null;
  for(var i=0;i<S.users.length;i++){ if(S.users[i].id===SUPER_ID){u=S.users[i];break} }
  if(!u){
    /* لو فيه حساب بنفس الاسم اتعمل يدوي، اعتمده بدل ما نكرّر */
    for(var i=0;i<S.users.length;i++){
      var n=String(S.users[i].name||'').toLowerCase().replace(/[^a-z]/g,'');
      if(n==='mohamedelsadek'){ u=S.users[i]; u.id=SUPER_ID; break; }
    }
  }
  if(!u){
    u={id:SUPER_ID,name:'Mohamed Elsadek',role:'super',pin:'admin',phone:'',farmIds:[],perms:null};
    S.users.unshift(u);
  }
  /* الحساب ده سوبر أدمن دايمًا — مايتغيّرش */
  u.role='super';
  if(!u.pin)u.pin='admin';
  if(u.phone==null)u.phone='';
  if(!u.farmIds)u.farmIds=[];
  u.perms=null;
  return u;
}

function load(){
  try{var r=localStorage.getItem(LS_KEY); S=r?JSON.parse(r):defaultState();}catch(e){S=defaultState();}
  if(!S.catalog)S.catalog=defaultCatalog();
  if(!S.fb)S.fb={}; if(!S.fb.url)S.fb.url=DEFAULT_FB_URL;
  /* ترقية النسخ القديمة — بدون ما نلمس بياناتك */
  var d=defaultState();
  if(!S.sla)S.sla=d.sla;
  if(!S.esc)S.esc=d.esc;
  if(!S.remind)S.remind=d.remind;
  if(!S.ej)S.ej={service:'',template:'',pub:''};
  if(!S.emails)S.emails=[];
  if(!S.wa)S.wa=[];
  /* هجرة: الإيميل القديم المفرد يدخل الدفتر */
  if(S.mailTo&&!S.emails.some(function(x){return x.email===S.mailTo}))
    S.emails.push({id:uid(),name:S.mailTo.split('@')[0],email:S.mailTo});
  if(!S.remind.stages)S.remind.stages=d.remind.stages;
  if(!S.pm)S.pm=[];
  if(!S.cost)S.cost=d.cost;
  for(var i=0;i<S.users.length;i++){
    var uu=S.users[i];
    if(uu.phone==null)uu.phone="";
    if(!uu.farmIds)uu.farmIds=[];
    if(!uu.perms)uu.perms=null;
    if(!uu.pin)uu.pin="1234";          /* الكل يبدأ بـ 1234 */
  }
  /* التصنيفات الجديدة (مصنع/معدات) تتضاف للقوايم القديمة من غير ما نلمس اللي موجود */
  var _dc=defaultCatalog();
  for(var c in _dc){ if(!S.catalog[c]) S.catalog[c]=_dc[c].slice(); }
  /* المواقع: النوع الافتراضي مزرعة */
  for(var i=0;i<S.farms.length;i++){ if(!S.farms[i].type)S.farms[i].type='farm'; }
  ensureSuper();
  for(var i=0;i<S.reports.length;i++){
    var x=S.reports[i];
    if(!x.parts)x.parts=[];
    if(!x.photos)x.photos={before:[],after:[]};
    if(x.waitTotal==null)x.waitTotal=0;
    if(!x.escLog)x.escLog=[];
    if(x.rootCause==null)x.rootCause="";
    if(!x.remN)x.remN={};
    if(x.equip==null)x.equip='';
    if(x.repeatOf===undefined)x.repeatOf=null;
    if(!x.remAt)x.remAt={};
  }
}
function save(){ try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){} fbPush(); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function now(){ return Date.now(); }

var ROLES={super:"سوبر أدمن",owner:"صاحب الشركة",prod:"مدير الإنتاج",farms:"مدير المزارع",maint:"مدير الصيانة",tech:"فني صيانة",farm:"مدير موقع",shift:"رئيس وردية",clean:"مسؤول النظافة والتطهير",view:"مشاهد"};
/* الأدوار اللي بتترتبط بمواقع */
var SITE_ROLES=["farm","shift","clean"];
function needsSite(r){ return SITE_ROLES.indexOf(r)>=0; }
/* أنواع المواقع */
var SITE_TYPES={
  farm:    {name:"مزرعة",          icon:"🏠", unit:"عنبر"},
  feedmill:{name:"مصنع علف",       icon:"🏭", unit:"خط"},
  feedlot: {name:"معلف",           icon:"🐄", unit:"حظيرة"},
  equip:   {name:"معدات خارجية",   icon:"🚜", unit:"معدة"}
};
function siteType(f){ return (f&&f.type&&SITE_TYPES[f.type])?f.type:'farm'; }
function siteIcon(f){ return SITE_TYPES[siteType(f)].icon; }
function siteUnit(f){ return SITE_TYPES[siteType(f)].unit; }
function siteById(id){ for(var i=0;i<S.farms.length;i++)if(S.farms[i].id===id)return S.farms[i]; return null; }
/* فئات الأعطال المناسبة لكل نوع موقع */
var TYPE_CATS={
  farm:    ["كهرباء","مولد","تهوية","تبريد","تدفئة","سقايات","علافات","إضاءة","مباني","نظافة وتطهير","معدات أخرى"],
  feedmill:["كهرباء","مولد","طاحونة","خلاط","تحبيب وتكوير","نقل وسيور","موازين","سيلوهات","مباني","نظافة وتطهير","معدات أخرى"],
  feedlot: ["كهرباء","مولد","تهوية","سقايات","علافات","إضاءة","مباني","نظافة وتطهير","معدات أخرى"],
  equip:   ["جرارات ومعدات ثقيلة","سيارات نقل","مضخات","لحام وورشة","كهرباء","معدات أخرى"]
};
/* الصلاحيات التفصيلية — كل وظيفة لها افتراضي، وينفع تخصّص لأي شخص */
var ACTS={
  report:"تسجيل بلاغ", fix:"استلام وإصلاح", wait:"إيقاف لانتظار قطعة",
  confirm:"تأكيد الإصلاح", del:"حذف بلاغات", pm:"إدارة الصيانة الوقائية",
  pmDone:"تسجيل تنفيذ وقائية", users:"إدارة المستخدمين (إضافة/تعديل)",
  grant:"🔑 توزيع الصلاحيات وتغيير الوظائف", sites:"إدارة المواقع والأعطال",
  settings:"الإعدادات والأزمنة", allFarms:"مشاهدة كل المواقع", stats:"التقارير"
};

  super:{report:1,fix:1,wait:1,confirm:1,del:1,pm:1,pmDone:1,users:1,grant:1,sites:1,settings:1,allFarms:1,stats:1},
  owner:{report:1,fix:0,wait:0,confirm:1,del:1,pm:1,pmDone:1,users:1,grant:0,sites:1,settings:1,allFarms:1,stats:1},
  prod: {report:1,fix:0,wait:0,confirm:1,del:1,pm:1,pmDone:1,users:1,grant:0,sites:1,settings:1,allFarms:1,stats:1},
  farms:{report:1,fix:0,wait:0,confirm:1,del:0,pm:1,pmDone:1,users:0,grant:0,sites:0,settings:0,allFarms:1,stats:1},
  maint:{report:1,fix:1,wait:1,confirm:0,del:1,pm:1,pmDone:1,users:0,grant:0,sites:1,settings:1,allFarms:1,stats:1},
  tech: {report:1,fix:1,wait:1,confirm:0,del:0,pm:0,pmDone:1,users:0,grant:0,sites:0,settings:0,allFarms:1,stats:0},
  farm: {report:1,fix:0,wait:0,confirm:1,del:0,pm:0,pmDone:0,users:0,grant:0,sites:0,settings:0,allFarms:0,stats:1},
  shift:{report:1,fix:0,wait:0,confirm:1,del:0,pm:0,pmDone:1,users:0,grant:0,sites:0,settings:0,allFarms:0,stats:1},
  clean:{report:1,fix:0,wait:0,confirm:1,del:0,pm:1,pmDone:1,users:0,grant:0,sites:0,settings:0,allFarms:0,stats:1},
  view: {report:0,fix:0,wait:0,confirm:0,del:0,pm:0,pmDone:0,users:0,grant:0,sites:0,settings:0,allFarms:1,stats:1}
};
/* can('del') أو can('del', user) */
function can(act,u){
  u=u||curUser(); if(!u)return false;
  if(u.perms && u.perms[act]!=null) return !!u.perms[act];
  var d=ROLE_DEF[u.role]||{};
  return !!d[act];
}
function isCustom(u){ return !!(u.perms && Object.keys(u.perms).length); }
/* ===== التليفون ===== */
function telHref(p){ return 'tel:'+String(p||'').replace(/[^\d+]/g,''); }
function waNum(p){
  var d=String(p||'').replace(/\D/g,'');
  if(!d)return '';
  if(d.slice(0,2)==='20')return d;
  if(d.charAt(0)==='0')return '20'+d.slice(1);
  return '20'+d;
}
function waHref(p){ return 'https://wa.me/'+waNum(p); }
function contactBtns(u,small){
  if(!u||!u.phone)return '';
  var c=small?'cbtn cbtn-sm':'cbtn';
  return '<a class="'+c+' c-tel" href="'+telHref(u.phone)+'">📞</a>'+
         '<a class="'+c+' c-wa" href="'+waHref(u.phone)+'" target="_blank" rel="noopener">💬</a>';
}
function userById(id){ for(var i=0;i<S.users.length;i++)if(S.users[i].id===id)return S.users[i]; return null; }
function farmNames(u){
  if(!u.farmIds||!u.farmIds.length)return '';
  var a=[];
  for(var i=0;i<u.farmIds.length;i++){ var f=null; for(var j=0;j<S.farms.length;j++)if(S.farms[j].id===u.farmIds[i])f=S.farms[j]; if(f)a.push(f.name); }
  return a.join(' · ');
}
var SEVS={critical:"حرجة 🔴",high:"عالية 🟠",med:"متوسطة 🔵",low:"منخفضة 🟢"};
var STATUS={new:"بلاغ جديد",prog:"جاري الإصلاح",wait:"موقوف — منتظر قطعة",fixed:"تم الإصلاح",conf:"مؤكد ✔"};
var OPEN_ST={new:1,prog:1,wait:1};   /* الحالات المفتوحة */

function curUser(){ for(var i=0;i<S.users.length;i++){if(S.users[i].id===S.curUserId)return S.users[i];} return null; }
function fmtDT(ts){ if(!ts)return"—"; var d=new Date(ts); return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'})+" "+d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}); }
function hoursBetween(a,b){ return Math.round((b-a)/36e5*10)/10; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ===== الدخول بالرقم السري ===== */
var _pinFor=null,_pinBuf="";
function askPin(id){
  _pinFor=id; _pinBuf="";
  var u=userById(id); if(!u)return;
  var isSuper=(u.role==='super');
  var h='<h3 style="text-align:center">'+(isSuper?'👑 ':'')+esc(u.name)+'</h3>';
  h+='<div class="hint" style="text-align:center">'+ROLES[u.role]+'</div>';
  /* حقل حقيقي — يقبل أرقام وحروف */
  h+='<input class="pinbox" id="pinIn" type="password" autocomplete="off" autocapitalize="off" '+
     'autocorrect="off" spellcheck="false" dir="ltr" placeholder="الرقم السري" oninput="pinTyped()" '+
     'onkeydown="if(event.key===\'Enter\')pinGo()">';
  h+='<div class="pinmsg" id="pinMsg">اكتب رقمك السري أو استخدم الأزرار</div>';
  h+='<div class="keys">';
  for(var n=1;n<=9;n++)h+='<button type="button" onclick="pinKey('+n+')">'+n+'</button>';
  h+='<button type="button" onclick="pinKey(-1)">⌫</button><button type="button" onclick="pinKey(0)">0</button>'+
     '<button type="button" class="k-go" onclick="pinGo()">✓</button>';
  h+='</div>';
  h+='<button class="btn btn-ghost" style="margin-top:10px" onclick="openUserPicker()">↩︎ رجوع</button>';
  openModal(h);
  setTimeout(function(){var e=document.getElementById('pinIn'); if(e&&!isSuper)e.focus();},250);
}
function pinTyped(){
  var e=document.getElementById('pinIn'); if(!e)return;
  _pinBuf=e.value;
}
function pinKey(n){
  var e=document.getElementById('pinIn'); if(!e)return;
  if(n===-1){ e.value=e.value.slice(0,-1); _pinBuf=e.value; return; }
  if(e.value.length>=20)return;
  e.value+=n; _pinBuf=e.value;
  /* لو رقمه ٤ أرقام بالظبط، ادخل تلقائي */
  var u=userById(_pinFor);
  if(u && String(u.pin||"1234").length===4 && _pinBuf.length===4) setTimeout(pinGo,140);
}
function pinGo(){
  var u=userById(_pinFor); if(!u)return;
  var e=document.getElementById('pinIn');
  if(e)_pinBuf=e.value;
  if(String(u.pin||"1234")!==_pinBuf){
    var m=document.getElementById('pinMsg');
    if(m){m.textContent="❌ الرقم السري غلط — جرّب تاني";m.style.color="var(--red)"}
    _pinBuf=""; if(e){e.value="";e.focus()}
    return;
  }
  S.curUserId=u.id; save(); closeModal(); refreshUserChip(); render();
  toast("أهلاً "+u.name+" 👋");
}
function setUser(id){ askPin(id); }

  else h+='<div class="hint" style="color:var(--amber)">🔑 إنت بتغيّر رقم شخص تاني — مش محتاج رقمه الحالي.</div>';
  h+='<label>الرقم الجديد (٤ خانات على الأقل — أرقام أو حروف)</label><input id="pNew" type="password" autocomplete="new-password" autocapitalize="off" autocorrect="off" spellcheck="false" maxlength="20" dir="ltr" placeholder="••••">';

}
function doChangePin(id,self){
  var u=userById(id); if(!u)return;
  if(self){
    var o=(document.getElementById('pOld').value||'').trim();
    if(o!==String(u.pin||"1234")){toast("❌ الرقم الحالي غلط");return}
  }
  var a=(document.getElementById('pNew').value||'').trim();
  var b=(document.getElementById('pNew2').value||'').trim();
  if(a.length<4){toast("لازم ٤ خانات على الأقل");return}
  if(a!==b){toast("❌ المدخلين مش متطابقين");return}
  u.pin=a; save(); closeModal(); render(); toast("✅ الرقم اتغيّر");
}
function defPin(u){ return (u&&u.role==='super')?'admin':'1234'; }
function resetPin(id){
  if(!can('users')){toast("مالكش صلاحية");return}
  var u=userById(id); if(!u)return;
  var d=defPin(u);
  if(!confirm("ترجّع الرقم السري بتاع "+u.name+" لـ \""+d+"\"؟"))return;
  u.pin=d; save(); render(); toast('🔄 الرقم رجع "'+d+'"');
}

function saveUserEdit(){
  var n=(document.getElementById('euName').value||'').trim();
  if(!n){toast("اكتب الاسم");return}
  var mayGrant=can('grant');
  var _old=_eu?userById(_eu):null;
  var role=mayGrant?document.getElementById('euRole').value:(_old?_old.role:'farm');
  /* الحساب الأساسي سوبر أدمن دايمًا */
  if(_eu===SUPER_ID&&role!=='super'){toast("🔒 الحساب الأساسي لازم يفضل سوبر أدمن");return}
  /* لازم يفضل سوبر أدمن واحد */
  if(_old&&_old.role==='super'&&role!=='super'){
    var supers=S.users.filter(function(x){return x.role==='super'}).length;
    if(supers<2){toast("⚠️ لازم يفضل سوبر أدمن واحد على الأقل");return}
  }
  var phone=(document.getElementById('euPhone').value||'').trim();
  var fids=[];
  var fc=document.querySelectorAll('.euFarm');
  for(var i=0;i<fc.length;i++)if(fc[i].checked)fids.push(fc[i].value);
  if(needsSite(role) && !fids.length && S.farms.length){toast("اختار الموقع/المواقع اللي هو مسؤول عنها");return}
  var perms=_old?_old.perms:null;
  if(mayGrant){
    perms=null;
    var cust=document.getElementById('euCustom');
    if(cust&&cust.checked){
      perms={};
      var cb=document.querySelectorAll('.euAct');
      for(var j=0;j<cb.length;j++)perms[cb[j].getAttribute('data-a')]=cb[j].checked?1:0;

    var u=userById(_eu);

      u.name=n; u.role=role; u.phone=phone; u.farmIds=fids; u.perms=perms;

      if(wasDef)u.pin=defPin(u);

    var nu={id:uid(),name:n,role:role,phone:phone,farmIds:fids,perms:perms};
    nu.pin=defPin(nu);
    S.users.push(nu);
  }
  save(); closeModal(); refreshUserChip(); render(); toast("✅ اتحفظ");
}


/* ================= وضع الأوفلاين =================
   الفني جوه العنبر والشبكة ضعيفة. البلاغ بيتسجّل محليًا على طول،
   وتنبيه التليجرام بيتحط في طابور ويتبعت أول ما الشبكة ترجع. */
var OQ_KEY='faultsys_outbox';
function outbox(){ try{return JSON.parse(localStorage.getItem(OQ_KEY)||'[]')}catch(e){return []} }
function setOutbox(a){ try{localStorage.setItem(OQ_KEY,JSON.stringify(a))}catch(e){} }
function isOnline(){ return (typeof navigator==='undefined')||navigator.onLine!==false; }
function queueMsg(text){
  var a=outbox();
  a.push({t:text,at:now()});
  if(a.length>60)a=a.slice(-60);          /* مانكدّسش للأبد */
  setOutbox(a); paintNet();
}
/* بيتنادى لما الشبكة ترجع + كل دقيقتين */
var _flushing=false;
function flushOutbox(cb){
  if(_flushing||!isOnline()){cb&&cb(0);return}
  var a=outbox();
  if(!a.length){cb&&cb(0);return}
  _flushing=true;
  var sent=0;
  (function next(){
    if(!a.length){
      setOutbox([]); _flushing=false; paintNet();
      if(sent)toast('📤 اتبعت '+sent+' تنبيه كان متأخر');
      cb&&cb(sent); return;
    }
    var m=a[0];
    if(m.wa){
      /* رسالة واتساب مؤجلة */
      waSendRaw(m.wa.phone,m.wa.key,m.t,function(ok){
        if(ok){ a.shift(); sent++; setOutbox(a); setTimeout(next,1600); }
        else { _flushing=false; paintNet(); cb&&cb(sent); }
      });
    } else if(tgReady()){
      tgSendRaw(m.t,function(ok){
        if(ok){ a.shift(); sent++; setOutbox(a); next(); }
        else { _flushing=false; paintNet(); cb&&cb(sent); }
      });
    } else {
      /* تليجرام مش متظبط — رجّع الرسالة لآخر الطابور وكمّل */
      a.push(a.shift()); setOutbox(a);
      var allTg=a.every(function(z){return !z.wa});
      if(allTg){ _flushing=false; cb&&cb(sent); return; }
      next();
    }
  })();
}
/* مؤشر الشبكة في الهيدر */
function paintNet(){
  var el=document.getElementById('netDot'); if(!el)return;
  var q=outbox().length;
  if(!isOnline()){
    el.style.display='inline-flex';
    el.className='netdot off';
    el.textContent=q?('📴 '+q):'📴';
    el.title='مفيش نت — '+(q?q+' تنبيه في الطابور':'الشغل بيتسجّل محليًا');
  } else if(q){
    el.style.display='inline-flex';
    el.className='netdot pend';
    el.textContent='📤 '+q;
    el.title=q+' تنبيه مستني الإرسال';
  } else el.style.display='none';
}


/* ================= واتساب أوتوماتيك (CallMeBot) =================
   واتساب مقفولة رسميًا — CallMeBot وسيط مجاني للأرقام الشخصية.
   كل رقم بيفعّل مرة واحدة من موبايله وياخد apikey.
   الإرسال fire-and-forget (no-cors): بيوصل بس مانقدرش نتأكد برمجيًا. */
function waBook(){ if(!S.wa)S.wa=[]; return S.wa; }
function waReady(){ return waBook().some(function(x){return x.phone&&x.key}); }
function waSendRaw(phone,key,text,cb){
  var url='https://api.callmebot.com/whatsapp.php?phone=%2B'+waNum(phone)+
          '&apikey='+encodeURIComponent(key)+
          '&text='+encodeURIComponent(text.slice(0,1800));
  fetch(url,{mode:'no-cors'}).then(function(){cb&&cb(true)}).catch(function(){cb&&cb(false)});
}
/* الإرسال العادي — أوفلاين؟ للطابور */
function waSend(entry,text,cb){
  if(!entry||!entry.phone||!entry.key){cb&&cb(false);return}
  if(!isOnline()){ queueWa(entry,text); cb&&cb(true,'queued'); return; }
  waSendRaw(entry.phone,entry.key,text,function(ok){
    if(!ok){ queueWa(entry,text); cb&&cb(true,'queued'); return; }
    cb&&cb(true);
  });
}
function queueWa(entry,text){
  var a=outbox();
  a.push({t:text,at:now(),wa:{phone:entry.phone,key:entry.key}});
  if(a.length>60)a=a.slice(-60);
  setOutbox(a); paintNet();
}
/* بث لكل الأرقام المشتركة في حدث معيّن — بفاصل ثانيتين عشان حدود CallMeBot */
function waBroadcast(kind,text){
  var list=waBook().filter(function(x){return x.phone&&x.key&&x.on&&x.on[kind]});
  list.forEach(function(e,i){
    setTimeout(function(){ waSend(e,text,function(){}); }, i*2000);
  });
  return list.length;
}

/* ================= تليجرام ================= */
function tgReady(){ return S.tg.token && S.tg.chatId; }
/* الإرسال الخام — من غير طابور (بيستخدمه الطابور نفسه وزرار الاختبار) */
function tgSendRaw(text,cb){
  if(!tgReady()){ if(cb)cb(false,"التليجرام مش متظبط"); return; }
  fetch("https://api.telegram.org/bot"+S.tg.token+"/sendMessage",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:S.tg.chatId,text:text})
  }).then(function(r){return r.json();}).then(function(j){
    if(cb)cb(!!j.ok, j.ok?"":(j.description||"خطأ"));
  }).catch(function(e){ if(cb)cb(false,"مفيش نت أو خطأ اتصال"); });
}
/* الإرسال العادي — لو مفيش نت بيتحط في الطابور بدل ما يضيع */
function tgSend(text,cb){
  if(!tgReady()){ if(cb)cb(false,"التليجرام مش متظبط"); return; }
  if(!isOnline()){ queueMsg(text); if(cb)cb(true,"queued"); return; }
  tgSendRaw(text,function(ok,err){
    if(!ok && /نت|اتصال|Failed|network/i.test(err||'')){
      queueMsg(text);                 /* فشل شبكة — للطابور */
      if(cb)cb(true,"queued"); return;
    }
    if(cb)cb(ok,err);
  });
}
function sevPlain(s){ return SEVS[s]||s; }

/* ================= محرّك الـ SLA ================= */
function slaFor(r){ var s=(S.sla&&S.sla[r.severity])||{resp:240,fix:1440}; return s; }
/* وقت الانتظار (منتظر قطعة) مابيتحسبش على الفني */
function waitMs(r){
  var w=r.waitTotal||0;
  if(r.status==='wait'&&r.waitTs)w+=now()-r.waitTs;
  return w;
}
function respMins(r){                       /* دقايق لحد الاستلام */
  var end=r.startTs||now();
  return Math.round((end-r.ts)/60000);
}
function fixMins(r){                        /* دقايق لحد الإصلاح — ناقص وقت انتظار القطع */
  var end=r.fixTs||now();
  return Math.round(((end-r.ts)-waitMs(r))/60000);
}
function respLate(r){ return respMins(r) > slaFor(r).resp; }
function fixLate(r){ return fixMins(r) > slaFor(r).fix; }
/* حالة البلاغ مقابل الـ SLA: ok | warn | late */
function slaState(r){
  if(r.status==='conf'||r.status==='fixed'){
    return (respLate(r)||fixLate(r))?'late':'ok';
  }
  var f=slaFor(r);
  if(!r.startTs && respLate(r)) return 'late';
  if(fixLate(r)) return 'late';
  var m=fixMins(r);
  if(m > f.fix*0.75) return 'warn';
  if(!r.startTs && respMins(r) > f.resp*0.75) return 'warn';
  return 'ok';
}
function slaBadge(r){
  var st=slaState(r), f=slaFor(r);
  if(st==='ok') return '<span class="sla sla-ok">داخل الوقت</span>';
  if(st==='warn') return '<span class="sla sla-warn">قرّب يتأخر</span>';
  var why = (!r.startTs && respLate(r)) ? ('استلام متأخر ('+mmm(respMins(r))+' / '+mmm(f.resp)+')')
          : ('إصلاح متأخر ('+mmm(fixMins(r))+' / '+mmm(f.fix)+')');
  return '<span class="sla sla-late">⚠️ '+why+'</span>';
}
function mmm(m){
  m=Math.max(0,Math.round(m));
  if(m<60) return m+' د';
  var h=Math.floor(m/60), r=m%60;
  if(h<24) return h+' س'+(r?' '+r+' د':'');
  var d=Math.floor(h/24); return d+' يوم'+(h%24?' '+(h%24)+' س':'');
}

/* ================= التصعيد التلقائي ================= */
function roleUsers(role){ return S.users.filter(function(u){return u.role===role}); }
/* المسؤولين عن مزرعة معيّنة: مدير المزرعة نفسه أولوية، وبعده اللي دوره كده */
function targetUsers(role,farmId){
  var all=roleUsers(role);
  if(role==='farm'&&farmId){
    var f=all.filter(function(u){return (u.farmIds||[]).indexOf(farmId)>=0});
    if(f.length)return f;
  }
  return all;
}
function escNames(role,farmId){
  var a=targetUsers(role,farmId);
  if(!a.length)return ROLES[role];
  return a.map(function(u){return u.name+(u.phone?" ("+u.phone+")":"")}).join(' · ');
}

/* بيشتغل عند فتح البرنامج وكل دقيقة وهو مفتوح */
function checkEsc(){
  if(!S.esc||!S.esc.on||!tgReady())return;
  var changed=false;
  for(var i=0;i<S.reports.length;i++){
    var r=S.reports[i];
    if(!OPEN_ST[r.status])continue;
    if(S.esc.sevs.indexOf(r.severity)<0)continue;
    if(r.status==='wait')continue;                /* منتظر قطعة — مش ذنب الفني */
    if(!r.escLog)r.escLog=[];
    var mins=Math.round((now()-r.ts-waitMs(r))/60000);
    for(var j=0;j<S.esc.steps.length;j++){
      var st=S.esc.steps[j];
      if(mins < st.min)continue;
      var done=r.escLog.some(function(e){return e.level===(j+1)});
      if(done)continue;
      (function(rep,step,lvl){
        tgSend(msgEsc(rep,step,lvl),function(ok){ });
      })(r,st,j+1);
      r.escLog.push({level:j+1,at:now(),role:st.role});
      changed=true;
    }
  }
  if(changed){ save(); if(TAB==='reports')render(); }
}


/* ================= التذكيرات حسب المرحلة =================
   الفرق عن التصعيد: التصعيد بيروح لفوق للمدير.
   التذكير بينبّه *الشخص المسؤول دلوقتي* في المرحلة دي بالاسم.
   وبيشتغل على كل الدرجات — مش الحرج بس. */
var STAGE_DEF={
  new:  {after:20,   lbl:'محدش استلم البلاغ'},
  prog: {after:120,  lbl:'مستلم ولسه ماقفلش'},
  wait: {after:1440, lbl:'منتظر قطعة من زمان'},
  fixed:{after:240,  lbl:'اتصلح ومحدش أكّد'}
};
function stageStart(r){
  if(r.status==='new')return r.ts;
  if(r.status==='prog')return r.startTs||r.ts;
  if(r.status==='wait')return r.waitTs||r.ts;
  if(r.status==='fixed')return r.fixTs||r.ts;
  return 0;
}
function stageMins(r){ var s=stageStart(r); return s?Math.round((now()-s)/60000):0; }
/* مين المسؤول في المرحلة دي */
function stageOwner(r){
  if(r.status==='new')  return {who:'الفنيين', users:roleUsers('tech').concat(roleUsers('maint'))};
  if(r.status==='prog'){
    var t=null;
    for(var i=0;i<S.users.length;i++)if(S.users[i].name===r.startedBy){t=S.users[i];break}
    return {who:r.startedBy||'الفني', users:t?[t]:roleUsers('maint')};
  }
  if(r.status==='wait') return {who:'مدير الصيانة / المخزن', users:roleUsers('maint')};
  if(r.status==='fixed'){
    var u=userById(r.reporterId);
    return {who:r.reporterName||'المبلّغ', users:u?[u]:[]};
  }
  return {who:'—', users:[]};
}
function msgRemind(r,mins){
  var st=r.status, o=stageOwner(r);
  var names=o.users.map(function(u){return u.name+(u.phone?' ('+u.phone+')':'')}).join(' · ')||o.who;
  var head, ask;
  if(st==='new'){
    head='⏰ بلاغ مستني حد يستلمه';
    ask='محدش استلم البلاغ بقاله '+mmm(mins)+'.\n👉 مين هيستلمه؟';
  } else if(st==='prog'){
    head='⏰ بلاغ مفتوح من زمان';
    ask='مستلم من '+mmm(mins)+' ولسه ماتقفلش.\n👉 '+(r.startedBy||'الفني')+' — إيه الموقف؟ خلص ولا محتاج مساعدة؟\nلو منتظر قطعة، دوس «⏸️ منتظر قطعة».';
  } else if(st==='wait'){
    head='📦 قطعة غيار متأخرة';
    ask='البلاغ موقوف من '+mmm(mins)+' منتظر: '+(r.waitPart||'قطعة')+(r.waitNote?'\n📝 '+r.waitNote:'')+'\n👉 القطعة وصلت ولا لسه؟';
  } else {
    head='✅ مستني تأكيدك';
    ask='الفني قال إنه اتصلح من '+mmm(mins)+' ومحدش أكّد.\n👉 '+(r.reporterName||'يا مبلّغ')+' — اتطمّن على العطل وأكّد.\nلو لسه فيه مشكلة قول عشان نفتحه تاني.';
  }
  return head+' — بلاغ #'+r.num+'\n'+
    '🏠 '+r.farmName+' — وحدة '+r.house+'\n'+
    '⚙️ '+r.fault+' · '+sevPlain(r.severity)+'\n'+
    '📌 '+STATUS[r.status]+'\n\n'+
    ask+'\n\n👤 المطلوب منه: '+names;
}
function checkRemind(){
  if(!S.remind||!S.remind.on||!tgReady())return;
  var changed=false, t=now();
  for(var i=0;i<S.reports.length;i++){
    var r=S.reports[i];
    if(r.status==='conf')continue;
    var cfg=(S.remind.stages||{})[r.status];
    if(!cfg||!cfg.on)continue;
    var mins=stageMins(r);
    if(mins<cfg.after)continue;
    if(!r.remN)r.remN={};
    if(!r.remAt)r.remAt={};
    if((r.remN[r.status]||0)>=(S.remind.max||3))continue;
    var last=r.remAt[r.status]||0;
    if(last&&(t-last)<(S.remind.every||120)*60000)continue;   /* مانزنّش */
    tgSend(msgRemind(r,mins),function(){});
    r.remN[r.status]=(r.remN[r.status]||0)+1;
    r.remAt[r.status]=t;
    changed=true;
  }
  if(changed){ save(); if(TAB==='reports')render(); }
}


/* ===== سلسلة التكرار الصريحة ===== */
function chainRoot(r){
  var seen={}, cur=r;
  while(cur&&cur.repeatOf&&!seen[cur.id]){
    seen[cur.id]=1;
    var p=findRep(cur.repeatOf);
    if(!p)break;
    cur=p;
  }
  return cur;
}
function chainMembers(rootId){
  var out=[], root=findRep(rootId);
  if(root)out.push(root);
  var grew=true, ids={}; ids[rootId]=1;
  while(grew){
    grew=false;
    for(var i=0;i<S.reports.length;i++){
      var x=S.reports[i];
      if(x.repeatOf&&ids[x.repeatOf]&&!ids[x.id]){ ids[x.id]=1; out.push(x); grew=true; }
    }
  }
  out.sort(function(a,b){return a.ts-b.ts});
  return out;
}
function chainInfo(r){
  var root=chainRoot(r);
  var m=chainMembers(root.id);
  var idx=0;
  for(var i=0;i<m.length;i++)if(m[i].id===r.id)idx=i+1;
  return {root:root, n:m.length, idx:idx, members:m};
}
/* ===== كاشف المعدل غير الطبيعي =====
   لمبة = عادي. تلات لمبات في أسبوع = مشكلة جهد.
   نفس الموقع+الوحدة+العطل ≥3 مرات في 7 أيام — حتى لو معدات مختلفة. */
function rateAnomaly(fid,house,fault){
  var since=now()-7*864e5, n=0;
  for(var i=0;i<S.reports.length;i++){
    var x=S.reports[i];
    if(x.farmId===fid&&String(x.house)===String(house)&&x.fault===fault&&x.ts>=since)n++;
  }
  return n>=3?n:0;
}

/* ================= تكرار العطل والسبب الجذري ================= */
function repeatCount(r){
  var n=0;
  for(var i=0;i<S.reports.length;i++){
    var x=S.reports[i];
    if(x.farmId===r.farmId && String(x.house)===String(r.house) && x.fault===r.fault) n++;
  }
  return n;
}
function needsRoot(r){
  /* سلسلة صريحة: من المرة التانية السبب الجذري إجباري */
  if(r&&r.repeatOf){ var ci=chainInfo(r); if(ci.n>=2)return true; } return repeatCount(r)>=3; }

/* ================= تكلفة التعطّل ================= */
function downtimeCost(r){
  if(!S.cost||!S.cost.on)return null;
  if(['تهوية','تبريد','كهرباء','مولد'].indexOf(r.category)<0)return null;  /* الأعطال اللي بتأثر على الطيور */
  if(r.severity!=='critical'&&r.severity!=='high')return null;
  var hrs=((r.fixTs||now())-r.ts-waitMs(r))/36e5;
  var f=(S.cost.perBirdHour||0)*(S.cost.birds||0);
  var c=hrs*f*(r.severity==='critical'?1:0.35);
  return Math.round(c);
}


/* ================= الصور (مضغوطة) =================
   بنصغّرها لـ 900px و JPEG 55% — عشان تعدّي في localStorage و Firebase */
function compressImg(file, cb){
  var rd=new FileReader();
  rd.onload=function(){
    var img=new Image();
    img.onload=function(){
      var MX=900, w=img.width, h=img.height;
      if(w>MX||h>MX){ if(w>h){h=Math.round(h*MX/w);w=MX;} else {w=Math.round(w*MX/h);h=MX;} }
      var c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      try{ cb(c.toDataURL('image/jpeg',0.55)); }catch(e){ cb(null); }
    };
    img.onerror=function(){cb(null)};
    img.src=rd.result;
  };
  rd.onerror=function(){cb(null)};
  rd.readAsDataURL(file);
}
var PHOTO_BUF={before:[],after:[]};
function addPhoto(which,inp){
  var f=inp.files&&inp.files[0]; if(!f){return}
  if(PHOTO_BUF[which].length>=3){toast("٣ صور بالكتير");inp.value='';return}
  toast("⏳ بجهّز الصورة…");
  compressImg(f,function(d){
    inp.value='';
    if(!d){toast("❌ مقدرتش أقرا الصورة");return}
    PHOTO_BUF[which].push(d);
    var box=document.getElementById('ph_'+which);
    if(box)box.innerHTML=PHOTO_BUF[which].map(function(p,i){
      return '<div class="thumb"><img src="'+p+'"><span class="x" onclick="rmPhoto(\''+which+'\','+i+')">✕</span></div>';
    }).join('');
    toast("📸 اتضافت ("+PHOTO_BUF[which].length+")");
  });
}
function rmPhoto(which,i){
  PHOTO_BUF[which].splice(i,1);
  var box=document.getElementById('ph_'+which);
  if(box)box.innerHTML=PHOTO_BUF[which].map(function(p,j){
    return '<div class="thumb"><img src="'+p+'"><span class="x" onclick="rmPhoto(\''+which+'\','+j+')">✕</span></div>';
  }).join('');
}
function photoBox(which,label){
  return '<label>'+label+' <span style="color:var(--muted);font-weight:400">(٣ بالكتير)</span></label>'+
    '<div class="thumbs" id="ph_'+which+'"></div>'+
    '<input type="file" accept="image/*" id="phin_'+which+'" style="display:none" onchange="addPhoto(\''+which+'\',this)">'+
    '<button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById(\'phin_'+which+'\').click()">📷 إضافة صورة</button>';

/* ================= الخطورة الثابتة =================
   المبلّغ مايقدرش يقول على انقطاع التهوية "منخفضة" — دي حياة طيور.
   FORCED_SEV: عطل → درجة إجبارية مقفولة.
   MIN_SEV: عطل → حد أدنى (يقدر يعلّي، مايقدرش ينزل). */
var FORCED_SEV={
  /* حياة الطيور — دقايق بتفرق */
  "المولد لا يعمل":"critical",
  "انقطاع تيار كهربائي":"critical",
  "عطل لوحة التحويل ATS":"critical",
  "انقطاع مياه كامل":"critical",
  "عطل شفاط":"critical",
  "عطل كنترول التهوية":"critical",
  "ماس كهربائي / سلك مقطوع":"critical",   /* حريق */
  "تسريب وقود أو زيت":"critical",          /* حريق */
  "تسريب غاز":"critical",
  "حريق / دخان":"critical"
};
var MIN_SEV={
  "عطل موتور شفاط":"high",
  "سخونة زائدة":"high",
  "عطل حساس حرارة":"high",
  "عطل طلمبة مياه":"high",
  "عطل مضخة خلايا":"high",
  "انخفاض / ارتفاع الجهد":"high",
  "عطل سلف / بطارية":"high",
  "عطل دفاية":"high",
  "انسداد خط مياه":"high"
};
var SEV_ORDER={low:0,med:1,high:2,critical:3};
function faultSevRule(fault){
  if(FORCED_SEV[fault])return {kind:'forced',sev:FORCED_SEV[fault]};
  if(MIN_SEV[fault])return {kind:'min',sev:MIN_SEV[fault]};
  return null;
}
/* بتتنادى لما العطل يتغيّر في النموذج */
function applySevRule(){
  var fsel=document.getElementById('nFault');
  var fault=fsel?fsel.value:'';
  var rule=faultSevRule(fault);
  var box=document.getElementById('sevBox'), note=document.getElementById('sevNote');
  var spans=box?box.querySelectorAll('span'):[];
  for(var i=0;i<spans.length;i++){ spans[i].classList.remove('sev-lock'); }
  if(!rule){ if(note)note.innerHTML=''; showSlaHint(); return; }
  if(rule.kind==='forced'){
    pickedSev=rule.sev;
    for(var i=0;i<spans.length;i++){
      var v=spans[i].getAttribute('data-v');
      spans[i].classList.toggle('on',v===rule.sev);
      if(v!==rule.sev)spans[i].classList.add('sev-lock');
    }
    if(note)note.innerHTML='🔒 العطل ده درجته <b>'+SEVS[rule.sev]+'</b> ثابتة — لأنه بيهدد حياة الطيور أو خطر حريق. مش قابلة للتغيير.';
  } else {
    if(SEV_ORDER[pickedSev]<SEV_ORDER[rule.sev]){
      pickedSev=rule.sev;
      for(var i=0;i<spans.length;i++)spans[i].classList.toggle('on',spans[i].getAttribute('data-v')===rule.sev);
    }
    for(var i=0;i<spans.length;i++){
      var v=spans[i].getAttribute('data-v');
      if(SEV_ORDER[v]<SEV_ORDER[rule.sev])spans[i].classList.add('sev-lock');
    }
    if(note)note.innerHTML='⬆️ الحد الأدنى للعطل ده <b>'+SEVS[rule.sev]+'</b> — تقدر تعلّيها، مش تنزّلها.';
  }
  showSlaHint();
}

/* المشابهين القريبين: نفس الموقع + الوحدة + العطل خلال آخر أيام */
var REPEAT_LOOKBACK=14;   /* يوم */
function findSimilar(fid,house,fault){
  var since=now()-REPEAT_LOOKBACK*864e5, out=[];
  for(var i=0;i<S.reports.length;i++){
    var x=S.reports[i];
    if(x.farmId===fid&&String(x.house)===String(house)&&x.fault===fault&&x.ts>=since)out.push(x);
  }
  out.sort(function(a,b){return b.ts-a.ts});
  return out;
}
var _pendRepeat=null;

  var u=curUser(); if(!u){openUserPicker();return;}

  for(var i=0;i<S.farms.length;i++){if(S.farms[i].id===fid)fName=S.farms[i].name;}
  /* ===== فيه نفس العطل قريب؟ اسأل الأول ===== */
  if(_pendRepeat===null){

      h+='<div class="hint">«'+esc(_fault)+'» في نفس الوحدة خلال آخر '+REPEAT_LOOKBACK+' يوم.<br><b>هي نفس المشكلة رجعت، ولا معدة تانية؟</b></div>';
      for(var i=0;i<Math.min(_sim.length,5);i++){
        var s=_sim[i];

        h+='<button class="btn btn-ghost simbtn" onclick="pickRepeat(\''+s.id+'\')">'+

           (s.equip?('📍 '+esc(s.equip)+' · '):'')+'من '+(ago<1?'ساعات':(Math.round(ago)+' يوم'))+
           (s.fixedBy?(' · صلّحها '+esc(s.fixedBy)):' · لسه مفتوح')+'</small></button>';
      }
      h+='<button class="btn btn-green" style="margin-top:10px" onclick="pickRepeat(null)">🆕 لأ — معدة تانية / مشكلة جديدة</button>';
      h+='<button class="btn btn-ghost" style="margin-top:8px" onclick="_pendRepeat=null;closeModal()">إلغاء</button>';
      _pendRepeat='ask';
      openModal(h);
      return;
    }

  }
  var _repOf=(_pendRepeat&&_pendRepeat!=='ask'&&_pendRepeat!==false)?_pendRepeat:null;
  _pendRepeat=null;
  var maxNum=0; for(var k=0;k<S.reports.length;k++){if(S.reports[k].num>maxNum)maxNum=S.reports[k].num;}
  var r={

    fault:document.getElementById('nFault').value,

    desc:(document.getElementById('nDesc').value||"").trim(),

    status:'new', startTs:0, startedBy:"", fixTs:0, fixDesc:"", fixedBy:"", confTs:0,
    parts:[], photos:{before:PHOTO_BUF.before.slice(),after:[]},
    waitTs:0, waitTotal:0, waitPart:"", waitNote:"", escLog:[], rootCause:"",
    equip:(document.getElementById('nEquip')?(document.getElementById('nEquip').value||'').trim():''),
    repeatOf:_repOf
  };
  PHOTO_BUF={before:[],after:[]};
  S.reports.unshift(r); save();
  /* سلسلة مرتبطة؟ */
  if(r.repeatOf){
    var ci=chainInfo(r);
    var orig=findRep(r.repeatOf);
    var chMsg='🔁 المشكلة رجعت — المرة رقم '+ci.n+'\n'+
      'بلاغ #'+r.num+' مربوط ببلاغ #'+(orig?orig.num:'؟')+'\n'+
      '🏠 '+r.farmName+' — وحدة '+r.house+(r.equip?(' · '+r.equip):'')+'\n'+
      '⚙️ '+r.fault+'\n'+
      (orig&&orig.fixedBy?('🔧 آخر مرة صلّحها: '+orig.fixedBy+'\n'):'')+
      (ci.n>=3?'\n⛔ التالتة — الإصلاح اللي بيتعمل مش بيحل المشكلة. لازم سبب جذري.':'\n⚠️ التانية — لو رجعت تالت مرة يبقى فيه حاجة غلط في طريقة الإصلاح.');
    if(tgReady())tgSend(chMsg,function(){});
    setTimeout(function(){toast('🔁 اتربطت كمشكلة راجعة — المرة رقم '+ci.n)},1600);
  }
  /* معدل غير طبيعي؟ (حتى للمعدات المختلفة) */
  var _anom=rateAnomaly(r.farmId,r.house,r.fault);

      '«'+r.fault+'» حصل '+_anom+' مرات في نفس الوحدة خلال أسبوع\n'+
      '🏠 '+r.farmName+' — وحدة '+r.house+'\n\n'+

      '🔍 دوّر على السبب المشترك: جهد كهربا؟ تأريض؟ جودة قطع؟ بيئة تشغيل؟';
    if(tgReady())tgSend(anMsg,function(){});
    setTimeout(function(){toast('📈 تنبيه: '+_anom+' مرات في أسبوع — معدل مش طبيعي')},2200);
  }
  if(!isOnline())setTimeout(function(){toast("📴 اتسجّل محليًا — التنبيه هيتبعت أول ما النت يرجع")},1200);
  if(S.tg.onNew && tgReady()){
    tgSend(msgNew(r),function(ok,err){ toast(ok?"✅ البلاغ اتسجل والتنبيه اتبعت على تليجرام":"البلاغ اتسجل ✅ لكن التليجرام فشل: "+err); });
  /* واتساب: البلاغات الحرجة والعالية بس — مانزعجش الناس باللمبات */
  if(r.severity==='critical'||r.severity==='high'){
    var _wn=waBroadcast('crit','🚨 بلاغ '+(r.severity==='critical'?'حرج':'عالي')+' #'+r.num+'\n'+
      '🏠 '+r.farmName+' — وحدة '+r.house+'\n⚙️ '+r.fault+'\n👤 '+r.reporterName+
      '\n\n(من نظام الأعطال)');
    if(_wn)setTimeout(function(){toast('💬 اتبعت واتساب لـ '+_wn)},1800);
  }
  } else toast("✅ البلاغ اتسجل");
  go('reports');
}

function renderReports(){

var DASH={p:'m', farmId:'', from:'', to:''};
var PERIODS={
  w:{n:'أسبوع',d:7}, m:{n:'شهر',d:30}, q:{n:'٣ شهور',d:90},
  h:{n:'٦ شهور',d:180}, y:{n:'سنة',d:365},
  cyc:{n:'الدورة',d:null}, all:{n:'الكل',d:null}, cus:{n:'فترة',d:null}
};
function dashRange(){
  var to=now(), from=0;
  if(DASH.p==='cus'){
    from=DASH.from?new Date(DASH.from+'T00:00:00').getTime():0;
    to=DASH.to?new Date(DASH.to+'T23:59:59').getTime():now();
  } else if(DASH.p==='all'){ from=0; }
  else if(DASH.p==='cyc'){ from=now()-((S.cycleDays||42)*864e5); }
  else { from=now()-(PERIODS[DASH.p].d*864e5); }
  return {from:from,to:to};
}
function dashReports(){
  var r=dashRange();
  var src=myReports();
  return src.filter(function(x){
    if(x.ts<r.from||x.ts>r.to)return false;
    if(DASH.farmId&&x.farmId!==DASH.farmId)return false;
    return true;
  });
}

function siteManager(farmId){

function fmtD(ts){ var d=new Date(ts); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }

/* ================= رسومات SVG ================= */
function svgTrend(pts,w,h,color){
  if(!pts.length)return '';
  var mx=Math.max.apply(null,pts.concat([1]));
  var step=pts.length>1?w/(pts.length-1):w;
  var d='',a='';
  for(var i=0;i<pts.length;i++){
    var x=i*step, y=h-(pts[i]/mx)*(h-6)-3;
    d+=(i?' L':'M')+x.toFixed(1)+','+y.toFixed(1);
  }
  a=d+' L'+w+','+h+' L0,'+h+' Z';
  return '<svg class="trend" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0" stop-color="'+color+'" stop-opacity=".35"/>'+
    '<stop offset="1" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+a+'" fill="url(#tg)"/>'+
    '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    '</svg>';
}
function svgDonut(items,size){
  var tot=0; items.forEach(function(x){tot+=x[1]});
  if(!tot)return '';
  var R=size/2, r=R*0.62, cx=R, cy=R, acc=-Math.PI/2, out='';
  var COLS=['#58a6ff','#e8a94f','#2ea043','#a371f7','#d29922','#da3633','#3fb950','#f0883e','#8b949e','#6e7681'];
  items.forEach(function(x,i){
    var ang=(x[1]/tot)*Math.PI*2, e=acc+ang;
    var big=ang>Math.PI?1:0;
    var x1=cx+R*Math.cos(acc), y1=cy+R*Math.sin(acc);
    var x2=cx+R*Math.cos(e),   y2=cy+R*Math.sin(e);
    var x3=cx+r*Math.cos(e),   y3=cy+r*Math.sin(e);
    var x4=cx+r*Math.cos(acc), y4=cy+r*Math.sin(acc);
    out+='<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+R+','+R+' 0 '+big+' 1 '+x2.toFixed(1)+','+y2.toFixed(1)+
         ' L'+x3.toFixed(1)+','+y3.toFixed(1)+' A'+r+','+r+' 0 '+big+' 0 '+x4.toFixed(1)+','+y4.toFixed(1)+' Z" fill="'+COLS[i%COLS.length]+'"/>';
    acc=e;
  });
  return '<svg viewBox="0 0 '+size+' '+size+'" class="donut">'+out+
    '<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" fill="#e6edf3" font-size="'+(size*0.2)+'" font-weight="800">'+tot+'</text>'+
    '<text x="'+cx+'" y="'+(cy+size*0.14)+'" text-anchor="middle" fill="#8b949e" font-size="'+(size*0.09)+'">بلاغ</text></svg>';
}
function donutLegend(items){
  var COLS=['#58a6ff','#e8a94f','#2ea043','#a371f7','#d29922','#da3633','#3fb950','#f0883e','#8b949e','#6e7681'];
  var tot=0; items.forEach(function(x){tot+=x[1]});
  return '<div class="lgnd">'+items.map(function(x,i){
    return '<div class="lg"><span class="sw" style="background:'+COLS[i%COLS.length]+'"></span>'+
      esc(x[0])+' <b>'+x[1]+'</b> <small>'+Math.round(x[1]/tot*100)+'%</small></div>';
  }).join('')+'</div>';
}
function heatmap(matrix,labels){
  var mx=1;
  for(var i=0;i<matrix.length;i++)for(var j=0;j<matrix[i].length;j++)if(matrix[i][j]>mx)mx=matrix[i][j];
  var h='<div class="heat"><div class="hrow hhdr"><span></span>';
  for(var q=0;q<24;q+=3)h+='<span class="hh">'+q+'</span>';
  h+='</div>';
  for(var i=0;i<7;i++){
    h+='<div class="hrow"><span class="hl">'+labels[i]+'</span>';
    for(var j=0;j<24;j++){
      var v=matrix[i][j], o=v?(0.18+0.82*(v/mx)):0;
      h+='<i class="hc" style="background:rgba(218,54,51,'+o.toFixed(2)+')" title="'+labels[i]+' '+j+':00 — '+v+'"></i>';
    }
    h+='</div>';
  }
  return h+'</div>';
}


/* ================= التحليلات ================= */
function dashStats(){
  var L=dashReports();
  var o={n:L.length, open:0, crit:0, closed:0, late:0, fixH:0, fixN:0, cost:0,
         byFarm:{}, byCat:{}, byMgr:{}, byTech:{}, bySite:{}, trend:[], heat:[],
         repSame:[], repCross:[], repMgr:[], mtbf:{}, ftf:{ok:0,tot:0}, downH:{}};
  /* خريطة حرارية 7×24 */
  for(var i=0;i<7;i++){ o.heat.push([]); for(var j=0;j<24;j++)o.heat[i].push(0); }
  var sig={}, mgrSig={}, times={};
  for(var i=0;i<L.length;i++){
    var r=L[i];
    if(OPEN_ST[r.status])o.open++;
    if(OPEN_ST[r.status]&&r.severity==='critical')o.crit++;
    if(r.status==='conf'||r.status==='fixed'){
      o.closed++;
      if(respLate(r)||fixLate(r))o.late++;
    }
    if(r.fixTs){ o.fixH+=hoursBetween(r.ts,r.fixTs); o.fixN++; }
    o.byFarm[r.farmName]=(o.byFarm[r.farmName]||0)+1;
    o.byCat[r.category]=(o.byCat[r.category]||0)+1;
    var f=siteById(r.farmId);
    if(f){var t=SITE_TYPES[siteType(f)].name; o.bySite[t]=(o.bySite[t]||0)+1;}
    var mgr=siteManager(r.farmId);
    if(mgr)o.byMgr[mgr.name]=(o.byMgr[mgr.name]||0)+1;
    if(r.startedBy)o.byTech[r.startedBy]=(o.byTech[r.startedBy]||0)+1;
    var c=downtimeCost(r); if(c)o.cost+=c;
    if(r.fixTs){ var dh=(r.fixTs-r.ts-waitMs(r))/36e5; o.downH[r.farmName]=(o.downH[r.farmName]||0)+dh; }
    var d=new Date(r.ts);
    o.heat[d.getDay()][d.getHours()]++;
    /* بصمات التكرار */
    var kSame=r.farmId+'|'+r.house+'|'+r.fault;
    (sig[kSame]=sig[kSame]||[]).push(r);
    if(mgr){ var kM=mgr.id+'|'+r.fault; (mgrSig[kM]=mgrSig[kM]||[]).push(r); }
    (times[r.category]=times[r.category]||[]).push(r.ts);
  }
  o.avgH=o.fixN?Math.round(o.fixH/o.fixN*10)/10:0;
  o.comply=o.closed?Math.round((o.closed-o.late)/o.closed*100):100;
  /* السلاسل الصريحة (المربوطة يدوي) */
  o.chains=[]; o.backToTech={};
  var roots={};
  for(var i=0;i<L.length;i++){
    var r=L[i];
    if(!r.repeatOf)continue;
    var ci=chainInfo(r);
    if(!roots[ci.root.id]){
      roots[ci.root.id]=1;
      o.chains.push({fault:ci.root.fault,farm:ci.root.farmName,house:ci.root.house,n:ci.n,
        equip:ci.root.equip||'',lastTs:ci.members[ci.members.length-1].ts});
    }
    /* التقييم الوحش: الإصلاح اللي رجع بعده — بيتحسب على اللي صلّح */
    var prev=findRep(r.repeatOf);
    if(prev&&prev.fixedBy)o.backToTech[prev.fixedBy]=(o.backToTech[prev.fixedBy]||0)+1;
  }
  o.chains.sort(function(a,b){return b.n-a.n});

  /* ١) نفس العطل نفس العنبر */
  for(var k in sig){
    if(sig[k].length<2)continue;
    var a=sig[k][0];
    o.repSame.push({farm:a.farmName,house:a.house,fault:a.fault,n:sig[k].length,cat:a.category});
  }
  o.repSame.sort(function(x,y){return y.n-x.n});

  /* ٢) نفس العطل في مزارع مختلفة → مشكلة نظامية */
  var byFault={};
  for(var i=0;i<L.length;i++){
    var r=L[i];
    if(!byFault[r.fault])byFault[r.fault]={farms:{},n:0,cat:r.category};
    byFault[r.fault].farms[r.farmName]=(byFault[r.fault].farms[r.farmName]||0)+1;
    byFault[r.fault].n++;
  }
  for(var f2 in byFault){
    var fk=Object.keys(byFault[f2].farms);
    if(fk.length>=2&&byFault[f2].n>=3)
      o.repCross.push({fault:f2,farms:fk,nf:fk.length,n:byFault[f2].n,cat:byFault[f2].cat});
  }
  o.repCross.sort(function(x,y){return (y.nf-x.nf)||(y.n-x.n)});

  /* ٣) نفس العطل مع نفس المدير في مواقع مختلفة → المدير هو العامل المشترك */
  for(var k2 in mgrSig){
    var arr=mgrSig[k2];
    if(arr.length<3)continue;
    var fset={}; arr.forEach(function(x){fset[x.farmName]=1});
    var nf=Object.keys(fset).length;
    if(nf<2)continue;
    var mid=k2.split('|')[0], mu=userById(mid);
    o.repMgr.push({mgr:mu?mu.name:'—',mgrId:mid,fault:arr[0].fault,n:arr.length,farms:Object.keys(fset),nf:nf});
  }
  o.repMgr.sort(function(x,y){return (y.nf-x.nf)||(y.n-x.n)});

  /* MTBF لكل تصنيف */
  for(var c2 in times){
    var t=times[c2].slice().sort(function(a,b){return a-b});
    if(t.length<2)continue;
    var gaps=0;
    for(var i=1;i<t.length;i++)gaps+=(t[i]-t[i-1]);
    o.mtbf[c2]=Math.round(gaps/(t.length-1)/864e5*10)/10;
  }
  /* الإصلاح من أول مرة: مااترجعش نفس العطل خلال ٧ أيام */
  for(var i=0;i<L.length;i++){
    var r=L[i]; if(!r.fixTs)continue;
    o.ftf.tot++;
    /* أولوية للربط الصريح: فيه بلاغ متربط بيه؟ */
    var again=S.reports.some(function(x){return x.repeatOf===r.id});
    /* احتياطي: نفس البصمة خلال أسبوع (للبلاغات القديمة قبل الميزة) */
    if(!again)again=L.some(function(x){
      return x.id!==r.id && !x.repeatOf && x.farmId===r.farmId && String(x.house)===String(r.house) &&
             x.fault===r.fault && x.ts>r.fixTs && x.ts<r.fixTs+7*864e5;
    });
    if(!again)o.ftf.ok++;
  }
  /* الاتجاه الزمني */
  var R=dashRange();
  var span=Math.max(1,(R.to-R.from)/864e5);
  var buckets=span<=31?Math.ceil(span):(span<=190?Math.ceil(span/7):12);
  var bw=(R.to-R.from)/buckets;
  for(var b=0;b<buckets;b++)o.trend.push(0);
  L.forEach(function(r){
    var idx=Math.min(buckets-1,Math.floor((r.ts-R.from)/bw));
    if(idx>=0)o.trend[idx]++;
  });
  o.bucketName=span<=31?'يوم':(span<=190?'أسبوع':'شهر');
  /* الوقائي مقابل الطارئ */
  var pmDone=0;
  (S.pm||[]).forEach(function(t){ if(t.lastDone&&t.lastDone>=R.from&&t.lastDone<=R.to)pmDone++; });
  o.pmDone=pmDone;
  o.pmRatio=(pmDone+L.length)?Math.round(pmDone/(pmDone+L.length)*100):0;
  return o;
}
function topList(obj,n){
  var a=[]; for(var k in obj)a.push([k,obj[k]]);
  a.sort(function(x,y){return y[1]-x[1]});
  return a.slice(0,n||6);
}

/* ================= التقارير والإحصائيات ================= */
function renderStats(){
  var open=0,critOpen=0,fixedCount=0,totalHrs=0,lateCount=0,closedCount=0,cost=0;
  var byCat={},byFarm={},repeat={},byMonth={},parts={},roots={};
  for(var i=0;i<S.reports.length;i++){var r=S.reports[i];
    if(OPEN_ST[r.status]||r.status==='fixed')open++;
    if(OPEN_ST[r.status]&&r.severity==='critical')critOpen++;
    if(r.fixTs){fixedCount++;totalHrs+=hoursBetween(r.ts,r.fixTs);}
    if(r.status==='conf'||r.status==='fixed'){ closedCount++; if(respLate(r)||fixLate(r))lateCount++; }
    byCat[r.category]=(byCat[r.category]||0)+1;
    byFarm[r.farmName]=(byFarm[r.farmName]||0)+1;
    var key=r.farmName+" ع"+r.house+" — "+r.fault;
    repeat[key]=(repeat[key]||0)+1;
    var mo=new Date(r.ts).getMonth();
    if(!byMonth[mo])byMonth[mo]={};
    byMonth[mo][r.category]=(byMonth[mo][r.category]||0)+1;
    if(r.parts)r.parts.forEach(function(p){parts[p.name]=(parts[p.name]||0)+(p.qty||1)});
    if(r.rootCause)roots[r.rootCause]=(roots[r.rootCause]||0)+1;
    var c=downtimeCost(r); if(c)cost+=c;
  }
  var avg=fixedCount?Math.round(totalHrs/fixedCount*10)/10:0;
  var comply=closedCount?Math.round((closedCount-lateCount)/closedCount*100):100;
  var ccol=comply>=90?'var(--green)':(comply>=70?'var(--amber)':'var(--red)');

  var h='<div class="stat-grid">'+
  '<div class="stat"><div class="v" style="color:var(--red)">'+open+'</div><div class="l">بلاغات مفتوحة</div></div>'+
  '<div class="stat"><div class="v" style="color:var(--amber)">'+critOpen+'</div><div class="l">حرجة مفتوحة</div></div>'+
  '<div class="stat"><div class="v" style="color:'+ccol+'">'+comply+'%</div><div class="l">الالتزام بالـ SLA</div></div>'+
  '<div class="stat"><div class="v" style="color:var(--blue)">'+avg+'</div><div class="l">متوسط ساعات الإصلاح</div></div></div>';

  /* الالتزام بالـ SLA لكل درجة */
  h+='<div class="card"><h3>⏱️ الالتزام بزمن الاستجابة (SLA)</h3>';
  var sevOrder=['critical','high','med','low'], any=false;
  for(var si=0;si<sevOrder.length;si++){
    var sv=sevOrder[si], tot=0, ok=0;
    for(var k2=0;k2<S.reports.length;k2++){
      var rr=S.reports[k2];
      if(rr.severity!==sv)continue;
      if(rr.status!=='conf'&&rr.status!=='fixed')continue;
      tot++; if(!respLate(rr)&&!fixLate(rr))ok++;
    }
    if(!tot)continue; any=true;
    var pc=Math.round(ok/tot*100);
    var col=pc>=90?'var(--green)':(pc>=70?'var(--amber)':'var(--red)');
    h+='<div class="barrow"><span class="bl">'+SEVS[sv]+'</span><div class="bt"><div class="bf" style="width:'+pc+'%;background:'+col+'"></div></div><span class="bv">'+pc+'% <small>('+ok+'/'+tot+')</small></span></div>';
  }
  if(!any)h+='<div class="hint">لسه مفيش بلاغات مقفولة نقيس عليها.</div>';
  else h+='<div class="hint">المستهدف: <b>٩٠٪ فأكتر</b>. أقل من ٧٠٪ يعني إما الفريق قليل أو الأزمنة المستهدفة مش واقعية — راجعها من الإعدادات.</div>';
  h+='</div>';

  /* تكلفة التعطّل */
  if(S.cost&&S.cost.on&&cost>0){
    h+='<div class="card"><h3>💸 تكلفة التعطّل التقديرية</h3>';
    h+='<div class="bignum">'+cost.toLocaleString('en-US')+' <small>ج.م</small></div>';
    h+='<div class="hint">تقدير خسارة الأعطال الحرجة/العالية في التهوية والتبريد والكهرباء والمولد.<br>'+
       'محسوبة على <b>'+(S.cost.birds||0).toLocaleString('en-US')+' طير</b> × <b>'+(S.cost.perBirdHour||0)+' ج.م/طير/ساعة</b> (نفوق + تحويل علف + وزن مفقود).<br>'+
       'عدّل الأرقام دي من الإعدادات حسب واقعك.</div></div>';
  }

  h+='<div class="card"><h3>الأعطال حسب النوع</h3>'+bars(byCat)+'</div>';
  h+='<div class="card"><h3>البلاغات حسب المزرعة</h3>'+bars(byFarm)+'</div>';

  /* الموسمية */
  var MN=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  var curMo=new Date().getMonth();
  var nxt=(curMo+1)%12;
  h+='<div class="card"><h3>🌦️ نمط موسمي — استعد للجاي</h3>';
  var seasonal=[];
  [curMo,nxt].forEach(function(m){
    if(!byMonth[m])return;
    var arr=[]; for(var c in byMonth[m])arr.push([c,byMonth[m][c]]);
    arr.sort(function(a,b){return b[1]-a[1]});
    if(arr.length)seasonal.push([m,arr.slice(0,3)]);
  });
  if(!seasonal.length)h+='<div class="hint">محتاج تاريخ أكتر (سنة على الأقل) عشان نطلّع نمط موسمي مفيد.</div>';
  else{
    seasonal.forEach(function(x){
      h+='<div class="list-item"><span><b>'+MN[x[0]]+'</b>'+(x[0]===curMo?' (الشهر ده)':' (الشهر الجاي)')+'<div class="meta">'+
         x[1].map(function(y){return y[0]+' ('+y[1]+')'}).join(' · ')+'</div></span></div>';
    });
    h+='<div class="hint">دي أكتر الفئات اللي حصل فيها أعطال في نفس الشهر تاريخيًا — جهّز قطع الغيار بتاعتها ونفّذ الصيانة الوقائية قبل ما تقع.</div>';
  }
  h+='</div>';

  /* أكتر قطع الغيار */
  var pl=[]; for(var pn in parts)pl.push([pn,parts[pn]]);
  pl.sort(function(a,b){return b[1]-a[1]});
  if(pl.length){
    h+='<div class="card"><h3>🔩 أكتر قطع الغيار استهلاكًا</h3>';
    for(var pi=0;pi<Math.min(pl.length,8);pi++)h+='<div class="list-item"><span>'+esc(pl[pi][0])+'</span><b>'+pl[pi][1]+'</b></div>';
    h+='<div class="hint">دي اللي المفروض تفضل موجودة في المخزن — كل قطعة مش متوفرة = ساعات تعطّل زيادة.</div></div>';
  }

  /* الأسباب الجذرية */
  var rl=[]; for(var rn in roots)rl.push([rn,roots[rn]]);
  rl.sort(function(a,b){return b[1]-a[1]});
  if(rl.length){
    h+='<div class="card"><h3>🎯 الأسباب الجذرية</h3>';
    for(var ri=0;ri<rl.length;ri++)h+='<div class="list-item"><span>'+esc(rl[ri][0])+'</span><b>'+rl[ri][1]+'</b></div>';
    h+='</div>';
  }

  /* المتكرر */
  var reps=[]; for(var k in repeat)if(repeat[k]>=2)reps.push([k,repeat[k]]);
  reps.sort(function(a,b){return b[1]-a[1];});
  h+='<div class="card"><h3>🔁 أعطال متكررة (نفس العنبر ونفس العطل)</h3>';
  if(!reps.length)h+='<div class="hint">مفيش تكرار لحد دلوقتي — كويس 👌</div>';
  else{
    for(var j=0;j<Math.min(reps.length,10);j++){
      var col=reps[j][1]>=3?'var(--red)':'var(--amber)';
      h+='<div class="list-item"><span>'+esc(reps[j][0])+'</span><b style="color:'+col+'">'+reps[j][1]+' مرات</b></div>';
    }
    h+='<div class="hint">⚠️ اللي وصل <b>٣ مرات</b> النظام بيطلب السبب الجذري إجباري عند الإصلاح — لأن تغيير القطعة ٣ مرات معناه المشكلة مش في القطعة.</div>';
  }
  h+='</div>';
  return h;
}
function bars(obj){
  var arr=[]; for(var k in obj)arr.push([k,obj[k]]);
  if(!arr.length)return '<div class="hint">مفيش بيانات لسه</div>';
  arr.sort(function(a,b){return b[1]-a[1];});
  var max=arr[0][1],h='';
  for(var i=0;i<arr.length;i++){h+='<div class="bar-row"><span class="nm">'+esc(arr[i][0])+'</span><span class="tr"><span class="fl" style="width:'+Math.round(arr[i][1]/max*100)+'%"></span></span><span class="ct">'+arr[i][1]+'</span></div>';}
  return h;
}



/* ================= الوضع العام (Health Score) =================
   درجة من ١٠٠ بتتجمع من ٦ عوامل بأوزان من الميدان:
   - حرج مفتوح (25): أخطر حاجة — كل واحد بيخصم كتير
   - الالتزام بالـ SLA (20)
   - الوقائية (20): المستحق المتأخر بيخصم
   - التكرار (15): نفس العطل ≥3 مرات = مشكلة مش بتتحل
   - سرعة الحل مقارنة بالمستهدف (10)
   - الحل من أول مرة (10) */
function healthScore(o){
  var parts=[];
  /* ١) الحرج المفتوح */
  var pCrit=Math.max(0,25-o.crit*12.5);
  parts.push({k:'حرج مفتوح',v:pCrit,max:25,note:o.crit?('فيه '+o.crit+' بلاغ حرج مفتوح!'):'مفيش حرج مفتوح'});
  /* ٢) SLA */
  var pSla=(o.closed?o.comply:100)/100*20;
  parts.push({k:'الالتزام بالوقت',v:pSla,max:20,note:o.comply+'٪'});
  /* ٣) الوقائية */
  var pmAll=(S.pm||[]).length, pmDue=(S.pm||[]).filter(function(t){return pmState(t)==='over'}).length;
  var pPm;
  if(!pmAll){ pPm=8; parts.push({k:'الصيانة الوقائية',v:8,max:20,note:'مفيش جدول وقائية أصلًا — حمّل المهام الجاهزة'}); }
  else { pPm=Math.max(0,20-pmDue*4); parts.push({k:'الصيانة الوقائية',v:pPm,max:20,note:pmDue?(pmDue+' مهمة متأخرة'):'كله في معاده'}); }
  /* ٤) التكرار — السلاسل الصريحة أثقل من البصمة */
  var rep3=o.repSame.filter(function(x){return x.n>=3}).length;
  var ch2=(o.chains||[]).filter(function(x){return x.n>=2}).length;
  var pRep=Math.max(0,15-rep3*3-ch2*5);
  parts.push({k:'الأعطال المتكررة',v:pRep,max:15,note:(ch2?ch2+' مشكلة راجعة مربوطة':'')+(ch2&&rep3?' · ':'')+(rep3?rep3+' تكرار بصمة':'')||'مفيش تكرار مقلق'});
  /* ٥) سرعة الحل */
  var pFix=10;
  if(o.fixN){
    var tgt=(S.sla&&S.sla.med&&S.sla.med.fix?S.sla.med.fix:1440)/60;
    pFix=o.avgH<=tgt?10:Math.max(0,10-((o.avgH-tgt)/tgt)*10);
  }
  parts.push({k:'سرعة الحل',v:pFix,max:10,note:o.avgH+' ساعة متوسط'});
  /* ٦) أول مرة */
  var pF=o.ftf.tot?(o.ftf.ok/o.ftf.tot)*10:10;
  parts.push({k:'الحل من أول مرة',v:pF,max:10,note:(o.ftf.tot?Math.round(o.ftf.ok/o.ftf.tot*100):100)+'٪'});

  var score=0; parts.forEach(function(p){score+=p.v});
  score=Math.round(score);
  var grade,gcol,gic;
  if(score>=85){grade='ممتاز';gcol='var(--green)';gic='🟢'}
  else if(score>=70){grade='جيد';gcol='#7ec97e';gic='🟡'}
  else if(score>=50){grade='مقبول';gcol='var(--amber)';gic='🟠'}
  else {grade='خطر';gcol='var(--red)';gic='🔴'}
  return {score:score,grade:grade,gcol:gcol,gic:gic,parts:parts};
}
function healthGauge(hs){
  var R=52, C=2*Math.PI*R, pct=hs.score/100;
  return '<svg viewBox="0 0 140 140" class="gauge">'+
    '<circle cx="70" cy="70" r="'+R+'" fill="none" stroke="var(--panel2)" stroke-width="13"/>'+
    '<circle cx="70" cy="70" r="'+R+'" fill="none" stroke="'+hs.gcol+'" stroke-width="13" stroke-linecap="round" '+
    'stroke-dasharray="'+(C*pct).toFixed(1)+' '+C.toFixed(1)+'" transform="rotate(-90 70 70)"/>'+
    '<text x="70" y="64" text-anchor="middle" fill="#e6edf3" font-size="30" font-weight="800">'+hs.score+'</text>'+
    '<text x="70" y="86" text-anchor="middle" fill="'+hs.gcol+'" font-size="15" font-weight="800">'+hs.grade+'</text>'+
    '</svg>';
}

  if(o.cost>0){
    h+='<div class="card"><h3>💸 تكلفة التعطّل التقديرية</h3><div class="bignum">'+o.cost.toLocaleString('en-US')+' <small>ج.م</small></div>';

   فبنرسم الكارت صورة: جدول حقيقي بألوان، وبيتبعت sendPhoto. */
var SEV_CARD={critical:{c:'#da3633',n:'حرجة'},high:{c:'#f0883e',n:'عالية'},med:{c:'#58a6ff',n:'متوسطة'},low:{c:'#2ea043',n:'منخفضة'}};
function drawCloseCard(r,cb){
  var W=900, PAD=0, y=0;
  var c=document.createElement('canvas'); c.width=W; c.height=1600;
  var x=c.getContext('2d');
  var sev=SEV_CARD[r.severity]||SEV_CARD.med;
  var late=(respLate(r)||fixLate(r));
  function font(sz,w){ x.font=(w||'400')+' '+sz+'px -apple-system,"Segoe UI",Tahoma,sans-serif'; }
  function rrect(x0,y0,w,h,rad,fill){
    x.beginPath();
    x.moveTo(x0+rad,y0); x.arcTo(x0+w,y0,x0+w,y0+h,rad); x.arcTo(x0+w,y0+h,x0,y0+h,rad);
    x.arcTo(x0,y0+h,x0,y0,rad); x.arcTo(x0,y0,x0+w,y0,rad); x.closePath();
    x.fillStyle=fill; x.fill();
  }
  /* خلفية */
  x.fillStyle='#f4f6f8'; x.fillRect(0,0,W,c.height);
  x.direction='rtl';
  /* ===== الرأس الملون بلون الخطورة ===== */
  var g=x.createLinearGradient(0,0,W,0);
  g.addColorStop(0,sev.c); g.addColorStop(1,'#1a2332');
  x.fillStyle=g; x.fillRect(0,0,W,110);
  x.textAlign='right';
  font(34,'800'); x.fillStyle='#fff';
  x.fillText('📁 بلاغ #'+r.num+' — اتقفل نهائي', W-34, 52);
  font(21,'400'); x.fillStyle='rgba(255,255,255,.9)';
  x.fillText(r.farmName+' — وحدة '+r.house+(r.equip?' · '+r.equip:''), W-34, 87);
  /* شارة الخطورة */
  x.textAlign='left';
  rrect(26,32,130,46,23,'rgba(255,255,255,.18)');
  font(21,'800'); x.fillStyle='#fff'; x.textAlign='center';
  x.fillText(sev.n, 26+65, 62);
  x.textAlign='right';
  y=140;
  /* ===== جدول البيانات ===== */
  var rows=[
    ['العطل', r.category+' › '+r.fault, '#111'],
    ['بلّغ', r.reporterName+'  ·  '+fmtDT(r.ts), '#111'],
  ];
  if(r.startedBy)rows.push(['استلم', r.startedBy+'  ·  بعد '+mmm(respMins(r)), respLate(r)?'#da3633':'#1e7e34']);
  if(r.fixedBy)rows.push(['صلّح', r.fixedBy+'  ·  في '+mmm(fixMins(r)), fixLate(r)?'#da3633':'#1e7e34']);
  if(r.waitTotal)rows.push(['انتظار قطع', mmm(Math.round(r.waitTotal/60000))+' (مش محسوبة على الفني)', '#b06000']);
  if(r.fixDesc)rows.push(['اللي اتعمل', r.fixDesc, '#111']);
  if(r.parts&&r.parts.length)rows.push(['قطع الغيار', r.parts.map(function(p){return p.name+' ×'+p.qty}).join('  ·  '), '#111']);
  if(r.rootCause)rows.push(['السبب الجذري', r.rootCause, '#da3633']);
  var dc=downtimeCost(r);
  if(dc)rows.push(['تكلفة التعطّل', dc.toLocaleString('en-US')+' ج.م (تقديري)', '#b06000']);
  var ci=(r.repeatOf?chainInfo(r):null);
  if(ci&&ci.n>=2)rows.push(['⛔ مشكلة راجعة', 'المرة رقم '+ci.idx+' من '+ci.n, '#da3633']);

  var rowH=64, labW=190;
  for(var i=0;i<rows.length;i++){
    var ry=y+i*rowH;
    /* تظليل متبادل */
    rrect(24, ry, W-48, rowH-8, 12, i%2? '#ffffff':'#eef2f6');
    /* عمود التسمية */
    rrect(W-24-labW, ry, labW, rowH-8, 12, '#1a2332');
    font(19,'800'); x.fillStyle='#fff'; x.textAlign='center';
    x.fillText(rows[i][0], W-24-labW/2, ry+38);
    /* القيمة — مع لف الأسطر */
    x.textAlign='right';
    font(20,'700'); x.fillStyle=rows[i][2];
    var val=String(rows[i][1]);
    if(x.measureText(val).width > W-48-labW-40){
      /* قصّ بنقط لو أطول من السطر */
      while(x.measureText(val+'…').width > W-48-labW-40 && val.length>4) val=val.slice(0,-1);
      val+='…';
    }
    x.fillText(val, W-24-labW-18, ry+38);
  }
  y+=rows.length*rowH+14;
  /* ===== شريط النتيجة ===== */
  rrect(24, y, W-48, 66, 14, late?'#fdecec':'#e8f7e8');
  font(24,'800'); x.fillStyle=late?'#c0392b':'#1e7e34'; x.textAlign='center';
  x.fillText(late?'⚠️ اتحل بس خارج الوقت المستهدف':'✅ اتحل داخل الوقت المستهدف', W/2, y+43);
  y+=96;
  /* ذيل */
  font(16,'400'); x.fillStyle='#8a94a0'; x.textAlign='center';
  x.fillText('نظام أعطال المزارع · '+fmtDT(now()), W/2, y);
  x.textAlign='right';
  y+=30;
  /* قصّ */
  var out=document.createElement('canvas'); out.width=W; out.height=y;
  var ox=out.getContext('2d'); ox.fillStyle='#f4f6f8'; ox.fillRect(0,0,W,y);
  ox.drawImage(c,0,0,W,y,0,0,W,y);
  cb(out);
}
